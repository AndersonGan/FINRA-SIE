    // Lesson checks add targeted retrieval without changing the official-weight 75-question mock bank above.
    const lessonQuestions = [
      Q('x01','d1','Market participants','medium','An introducing broker-dealer would most commonly rely on a clearing broker-dealer to',
        ['recommend every security to its customers.','maintain custody, clear trades and settle transactions.','write the rules for national exchanges.','guarantee customers against market losses.'],1,
        ['Introducing firms can make recommendations; that is not the clearing relationship.','Correct. The clearing firm commonly handles custody, confirmations, clearing and settlement.','The SEC and SRO framework writes and enforces market rules.','No broker-dealer may guarantee investment performance.'],'Introducing firms face customers; clearing firms perform back-office and custody functions under the agreement.'),
      Q('x02','d1','Market plumbing','medium','Which organization maintains issuer records showing who owns registered shares and processes ownership changes?',
        ['Transfer agent','Market maker','Investment adviser','Selling group'],0,
        ['Correct. Transfer agents maintain ownership records and process transfers and distributions.','A market maker quotes prices and trades for inventory.','An adviser provides securities advice for compensation.','A selling group helps distribute an offering.'],'Transfer agent = issuer ownership records and transfers.'),
      Q('x03','d1','Market plumbing','medium','The Options Clearing Corporation primarily reduces listed-options counterparty risk by',
        ['setting federal monetary policy.','becoming the central counterparty to cleared options trades.','insuring every options loss.','registering state investment advisers.'],1,
        ['The Federal Reserve conducts monetary policy.','Correct. OCC clearing and guarantee mechanisms stand between clearing members.','Clearing does not insure an investor against market loss.','State regulators handle applicable adviser registration.'],'OCC is the central clearing organization for listed options.'),
      Q('x04','d1','Markets','medium','A listed stock transaction negotiated directly between two institutions without a broker-dealer is commonly associated with the',
        ['primary market.','second market.','third market.','fourth market.'],3,
        ['Primary-market proceeds involve issuer distribution.','The secondary market is the broad resale market, but the question asks for the institutional direct-trading label.','The third market is OTC trading in exchange-listed securities, typically through dealers.','Correct. The fourth market describes direct institution-to-institution trading.'],'Third market uses dealers for listed shares OTC; fourth market is direct institutional trading.'),
      Q('x05','d1','Economics','medium','Which action is expansionary monetary policy?',
        ['The Federal Reserve sells Treasury securities.','The Federal Reserve raises the discount rate.','The Federal Reserve buys Treasury securities in the open market.','Congress raises income taxes while holding spending constant.'],2,
        ['A sale withdraws reserves and is contractionary.','A higher discount rate discourages borrowing and is contractionary.','Correct. A purchase adds reserves and tends to lower short-term rates.','That is contractionary fiscal policy.'],'Fed purchases add reserves; Fed sales remove reserves.'),
      Q('x06','d1','Financial statements','medium','Which statement reports a company assets, liabilities and shareholders equity at a point in time?',
        ['Income statement','Balance sheet','Statement of cash flows only','Prospectus summary'],1,
        ['The income statement covers revenue and expenses over a period.','Correct. The balance-sheet identity is assets = liabilities + equity.','Cash flow tracks operating, investing and financing cash movements over a period.','A prospectus is an offering disclosure document, not a financial-statement category.'],'Balance sheet = financial position at a date; income and cash-flow statements cover a period.'),
      Q('x07','d2','Equity-linked securities','medium','Compared with exercising preemptive rights, exercising long-term warrants is more likely to',
        ['create new shares and dilute existing ownership.','produce interest income from the issuer.','make the holder a secured creditor.','eliminate market risk.'],0,
        ['Correct. Warrant exercise commonly causes the issuer to issue new shares.','Warrants are equity-linked instruments, not interest-bearing debt.','Exercise creates stock ownership, not secured-creditor status.','The acquired shares remain exposed to market risk.'],'Warrant exercise can add shares and dilute; rights help current owners preserve proportionate ownership.'),
      Q('x08','d2','Mutual-fund sales charges','medium','An investor expects one large Class A mutual-fund purchase and a long holding period. Which feature is most relevant before the sale?',
        ['Breakpoint eligibility on the front-end sales charge','A guaranteed NAV','FDIC insurance','A short-sale locate requirement'],0,
        ['Correct. Larger Class A purchases may qualify for reduced front-end charges.','Mutual-fund NAV can rise or fall.','Mutual funds are not bank deposits.','A purchase of fund shares is not a short sale.'],'Check breakpoints, rights of accumulation and letters of intent before a Class A sale.'),
      Q('x09','d2','Variable annuities','medium','During the accumulation phase of a variable annuity, the contract owner measures value in',
        ['annuity units only.','accumulation units.','bond coupons.','mutual-fund breakpoints.'],1,
        ['Annuity units are used after annuitization for variable payout calculations.','Correct. Contributions purchase accumulation units in selected separate-account options.','A variable annuity is an insurance contract, not a coupon bond.','Breakpoints concern eligible mutual-fund sales charges.'],'Accumulation units before annuitization; annuity units during variable payout.'),
      Q('x10','d2','Variable annuities','hard','A nonqualified variable-annuity owner withdraws earnings before the investment in the contract. The earnings portion is generally',
        ['tax-free return of capital.','taxed as ordinary income and may face an additional tax if the owner is under 59 1/2.','always taxed as a long-term capital gain.','deductible from federal income.'],1,
        ['After-tax principal is basis, but earnings are not tax-free basis.','Correct. Nonqualified withdrawals are generally earnings first, taxed as ordinary income, with a possible early-distribution additional tax.','Annuity earnings are generally not converted to capital-gain treatment.','A withdrawal is not an income-tax deduction.'],'Nonqualified annuity: after-tax basis, tax-deferred earnings, ordinary-income treatment on taxable distributions.'),
      Q('x11','d2','Municipal fund securities','medium','Which education product generally locks in tuition units or credits under the sponsoring plan rather than offering a market-based investment menu?',
        ['529 prepaid tuition plan','529 savings plan','ABLE account','Local government investment pool'],0,
        ['Correct. Prepaid plans are designed around future tuition units or credits, subject to plan terms.','Savings plans offer investment options whose values fluctuate.','ABLE accounts support qualified disability expenses.','LGIPs pool short-term public-entity cash.'],'Prepaid 529 = tuition units or credits; savings 529 = investment account.'),
      Q('x12','d2','Municipal fund securities','medium','An ABLE account is designed primarily to help an eligible individual pay',
        ['qualified disability expenses.','a corporation bond interest.','a broker-dealer net-capital requirement.','only graduate-school tuition.'],0,
        ['Correct. Qualified disability expenses are the central purpose of ABLE accounts.','Corporate financing is unrelated.','ABLE assets do not satisfy a firm capital rule.','Education can be an eligible expense in context, but the program is broader and disability-focused.'],'ABLE accounts support eligible individuals with qualified disability expenses.'),
      Q('x13','d2','Alternative investments','medium','Which statement best distinguishes a publicly traded REIT from a direct participation program limited partnership?',
        ['A publicly traded REIT can trade on an exchange, while a DPP interest is generally much less liquid.','A REIT is a bank deposit, while a DPP is a Treasury security.','A REIT guarantees income, while a DPP guarantees appreciation.','Only the DPP can own real estate.'],0,
        ['Correct. Exchange trading can provide liquidity that a typical DPP interest lacks.','Neither characterization is accurate.','Neither product guarantees investment results.','Both structures can have real-estate exposure.'],'Compare structure, tax treatment, control and liquidity; never assume alternatives are readily tradable.'),
      Q('x14','d2','Alternative investments','hard','Why might a hedge fund be unsuitable for a retail investor who needs near-term access to cash?',
        ['It may impose lockups, gates or limited redemption windows.','It must redeem shares every day at NAV.','It is federally insured.','It cannot use leverage or derivatives.'],0,
        ['Correct. Restricted liquidity is a major suitability consideration.','Daily redemption is not a defining hedge-fund feature.','Hedge funds are not federally insured deposits.','Many hedge funds may use leverage, short sales or derivatives.'],'Alternative-product liquidity terms can matter as much as the strategy.'),
      Q('x15','d2','Risk','medium','A U.S. investor owns a foreign stock that is unchanged in its home currency, but the foreign currency falls against the dollar. The investor can still lose because of',
        ['currency risk.','call risk.','prepayment risk.','voting dilution only.'],0,
        ['Correct. Converting the unchanged foreign value into stronger dollars can reduce the return.','Call risk concerns early redemption by a bond issuer.','Prepayment risk commonly affects mortgage-backed cash flows.','Voting dilution does not explain the exchange-rate loss.'],'International returns combine asset performance with currency translation.'),
      Q('x16','d3','Customer information','medium','Which fact is most directly part of knowing the authority of a person acting for an entity account?',
        ['The signer powers under corporate or partnership documents','The issuer dividend history','The exchange specialist inventory','The customer favorite television program'],0,
        ['Correct. Governing documents and resolutions establish who may act.','Dividend history does not grant account authority.','A market participant inventory is unrelated.','This is not an essential account-authority fact.'],'KYC includes identity, essential customer facts and the authority of anyone acting for the customer.'),
      Q('x17','d3','Regulation Best Interest','hard','A broker-dealer recommends a higher-cost security to a retail customer when a reasonably available lower-cost alternative offers the same relevant features. The clearest concern is the',
        ['care and conflict analysis under Regulation Best Interest.','Federal Reserve reserve requirement.','transfer-agent record date.','SIPC liquidation process.'],0,
        ['Correct. Cost, risk, reward, alternatives and conflicts are central to a retail recommendation analysis.','Monetary policy does not govern the recommendation.','Issuer records do not resolve whether the recommendation serves the customer.','SIPC liquidation is unrelated to ordinary product selection.'],'Reg BI is not a cheapest-product-only rule, but cost and reasonably available alternatives must be considered.'),
      Q('x18','d3','Market manipulation','medium','Buying shares near the end of the session solely to push up the official closing price is',
        ['marking the close.','a legitimate stock split.','annuitization.','a breakpoint sale.'],0,
        ['Correct. The trades are intended to distort a closing benchmark.','A stock split is an issuer corporate action.','Annuitization converts contract value into income.','A breakpoint sale improperly denies a mutual-fund sales-charge discount.'],'Manipulation creates a false appearance of genuine supply, demand or price.'),
      Q('x19','d3','Customer protection','medium','A representative offers to reimburse a customer personally if a recommended stock declines. This is',
        ['an impermissible guarantee against loss.','permitted if the customer signs a waiver.','required by Regulation Best Interest.','SIPC coverage.'],0,
        ['Correct. Associated persons may not guarantee a customer against investment loss.','Customer consent does not legalize the guarantee.','Reg BI does not require personal loss reimbursement.','SIPC does not protect against market decline.'],'No guarantee against loss, even when the representative intends to preserve goodwill.'),
      Q('x20','d3','Registration','medium','An unregistered employee may generally',
        ['recommend a mutual fund.','accept an unsolicited securities order.','provide a customer with a factual account balance.','receive a percentage of commissions.'],2,
        ['A recommendation is a registered sales function.','Accepting a securities order generally requires proper registration.','Correct. Purely clerical or ministerial information can be provided within firm procedures.','Transaction-based compensation is a major registration red flag.'],'Function, not job title, determines whether registration is required.'),
      Q('x21','d4','Continuing education','medium','Which statement accurately compares the two principal continuing-education components?',
        ['FINRA delivers the Regulatory Element; the member firm designs the Firm Element from its needs analysis.','The customer designs both components.','The SEC delivers Firm Element training to every representative.','Continuing education ends permanently after the SIE.'],0,
        ['Correct. Regulatory Element assignments are FINRA-based, while Firm Element reflects firm roles and risks.','Customers do not administer representative CE.','Member firms create Firm Element programs.','Qualification begins, rather than ends, ongoing learning obligations.'],'Regulatory Element = FINRA; Firm Element = firm-specific training.'),
      Q('x22','d4','Federal securities acts','medium','Which law created the SEC and is most closely associated with exchanges, broker-dealers and secondary-market trading?',

        <section class="section"><div class="section-title"><div><div class="eyebrow">Formulas</div><h2>Calculations the SIE expects</h2></div></div><div class="formula-grid">${formulaData.groups.map(g=>`<article class="formula-card"><h3>${esc(g.title)}</h3>${g.items.map(it=>`<div class="formula-item"><strong>${esc(it.n)}</strong><span class="formula-eq">${esc(it.eq)}</span><span class="note">${esc(it.note)}</span></div>`).join('')}</article>`).join('')}</div></section>

        <section class="section"><div class="section-title"><div><div class="eyebrow">Exam-day cram sheet</div><h2>One-screen refresh by domain</h2></div></div><div class="cram-grid">${Object.entries(formulaData.cram).map(([id,list])=>`<article class="card cram-col" style="border-top:4px solid ${DOMAINS[id].color}"><h3>${esc(DOMAINS[id].short)} <span class="question-count">· ${DOMAINS[id].weight}%</span></h3><ul>${list.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></article>`).join('')}</div></section>${sourceNote()}`;
    }

    // ---- Calculators ----
    function fmtMoney(n){return isFinite(n)?'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';}
    function fmtPct(n){return isFinite(n)?n.toFixed(2)+'%':'—';}
    function renderCalculators(){
      $('#topEyebrow').textContent='Interactive tools';$('#topTitle').textContent='Work the numbers until they are automatic.';
      $('#main').innerHTML=`<div class="page-head"><div><div class="eyebrow">Calculators</div><h1>Practice the math behind the questions.</h1><p>Every calculator updates as you type. Values are for study and illustration; the exam tests the relationships, not memorized outputs.</p></div><button class="soft-btn" data-view="formulas">See the formulas →</button></div>
        <div class="grid grid-2">
          <article class="calc-card"><h3>Bond yields</h3><p class="desc">Par assumed at $1,000. Enter the coupon, market price and years to maturity.</p>
            <div class="calc-fields"><div class="calc-field"><label>Coupon rate (%)</label><input class="calc-input" id="bCoupon" type="number" step="0.1" value="6"></div><div class="calc-field"><label>Market price ($)</label><input class="calc-input" id="bPrice" type="number" step="1" value="1200"></div><div class="calc-field"><label>Years to maturity</label><input class="calc-input" id="bYears" type="number" step="1" value="10"></div><div class="calc-field"><label>Par ($)</label><input class="calc-input" id="bPar" type="number" step="100" value="1000"></div></div>
            <div class="calc-out"><div class="row"><span>Annual coupon</span><strong id="bCouponD">—</strong></div><div class="row"><span>Current yield</span><strong id="bCY">—</strong></div><div class="row"><span>Approx. YTM</span><strong id="bYTM">—</strong></div></div></article>
          <article class="calc-card"><h3>Options profit / loss</h3><p class="desc">Single-option positions. Results shown per contract (×100 shares).</p>
            <div class="calc-fields"><div class="calc-field"><label>Position</label><select class="calc-input" id="oPos"><option value="lc">Long call</option><option value="lp">Long put</option><option value="sc">Short (naked) call</option><option value="sp">Short put</option></select></div><div class="calc-field"><label>Strike ($)</label><input class="calc-input" id="oStrike" type="number" step="1" value="50"></div><div class="calc-field"><label>Premium ($)</label><input class="calc-input" id="oPrem" type="number" step="0.25" value="4"></div></div>
            <div class="calc-out"><div class="row"><span>Max gain</span><strong id="oGain">—</strong></div><div class="row"><span>Max loss</span><strong id="oLoss">—</strong></div><div class="row"><span>Breakeven</span><strong id="oBE">—</strong></div></div></article>
          <article class="calc-card"><h3>Mutual fund POP &amp; sales charge</h3><p class="desc">Front-end load funds: POP = NAV ÷ (1 − sales charge %).</p>
            <div class="calc-fields"><div class="calc-field"><label>NAV ($)</label><input class="calc-input" id="fNav" type="number" step="0.01" value="19.05"></div><div class="calc-field"><label>Sales charge (%)</label><input class="calc-input" id="fSc" type="number" step="0.25" value="5"></div></div>
            <div class="calc-out"><div class="row"><span>Public offering price</span><strong id="fPop">—</strong></div><div class="row"><span>Sales charge $</span><strong id="fScD">—</strong></div></div></article>
          <article class="calc-card"><h3>Accrued interest</h3><p class="desc">Interest the buyer owes the seller since the last coupon.</p>
            <div class="calc-fields"><div class="calc-field"><label>Par ($)</label><input class="calc-input" id="aPar" type="number" step="100" value="1000"></div><div class="calc-field"><label>Coupon rate (%)</label><input class="calc-input" id="aCoupon" type="number" step="0.1" value="6"></div><div class="calc-field"><label>Days since last coupon</label><input class="calc-input" id="aDays" type="number" step="1" value="90"></div><div class="calc-field"><label>Day-count basis</label><select class="calc-input" id="aBasis"><option value="360">30/360 (corporate / muni)</option><option value="365">Actual/365 (government approx.)</option></select></div></div>
            <div class="calc-out"><div class="row"><span>Accrued interest</span><strong id="aOut">—</strong></div></div></article>
        </div>${sourceNote()}`;
      computeCalculators();
    }
    function num(id){const el=$('#'+id);return el?parseFloat(el.value):NaN;}
    function val(id){const el=$('#'+id);return el?el.value:'';}
    function computeCalculators(){
      if(view!=='calculators')return;
      // Bond
      const par=num('bPar')||1000,coupon=num('bCoupon'),price=num('bPrice'),years=num('bYears');
      const couponD=par*coupon/100;
      if($('#bCouponD')){$('#bCouponD').textContent=fmtMoney(couponD);$('#bCY').textContent=fmtPct(couponD/price*100);$('#bYTM').textContent=fmtPct((couponD+(par-price)/years)/((par+price)/2)*100);}
      // Options
      const pos=val('oPos'),strike=num('oStrike'),prem=num('oPrem');
      if($('#oGain')){
        let gain='—',loss='—',be='—';const p=prem*100;
        if(pos==='lc'){gain='Unlimited';loss=fmtMoney(p);be=fmtMoney(strike+prem);}
        else if(pos==='lp'){gain=fmtMoney((strike-prem)*100);loss=fmtMoney(p);be=fmtMoney(strike-prem);}
        else if(pos==='sc'){gain=fmtMoney(p);loss='Unlimited';be=fmtMoney(strike+prem);}
        else if(pos==='sp'){gain=fmtMoney(p);loss=fmtMoney((strike-prem)*100);be=fmtMoney(strike-prem);}
        $('#oGain').textContent=gain;$('#oLoss').textContent=loss;$('#oBE').textContent=be;
      }
      // Fund POP
      const nav=num('fNav'),sc=num('fSc');
      if($('#fPop')){const pop=nav/(1-sc/100);$('#fPop').textContent=fmtMoney(pop);$('#fScD').textContent=fmtMoney(pop-nav);}
      // Accrued
      const aPar=num('aPar'),aCoupon=num('aCoupon'),aDays=num('aDays'),denom=parseFloat(val('aBasis'))||360;
      if($('#aOut')){$('#aOut').textContent=fmtMoney(aPar*(aCoupon/100)*(aDays/denom));}
    }

    // ---- Glossary ----
    function filteredGlossary(){
      const term=glossarySearch.trim().toLowerCase();
      return glossaryData.filter(g=>(glossaryFilter==='all'||g[0]===glossaryFilter)&&(!term||g[1].toLowerCase().includes(term)||g[2].toLowerCase().includes(term)));
    }
    function glossaryResultsHTML(){
      const list=filteredGlossary();
      if(!list.length)return `<div class="card empty"><div class="empty-icon">◈</div><h2>No terms match “${esc(glossarySearch)}”.</h2><p>Try a shorter search or a different domain filter.</p></div>`;
      return `<div class="glossary-list">${list.map(g=>`<div class="glossary-entry"><h4>${esc(g[1])} <em>${esc(DOMAINS[g[0]].short)}</em></h4><p>${esc(g[2])}</p></div>`).join('')}</div>`;
    }
    function renderGlossary(){
      $('#topEyebrow').textContent='Reference library';$('#topTitle').textContent='Every SIE term, one search away.';
      const total=glossaryData.length;
      $('#main').innerHTML=`<div class="page-head"><div><div class="eyebrow">Glossary · ${total} terms</div><h1>Look up any concept instantly.</h1><p>Search ${total} definitions across all four domains, or filter by domain. The same terms power your spaced-repetition cards.</p></div><button class="soft-btn" data-view="flashcards">Study as cards →</button></div>
        <div class="glossary-toolbar"><input class="glossary-search" id="glossarySearch" type="search" placeholder="Search terms and definitions…" value="${esc(glossarySearch)}" aria-label="Search glossary"><div class="chip-row"><button class="chip ${glossaryFilter==='all'?'active':''}" data-action="glossary-domain" data-domain="all">All</button>${Object.entries(DOMAINS).map(([id,d])=>`<button class="chip ${glossaryFilter===id?'active':''}" data-action="glossary-domain" data-domain="${id}">${esc(d.short)}</button>`).join('')}</div></div>
        <div id="glossaryResults">${glossaryResultsHTML()}</div>${sourceNote()}`;
      const s=$('#glossarySearch');if(s){s.focus();s.setSelectionRange(s.value.length,s.value.length);}
    }

    // ---- Spaced repetition (SM-2 lite) ----
    const srsGradeCfg={again:{q:0,label:'Again',sub:'<1 min'},hard:{q:3,label:'Hard',sub:'harder'},good:{q:4,label:'Good',sub:'on track'},easy:{q:5,label:'Easy',sub:'longer gap'}};
    function srsCard(id){return state.srs[id]||{ease:2.5,interval:0,reps:0,due:0};}
    function nextIntervalPreview(id,grade){
      const c=srsCard(id);let {ease,interval,reps}=c;
      if(grade==='again')return 'now';
      let ni;if(grade==='hard')ni=Math.max(1,Math.round((interval||1)*1.2));
      else if(grade==='good')ni=reps===0?1:reps===1?6:Math.round(interval*ease);
      else ni=reps===0?3:Math.round((interval||1)*ease*1.3);
      return ni+'d';
    }
    function srsRate(id,grade){
      const c=srsCard(id);let {ease,interval,reps}=c;const now=Date.now();
      if(grade==='again'){reps=0;interval=0;ease=Math.max(1.3,ease-0.2);}
      else if(grade==='hard'){interval=Math.max(1,Math.round((interval||1)*1.2));ease=Math.max(1.3,ease-0.15);reps++;}
      else if(grade==='good'){interval=reps===0?1:reps===1?6:Math.round(interval*ease);reps++;}
      else {interval=reps===0?3:Math.round((interval||1)*ease*1.3);ease=ease+0.15;reps++;}
      const due=grade==='again'?now:now+interval*86400000;
      state.srs[id]={ease,interval,reps,due};save();
    }
    function dueDeck(){
      const now=Date.now();
      return flashcards.filter(c=>cardFilter==='all'||c.domain===cardFilter).filter(c=>{if(cardMode==='all')return true;const s=state.srs[c.id];return !s||s.due<=now;});
    }
    function srsStats(){
      const now=Date.now();const inScope=flashcards.filter(c=>cardFilter==='all'||c.domain===cardFilter);
      const learned=inScope.filter(c=>{const s=state.srs[c.id];return s&&s.reps>0&&s.due>now;}).length;
      const due=inScope.filter(c=>{const s=state.srs[c.id];return !s||s.due<=now;}).length;
      return {learned,due,total:inScope.length};
    }

    document.addEventListener('input',e=>{
      if(e.target.classList&&e.target.classList.contains('calc-input'))computeCalculators();
      if(e.target.id==='glossarySearch'){glossarySearch=e.target.value;const r=$('#glossaryResults');if(r)r.innerHTML=glossaryResultsHTML();}
    });
    document.addEventListener('change',e=>{ if(e.target.classList&&e.target.classList.contains('calc-input'))computeCalculators(); });
    /* ===================== END ADDED FEATURES ===================== */

    document.addEventListener('click',e=>{
      const btn=e.target.closest('button,[data-action]');if(!btn)return;
      if(btn.dataset.view){go(btn.dataset.view);return;}
      const a=btn.dataset.action;
      if(a==='open-lesson')go('lesson',btn.dataset.id);
      else if(a==='previous-lesson'&&btn.dataset.id)go('lesson',btn.dataset.id);
      else if(a==='complete-continue'){
        const id=btn.dataset.id;if(!state.completedLessons.includes(id))state.completedLessons.push(id);creditTime();save();
        if(btn.dataset.next){go('lesson',btn.dataset.next);toast('Lesson complete · next stop opened');}
        else{go('course');toast('Course complete · every lesson is now on your map');}
      }
      else if(a==='quick-study')startQuiz({domain:weakDomain(),count:10});
      else if(a==='set-plan'){state.plan=btn.dataset.plan;state.completedTasks=[];save();toast(`${planConfig[state.plan].name} activated`);go('planner');}
      else if(a==='toggle-complete'){
        const id=btn.dataset.id;if(state.completedLessons.includes(id))state.completedLessons=state.completedLessons.filter(x=>x!==id);else state.completedLessons.push(id);creditTime();save();renderLesson();toast(state.completedLessons.includes(id)?'Lesson marked complete':'Lesson reopened');
      }
      else if(a==='quick-answer')quickAnswer(btn);
      else if(a==='start-diagnostic')startQuiz({kind:'diagnostic',count:12});
      else if(a==='start-custom-quiz')startQuiz({domain:$('#quizDomain').value,difficulty:$('#quizDifficulty').value,timed:$('#quizTimed').checked,count:10});
      else if(a==='start-domain-quiz')startQuiz({domain:btn.dataset.domain,count:10});
      else if(a==='lesson-quiz'){
        const ids=lessonQuestionMap[btn.dataset.lesson]||[];startQuiz({kind:'lesson',ids,count:ids.length});
      }
      else if(a==='quiz-answer'){
        if(!activeQuiz)return;const q=activeQuiz.questions[activeQuiz.index];activeQuiz.answers[q.id]=Number(btn.dataset.index);renderQuiz();
      }
      else if(a==='next-quiz'){
        if(!activeQuiz)return;const q=activeQuiz.questions[activeQuiz.index];if(activeQuiz.answers[q.id]===undefined)return toast('Choose an answer first');
        if(activeQuiz.index===activeQuiz.questions.length-1)finishQuiz();else{activeQuiz.index++;renderQuiz();window.scrollTo(0,0);}
      }
      else if(a==='exit-quiz')go('quiz');
      else if(a==='flip-card'){cardFlipped=!cardFlipped;renderFlashcards();}
      else if(a==='prev-card'){cardIndex=(cardIndex-1+cardDeck.length)%cardDeck.length;cardFlipped=false;renderFlashcards();}
      else if(a==='next-card'){cardIndex=(cardIndex+1)%cardDeck.length;cardFlipped=false;renderFlashcards();}
      else if(a==='shuffle-cards'){const dk=dueDeck();cardIndex=dk.length?Math.floor(Math.random()*dk.length):0;cardFlipped=false;renderFlashcards();toast('Jumped to a random card');}
      else if(a==='rate-card'){
        const card=cardDeck[cardIndex];state.cardRatings[card.id]=btn.dataset.rating;save();cardIndex=(cardIndex+1)%cardDeck.length;cardFlipped=false;renderFlashcards();
      }
      else if(a==='card-filter'){cardFilter=btn.dataset.filter;cardDeck=[];renderFlashcards();}
      else if(a==='start-review'){
        if(!state.missedIds.length)return toast('Your review queue is clear');const w=weakDomain(),ids=state.missedIds.map(id=>practiceQuestions.find(q=>q.id===id)).filter(Boolean).sort((a,b)=>Number(b.domain===w)-Number(a.domain===w)).slice(0,10).map(q=>q.id);startQuiz({kind:'review',ids,count:10});
      }
      else if(a==='review-one')startQuiz({kind:'review',ids:[btn.dataset.id],count:1});
      else if(a==='confirm-exam')showDialog(`<h2>Start the 105-minute mock?</h2><p>The timer begins immediately. Your local progress is safe, but the active attempt is not preserved if the browser closes.</p><div class="dialog-actions"><button class="soft-btn" data-action="close-dialog">Not yet</button><button class="primary-btn" data-action="start-exam-now">Start timer</button></div>`);
      else if(a==='close-dialog')closeDialog();
      else if(a==='start-exam-now'){closeDialog();startExam(pendingMock||'random');}
      else if(a==='exam-answer'){
        if(!activeExam||activeExam.report)return;const q=activeExam.questions[activeExam.index];activeExam.answers[q.id]=Number(btn.dataset.index);renderExam();
      }
      else if(a==='flag-question'){
        const id=activeExam.questions[activeExam.index].id;activeExam.flags=activeExam.flags.includes(id)?activeExam.flags.filter(x=>x!==id):[...activeExam.flags,id];renderExam();
      }
      else if(a==='prev-exam'){activeExam.index=Math.max(0,activeExam.index-1);renderExam();window.scrollTo(0,0);}
      else if(a==='next-exam'){activeExam.index=Math.min(74,activeExam.index+1);renderExam();window.scrollTo(0,0);}
      else if(a==='exam-jump'){activeExam.index=Number(btn.dataset.index);renderExam();window.scrollTo(0,0);}
      else if(a==='submit-exam'){
        const unanswered=75-Object.keys(activeExam.answers).length;showDialog(`<h2>Submit this mock?</h2><p>${unanswered?`${unanswered} question${unanswered===1?' is':'s are'} unanswered and will score as incorrect.`:'All 75 questions are answered.'}</p><div class="dialog-actions"><button class="soft-btn" data-action="close-dialog">Keep working</button><button class="danger-btn" data-action="submit-exam-now">Submit exam</button></div>`);
      }
      else if(a==='submit-exam-now'){closeDialog();finishExam();}
      else if(a==='retake-exam'){pendingMock=btn.dataset.mock||'random';showDialog(`<h2>Retake ${esc((mockDefs.find(m=>m.id===pendingMock)||{}).name||'the mock')}?</h2><p>Your previous report remains in analytics until this new attempt is submitted.</p><div class="dialog-actions"><button class="soft-btn" data-action="close-dialog">Cancel</button><button class="primary-btn" data-action="start-exam-now">Start retake</button></div>`);}
      else if(a==='show-last-exam'){activeExam={report:state.lastExam};renderExam();}
      else if(a==='exit-exam-report'){activeExam=null;renderExam();}
      else if(a==='open-task'){if(btn.dataset.lesson)go('lesson',btn.dataset.lesson);else if(btn.dataset.target)go(btn.dataset.target);}
      else if(a==='reset-plan-tasks')showDialog(`<h2>Reset task checks?</h2><p>This clears planner checkmarks but keeps lesson completion, quiz history and review evidence.</p><div class="dialog-actions"><button class="soft-btn" data-action="close-dialog">Cancel</button><button class="danger-btn" data-action="reset-plan-now">Reset checks</button></div>`);
      else if(a==='reset-plan-now'){state.completedTasks=[];save();closeDialog();renderPlanner();toast('Planner checks reset');}
      else if(a==='export-progress')exportProgress();
      else if(a==='srs-rate'){const deck=dueDeck();const card=deck[cardIndex%deck.length];if(card){srsRate(card.id,btn.dataset.grade);cardIndex++;cardFlipped=false;renderFlashcards();}}
      else if(a==='srs-mode'){cardMode=btn.dataset.mode;cardIndex=0;cardFlipped=false;renderFlashcards();}
      else if(a==='glossary-domain'){glossaryFilter=btn.dataset.domain;renderGlossary();}
      else if(a==='confirm-mock'){pendingMock=btn.dataset.mock;const m=mockDefs.find(x=>x.id===pendingMock)||{};showDialog(`<h2>Start ${esc(m.name||'the mock')}?</h2><p>The 105-minute timer begins immediately. Your saved progress is safe, but the active attempt is not preserved if the browser closes.</p><div class="dialog-actions"><button class="soft-btn" data-action="close-dialog">Not yet</button><button class="primary-btn" data-action="start-exam-now">Start timer</button></div>`);}
      else if(a==='toggle-exam-review'){examReviewOpen=!examReviewOpen;renderExamReport(activeExam&&activeExam.report?activeExam.report:state.lastExam);}
    });
    document.addEventListener('change',e=>{
      if(e.target.id==='cardDomain'){cardFilter=e.target.value;cardDeck=[];cardIndex=0;cardFlipped=false;renderFlashcards();}
      if(e.target.matches('[data-task-id]')){const id=e.target.dataset.taskId;if(e.target.checked&&!state.completedTasks.includes(id))state.completedTasks.push(id);if(!e.target.checked)state.completedTasks=state.completedTasks.filter(x=>x!==id);save();renderPlanner();}
    });
    document.addEventListener('keydown',e=>{
      if(view==='flashcards'&&(e.code==='Space'||e.key==='Enter')&&!['INPUT','SELECT','BUTTON'].includes(document.activeElement.tagName)){e.preventDefault();cardFlipped=!cardFlipped;renderFlashcards();}
      if(view==='exam'&&activeExam&&!activeExam.report&&/^[1-4]$/.test(e.key)){const q=activeExam.questions[activeExam.index];activeExam.answers[q.id]=Number(e.key)-1;renderExam();}
    });
    $('#themeToggle').addEventListener('click',()=>{state.theme=state.theme==='dark'?'light':'dark';save();});
    window.addEventListener('beforeunload',()=>{creditTime();localStorage.setItem(STORAGE_KEY,JSON.stringify(state));});
    setInterval(()=>{creditTime();save();},60000);
    (function init(){
      const parts=location.hash.replace('#','').split('/');if(parts[0]&&['home','dashboard','course','guide','lesson','quiz','flashcards','review','exam','formulas','calculators','glossary','planner','analytics'].includes(parts[0]))view=parts[0];if(view==='lesson'&&parts[1])selectedLesson=parts[1];
      const expected={d1:12,d2:33,d3:23,d4:7};Object.keys(expected).forEach(id=>{const actual=questions.filter(q=>q.domain===id).length;if(actual!==expected[id])console.error(`Question weighting error for ${id}: ${actual}`)});
      render();
    })();
  </script>
</body>
