        {h:'Breakpoint abuse and disclosure',p:'A breakpoint sale occurs when a representative recommends transactions that keep a customer just below an available discount, depriving the customer of a reduced charge. Firms must identify eligible discounts and disclose costs fairly.',b:['Splitting purchases across funds can defeat aggregation.','The recommendation is improper even if each individual purchase is otherwise suitable.','Good documentation includes the customer’s related holdings and intent.'],e:'Three $20,000 purchases recommended instead of one $60,000 purchase to avoid a $50,000 breakpoint are a red flag.'}
      ],['No-load funds still have operating expenses.','ROA uses existing holdings; LOI uses intended purchases.','Share-class comparison depends on time horizon and total cost.','Breakpoint sales are prohibited.'],{headers:['Feature','When it helps','Key condition'],rows:[['Breakpoint','Larger current purchase','Meets schedule threshold'],['ROA','Existing eligible holdings','Fund-family aggregation rules'],['LOI','Planned future purchases','Intent period and possible adjustment'],['CDSC','Defers initial charge','Redemption during charge period']]}),
      l16:D('FINRA outline 2.1.4',50,[
        {h:'Contract structure and phases',p:'A variable annuity is an insurance contract with an accumulation phase and a payout phase. During accumulation, purchase payments buy accumulation units in selected subaccounts. At annuitization, the contract converts value into an income stream measured through annuity units.',b:['The owner controls contract rights.','The annuitant is the life used for payment calculations.','The beneficiary receives the death benefit under contract terms.'],e:'Owner, annuitant and beneficiary can be different people; identify which role the question asks about.'},
        {h:'Separate account and general account',p:'Variable subaccounts are held in a separate account and fluctuate with investment performance. A fixed option is supported by the insurer’s general account and carries insurer claims-paying risk. Variable value is not guaranteed.',b:['Separate-account assets are segregated from general insurer liabilities under applicable law.','Subaccounts resemble funds but are available through the annuity contract.','Insurance riders and guarantees add costs and depend on contract terms.'],e:'A variable subaccount falls with its stock portfolio; the insurer does not restore the market loss merely because the product is an annuity.'},
        {h:'Tax treatment and distributions',p:'Nonqualified annuity contributions are generally after tax. Earnings grow tax deferred. Withdrawals are generally earnings first and taxable as ordinary income until gains are exhausted; an additional federal tax can apply before age 59½ unless an exception applies.',b:['Annuitized payments are partly basis recovery and partly taxable earnings under an exclusion calculation.','Tax deferral is not tax exemption.','An annuity inside an IRA usually adds no additional tax deferral.'],e:'A contract has $80,000 basis and $100,000 value. A nonannuitized withdrawal generally draws taxable earnings before basis.'},
        {h:'Charges, liquidity and replacement risk',p:'Mortality and expense charges, administrative fees, subaccount expenses and rider costs reduce value. Surrender charges limit early liquidity. Replacing one annuity can restart surrender periods and create new costs.',b:['A long time horizon is usually necessary.','The prospectus describes costs and risks.','The representative must consider age, liquidity, existing contracts and purpose.'],e:'A customer needing a home down payment in two years is poorly matched to a contract with a seven-year surrender schedule.'}
      ],['Variable annuity value depends on separate-account performance.','Tax deferred is not tax free.','Early withdrawals can face tax and surrender charges.','Replacement can restart costs.'],{headers:['Stage or account','Value measure','Primary event'],rows:[['Accumulation phase','Accumulation unit','Contributions and investment growth'],['Annuitization phase','Annuity unit','Contract value converted to payments'],['Separate account','Market-based subaccount value','Owner bears investment performance'],['General account','Insurer contractual promise','Owner bears insurer claims-paying risk']]}),
      l17:D('FINRA outline 2.1.5',44,[
        {h:'529 savings plans',p:'A 529 savings plan is a municipal fund security used for qualified education expenses. The account owner controls investments and distributions, while the beneficiary is the intended user. Options are selected from the plan menu rather than trading individual holdings.',b:['Contributions are not federally deductible.','Qualified distributions are generally federally tax free.','State deductions, credits and recapture rules vary.','The owner can often change to another qualifying family beneficiary.'],e:'A parent owns the account for a child; the child does not automatically control withdrawals at adulthood.'},
        {h:'Prepaid tuition plans',p:'A prepaid plan purchases tuition units or credits under plan rules, usually for specified participating institutions or tuition categories. It shifts part of tuition inflation risk according to the plan’s guarantee and limitations.',b:['Savings plans are market based.','Prepaid plans focus on future tuition benefits.','Room, board and other costs may be treated differently.'],e:'If a question emphasizes locking in future tuition rather than investing a portfolio, think prepaid.'},
        {h:'ABLE accounts',p:'ABLE accounts are tax-advantaged accounts for eligible individuals with disabilities. Qualified disability-expense distributions generally receive favorable federal treatment, and rules address eligibility, contributions and benefit interactions.',b:['The designated beneficiary is also the eligible individual.','Qualified expenses are broader than education alone.','Contribution and eligibility rules can change, so the SIE focuses on purpose and structure.'],e:'Housing, education and disability-related support can be qualifying categories under the program rules.'},
        {h:'LGIPs and distribution channels',p:'Local government investment pools combine short-term funds of participating public entities for professional cash management. Municipal fund securities can be sold directly by a plan or through financial professionals, creating different cost structures.',b:['LGIP participants are governmental entities, not ordinary retail college savers.','Direct-sold plans generally avoid adviser sales compensation.','Adviser-sold plans may include additional services and costs.'],e:'A county pools temporary cash with other local entities: LGIP, not a retail mutual fund.'}
      ],['529 owner controls; beneficiary benefits.','Savings plan is market based; prepaid plan focuses on tuition units.','ABLE supports qualified disability expenses.','LGIP serves public entities.'],{headers:['Product','Primary user','Primary purpose'],rows:[['529 savings','Families/education savers','Qualified education investment account'],['Prepaid tuition','Education savers','Future tuition benefits'],['ABLE','Eligible disabled individual','Qualified disability expenses'],['LGIP','State/local public entities','Short-term public cash management']]}),
      l18:D('FINRA outline 2.1.6–2.1.8',50,[
        {h:'DPP and limited-partnership structure',p:'A direct participation program passes income, gain, loss, deductions and credits through to investors, subject to tax rules. General partners manage and have broader liability; limited partners supply capital and preserve limited liability by remaining passive.',b:['DPP interests are generally illiquid.','Tax benefits depend on investor circumstances and passive-activity rules.','Partnership cash distributions and taxable income are not always the same.'],e:'A partnership can allocate taxable income even when it does not distribute equivalent cash.'},
        {h:'Tenants in common and direct ownership',p:'A tenants-in-common program gives investors fractional undivided interests in real property. Investors have direct ownership attributes but can face management, financing, concentration and resale limitations.',b:['TIC is different from owning shares of a REIT.','Unanimous consent requirements can make decisions difficult.','Illiquidity and valuation are central risks.'],e:'Ten investors directly own fractions of one property: concentrated real-estate exposure, not a diversified traded fund.'},
        {h:'REIT types and tax structure',p:'Equity REITs own real property; mortgage REITs finance real estate; hybrid REITs combine both. Listed REITs trade on exchanges, registered non-listed REITs file with the SEC but lack exchange liquidity, and private REITs have limited access and disclosure.',b:['Qualifying REITs can avoid entity-level federal tax by meeting requirements including income distribution.','REIT dividends are not municipal tax-exempt interest.','Non-listed REIT valuation and redemption programs can be limited.'],e:'A registered REIT with no exchange listing can be difficult to sell even though it files public reports.'},
        {h:'Hedge funds and private pools',p:'Hedge funds are private investment pools using flexible strategies such as leverage, short selling and derivatives. They commonly require high minimums, restrict redemptions and are available only to qualifying investors.',b:['Partnership structures and performance fees are common.','Limited liquidity can prevent exit during stress.','Strategy flexibility can increase complexity and risk.'],e:'A quarterly redemption window with a lockup means an investor cannot assume daily access to funds.'}
      ],['Pass-through does not mean guaranteed tax benefit.','Limited partners must remain passive to preserve limited liability.','Listed and non-listed REITs have very different liquidity.','Hedge funds can use leverage and restrict redemptions.'],{headers:['Product','Ownership form','Liquidity'],rows:[['DPP limited partnership','Partnership interest','Generally low'],['TIC','Direct fractional real estate','Generally low'],['Listed REIT','Exchange-traded shares','Higher'],['Non-listed REIT','Registered shares without exchange','Limited'],['Hedge fund','Private fund interest','Restricted']]}),
      l19:D('FINRA outline 2.2',52,[
        {h:'Market, capital and business risk',p:'Market or systematic risk is broad price movement affecting many securities and cannot be diversified away. Nonsystematic risk is issuer or industry specific and can be reduced through diversification. Capital risk is the possibility of losing invested principal.',b:['Concentration increases nonsystematic risk.','A broad market decline can hurt a diversified portfolio.','Business risk reflects an issuer’s operations and competitive position.'],e:'Owning 30 technology stocks reduces single-company risk but retains sector concentration and broad market risk.'},
        {h:'Credit, liquidity and political risk',p:'Credit risk is failure to meet financial obligations. Liquidity risk is inability to sell promptly near fair value. Political and regulatory risk arise from government actions, instability or legal changes.',b:['Lower credit quality usually requires higher promised yield.','A quoted value is less useful without a reliable market.','Sovereign actions can affect foreign securities and currencies.'],e:'A non-listed REIT may publish an estimated value but still be difficult to sell—that is liquidity risk.'},
        {h:'Rate, reinvestment, inflation and prepayment',p:'Interest-rate risk is the price effect of changing rates, especially on fixed-rate debt. Reinvestment risk is receiving cash that can only earn a lower rate. Inflation risk is loss of purchasing power. Prepayment risk is early principal return, especially from mortgage pools.',b:['Long maturity and low coupon increase rate sensitivity.','Callable bonds expose investors to reinvestment risk when rates fall.','Fixed payments are vulnerable to unexpected inflation.'],e:'Rates fall, an issuer calls a high-coupon bond and the investor must reinvest at 3% instead of 6%.'},
        {h:'Currency risk and international exposure',p:'Currency changes affect the dollar value of foreign investment returns. A foreign asset can gain locally but lose after translation into dollars. ADRs reduce trading friction but not exchange-rate exposure.',b:['Strong dollar can reduce translated foreign returns.','Weak dollar can increase translated returns.','Currency hedges can reduce but not eliminate exposure and have costs.'],e:'Local shares rise 5%, but the foreign currency falls 8% against the dollar; the U.S. investor can have a dollar loss.'},
        {h:'Mitigation: diversify, rebalance, hedge',p:'Diversification spreads specific exposure across issuers, sectors or asset classes. Rebalancing restores target weights after market movement. Hedging adds an offsetting position but introduces cost and basis risk.',b:['Diversification does not guarantee profit.','Rebalancing can mean selling outperformers and buying underweights.','A hedge can be imperfect if the instrument does not closely match the exposure.'],e:'Index puts may offset a broad portfolio decline, but a technology-heavy portfolio may not move exactly like the chosen index.'}
      ],['Systematic stays; nonsystematic can be diversified.','Liquidity is the ability to exit near fair value.','Call and prepayment risk often lead to reinvestment risk.','Hedging changes risk; it does not erase all risk.'],{headers:['Risk','Best clue','Common exposure'],rows:[['Credit','Issuer may not pay','Corporate/municipal debt'],['Interest rate','Rates change price','Long fixed-rate bonds'],['Reinvestment','Cash must earn less','Callable bonds/MBS'],['Inflation','Purchasing power declines','Fixed payments'],['Liquidity','Cannot sell efficiently','DPP/non-listed REIT'],['Currency','Exchange rate changes return','ADRs/foreign securities']]}),
      l20:D('FINRA outline 3.1.1',54,[
        {h:'Market and limit orders',p:'A market order seeks immediate execution at the best available price but does not guarantee price. A limit order sets the worst acceptable price—maximum for a buy, minimum for a sell—but may not execute.',b:['Buy limit executes at limit or lower.','Sell limit executes at limit or higher.','Fast markets can create market-order slippage.'],e:'Stock is 50. A buy limit at 48 cannot execute at 49 and may never execute.'},
        {h:'Stop and stop-limit orders',p:'A stop order becomes a market order when the stop price is reached. A buy stop is placed above the market; a sell stop below. A stop-limit becomes a limit order after triggering, controlling price but risking no execution.',b:['Sell stop can protect a long position.','Buy stop can protect a short position or enter on upward momentum.','Neither plain stop nor stop-limit guarantees the stop price as a fill.'],e:'A stock gaps from 30 to 24. A 28 sell stop activates and may fill near 24, not 28.'},
        {h:'Duration, discretion and solicitation',p:'A day order expires at the end of the trading day; a good-til-canceled order remains until executed, canceled or expired under firm policy. Solicited means the representative recommended the trade; unsolicited means the customer initiated it.',b:['Time-and-price discretion for the same day is narrower than full trading discretion.','Choosing security or amount generally requires written discretionary authority.','Order records identify solicited or unsolicited status.'],e:'A customer says “buy 100 shares today when you think the price is best”: time-and-price discretion, not authority to choose another stock.'},
        {h:'Quotes, spread and capacity',p:'The bid is what a dealer will pay; the ask is what a dealer will accept to sell. Customers generally sell at bid and buy at ask. The spread compensates market-making risk and service. Capacity tells whether the firm is agent or principal.',b:['Agency: broker represents a party and charges commission.','Principal: dealer trades inventory and earns markup/markdown.','Best execution requires reasonable diligence for favorable terms.'],e:'Quote 24.10–24.18: customer market buy near 24.18; customer market sell near 24.10.'},
        {h:'Long, short, bullish and bearish',p:'A long position owns a security and generally benefits from a price increase. A short stock position sells borrowed shares and benefits from a decline, but losses can be unlimited if price rises. Covered means an obligation has an offsetting position; naked means it does not.',b:['Long stock is bullish.','Short stock is bearish.','Short sellers must eventually buy shares to cover.','Dividends and corporate actions create obligations for short positions.'],e:'Sell short at 40 and cover at 28: $12 gain per share before costs. Cover at 55: $15 loss per share.'}
      ],['Market controls execution priority; limit controls price.','Stop becomes market; stop-limit becomes limit.','Customer buys at ask and sells at bid.','Short stock has unlimited upside-price risk.'],{headers:['Order','Trigger/condition','Primary tradeoff'],rows:[['Market','Immediate availability','Price uncertainty'],['Limit','Specified price or better','Execution uncertainty'],['Stop','Stop reached, then market','Gap risk'],['Stop-limit','Stop reached, then limit','May not execute'],['GTC','Remains open','Firm expiration policy']]}),
      l21:D('FINRA outline 3.1.2–3.1.4',56,[
        {h:'Components and measurement of return',p:'Total return combines income received with realized and unrealized changes in value. Realized gain occurs after sale; unrealized gain exists while the position is held. Return of capital gives part of the investor’s own basis back and generally reduces basis.',b:['Interest is debt income; dividends are equity distributions.','A basis point is 0.01 percentage point.','Benchmarks provide context but must match the strategy to be meaningful.'],e:'A stock rises from 40 to 43 and pays $1: total dollar return is $4 per share before costs, even if the stock is unsold.'},
        {h:'Dividend timeline',p:'The board declares a dividend and establishes record and payable dates. The ex-dividend date is the first day a buyer is not entitled to that dividend. Under regular-way settlement, an investor generally buys before ex-date to receive it.',b:['Declaration: board announces dividend.','Ex-date: stock begins trading without dividend entitlement.','Record: issuer determines holders of record.','Payable: issuer distributes dividend.'],e:'Buying on the ex-dividend date is too late to receive the declared dividend.'},
        {h:'Regular-way settlement and possession',p:'Most U.S. stock and corporate bond transactions settle one business day after trade date, T+1. Cash settlement occurs on trade date by agreement. Book-entry ownership uses electronic records rather than physical certificates.',b:['Trade date is execution; settlement date is exchange of funds and securities.','Failure to pay or deliver can create account restrictions or buy-ins.','Municipal and government products follow applicable settlement conventions.'],e:'A stock bought Monday usually settles Tuesday if both are business days.'},
        {h:'Stock splits and basis',p:'A forward split increases shares and reduces price per share proportionally; a reverse split reduces shares and raises price proportionally. Total position value and aggregate cost basis are unchanged at the instant of the split, while per-share basis adjusts.',b:['3-for-2: shares × 1.5; price and per-share basis ÷ 1.5.','1-for-5 reverse: shares ÷ 5; price and per-share basis × 5.','Splits do not create economic wealth by themselves.'],e:'100 shares at $60 after a 3-for-2 split become 150 shares around $40; total value remains $6,000 initially.'},
        {h:'Other corporate actions',p:'Tender offers invite holders to sell under stated terms. Exchange offers propose exchanging one security for another. Buybacks reduce public shares; rights offerings let holders buy new shares. Mergers can pay cash, stock or both. Proxy materials support shareholder voting.',b:['Deadlines and delivery instructions matter.','Short positions can owe distributions or adjusted securities.','Corporate actions can adjust options and other contracts.'],e:'A shareholder receives a deadline to tender shares for $35 cash; doing nothing can mean the shares remain outstanding after the offer closes.'}
      ],['Total return includes income and value change.','Buy before ex-date to receive the dividend.','Current regular-way equity settlement is T+1.','Splits change units, not immediate total value.'],{headers:['Event','Share count','Per-share price/basis'],rows:[['Forward split','Increases','Decreases proportionally'],['Reverse split','Decreases','Increases proportionally'],['Cash dividend','Unchanged','Market adjusts; income paid'],['Stock dividend','Increases','Adjusts proportionally']]}),
      l22:D('FINRA outline 3.2.1–3.2.2',60,[
        {h:'Cash, margin and options accounts',p:'In a cash account, the customer pays in full by settlement. A margin account uses broker-dealer credit and eligible securities as collateral. An options account requires specific approval based on financial information, experience and proposed strategies.',b:['Margin amplifies gains and losses.','A firm can liquidate positions under the margin agreement and may not need advance notice.','Not every security is margin eligible.'],e:'If an investor pays $25 for a $50 stock position using margin and the stock falls to $25, the investor’s equity can be wiped out before interest.'},
        {h:'Discretion and compensation models',p:'A nondiscretionary account requires customer approval for each trade. Full discretion over action, asset or amount generally requires written customer authority and firm acceptance. Fee-based accounts charge based on assets or service; commission accounts charge by transaction.',b:['Time-and-price discretion for a same-day order is limited.','Discretion must remain within customer objectives and firm supervision.','Frequent trading can make commissions expensive; little activity can make an asset fee costly relative to service.'],e:'“Buy 100 shares of ABC today when you think best” grants time and price only—not authority to choose XYZ.'},
        {h:'Individual, joint and entity registrations',p:'An individual account has one owner. Joint tenants with right of survivorship pass a deceased owner’s interest to surviving owners; tenants in common retain divisible interests that pass through the estate. Corporate and partnership accounts require documents proving authority.',b:['Joint registration affects ownership transfer, not investment risk.','Authorized traders do not become beneficial owners.','Entity resolutions identify who may act.'],e:'Two unrelated investors want separate fractional interests that pass through their estates: tenants in common is the logical registration.'},
        {h:'Trust and custodial accounts',p:'A trustee acts under the trust document for beneficiaries. A revocable trust can generally be changed by the grantor; an irrevocable trust generally cannot be freely revoked. UTMA/UGMA property is an irrevocable gift owned by the minor and managed by a custodian.',b:['Custodian controls; minor owns.','One custodian generally manages for one minor per account.','The custodian must use assets for the minor and transfers control at the statutory age.'],e:'A donor cannot reclaim UTMA assets after the completed gift because the minor is the beneficial owner.'},
        {h:'Retirement and education accounts',p:'Traditional and Roth IRAs differ in contribution and distribution tax treatment. Qualified employer plans follow plan and tax rules. Contributions, distributions and required minimum distribution rules depend on account type, age and current law. Education accounts restrict qualified uses.',b:['Traditional IRA distributions are generally taxable to the extent not basis.','Qualified Roth distributions can be tax free.','Early distributions can face tax and additional penalties unless an exception applies.'],e:'Do not assume every retirement withdrawal is tax free; identify the account and whether the distribution is qualified.'}
      ],['Account title controls ownership.','Custodian controls UTMA assets; minor owns them.','Margin can lead to losses beyond initial equity and forced sales.','Discretion requires proper written authority and supervision.'],{headers:['Registration','Owner','Authority source'],rows:[['Individual','One person','Account owner'],['JTWROS','Joint owners with survivorship','Joint agreement'],['TIC','Joint owners with divisible interests','Joint agreement'],['Trust','Trust/beneficiaries under document','Trust instrument'],['UTMA','Minor','Custodian under statute'],['Corporation','Entity','Resolution/organizational documents']]}),
      l23:D('FINRA outline 3.2.3–3.2.4',58,[
        {h:'Money-laundering stages and structuring',p:'Placement introduces illicit funds into the financial system. Layering moves funds through transactions to obscure the trail. Integration returns value in apparently legitimate form. Structuring breaks transactions into smaller amounts to evade reporting and is itself a red flag.',b:['A transaction below a threshold can still be suspicious.','Patterns and customer context matter more than one isolated amount.','Representatives escalate through firm procedures rather than investigating personally.'],e:'Repeated cash deposits just below a reporting level followed by international wires can indicate structuring and layering.'},
        {h:'AML program and customer identification',p:'A broker-dealer AML program includes risk-based policies, independent testing, responsible personnel and ongoing training. Customer identification procedures collect and verify identity information. FinCEN administers U.S. anti-money-laundering rules and reporting.',b:['Know the customer’s identity and expected activity.','Monitor for unusual transactions.','Maintain required records and respond through escalation channels.'],e:'A newly opened low-income retail account suddenly receives large third-party wires inconsistent with its profile: escalate.'},
        {h:'CTR, SAR, OFAC and sanctions',p:'A Currency Transaction Report addresses qualifying cash activity. A Suspicious Activity Report addresses suspicious conduct meeting applicable standards; SAR filing is confidential from the subject. OFAC administers sanctions and the SDN list.',b:['CTR is not a substitute for a SAR.','Never tell the customer a SAR was filed.','Sanctions can require rejecting or blocking activity under procedures.'],e:'A customer asks whether the firm reported a suspicious wire. The representative must not disclose a SAR filing.'},
        {h:'Books, records and customer communications',p:'Firms create and preserve specified account records, confirmations and statements. Confirmations describe trade details and capacity; statements summarize holdings and activity. Records must be accurate, accessible and protected from alteration.',b:['Falsifying a record is prohibited even with customer consent.','Holding customer mail requires written instructions and controls.','Business continuity plans address significant disruptions and customer access.'],e:'A customer asks the representative to sign a missing form “for convenience.” The representative must decline.'},
        {h:'Privacy and custody safeguards',p:'Regulation S-P addresses nonpublic personal information, privacy notices and safeguards. Customer information should be used and shared only under legal and firm requirements. Customer-protection rules separate and safeguard customer assets.',b:['Nonpublic personal information includes financial and identifying data.','Dispose of sensitive records securely.','Verify authority before releasing information.'],e:'A caller knows an account number but is not an authorized person; that knowledge alone does not permit disclosure.'}
      ],['Place → layer → integrate.','Structuring is a suspicious evasion pattern.','SAR filings are confidential.','Regulation S-P protects nonpublic personal information.'],{headers:['Control/report','Primary purpose','Key trap'],rows:[['CIP','Verify customer identity','Not a one-time substitute for monitoring'],['CTR','Report qualifying cash activity','Cash report, not suspicion report'],['SAR','Report qualifying suspicious conduct','Never tip off subject'],['OFAC screening','Apply sanctions restrictions','Separate from ordinary credit review']]}),
      l24:D('FINRA outline 3.2.5',54,[
        {h:'Communication categories and standards',p:'FINRA communication rules distinguish correspondence, retail communications and institutional communications based on audience and distribution. All communications must be fair, balanced and not false, exaggerated or misleading.',b:['Benefits must be presented with material risks.','Predictions and performance claims require proper context.','Required review and approval depend on the communication type and firm procedures.'],e:'An ad accurately states a fund’s return but omits unusually high risk and fees; accuracy of one number does not make the message balanced.'},
        {h:'Telemarketing and do-not-call',p:'Telephone solicitations are subject to time restrictions, identification requirements and do-not-call rules, with limited exceptions. Firms maintain procedures and records for customer requests.',b:['An existing relationship can create a limited exception under applicable rules.','A customer’s firm-specific do-not-call request must be honored.','Caller identity and purpose cannot be concealed.'],e:'A prospect asks the firm never to call again; the request belongs in the firm’s do-not-call process.'},
        {h:'Know your customer',p:'KYC requires reasonable diligence to know essential facts about the customer and the authority of anyone acting for the customer. Facts include identity, financial situation, tax status, objectives, time horizon, liquidity needs and other investments as relevant.',b:['KYC supports account servicing and compliance even without a recommendation.','Authority must be verified for agents, trustees and entity traders.','Customer information should be updated when material facts change.'],e:'Before accepting an order from someone claiming to represent a corporation, verify authority in the entity documents.'},
        {h:'Recommendations, suitability and Regulation Best Interest',p:'A recommendation is a call to action reasonably viewed as advice, not merely neutral education. Broker-dealer recommendations to retail customers trigger Regulation Best Interest, including disclosure, care, conflict and compliance obligations. Suitability rules remain relevant in applicable contexts.',b:['Consider risks, rewards, costs and reasonably available alternatives.','A product can be generally sound but wrong for a customer’s horizon or liquidity need.','Disclose and address material conflicts under the applicable standard.'],e:'A long-surrender annuity may be inappropriate for a customer who needs the money in two years even if the annuity is a legitimate product.'},
        {h:'Prohibited promises and misleading registration claims',p:'Representatives may not guarantee a customer against investment loss or say the SEC approves a security’s merits. Registration means required filings or status—not endorsement.',b:['“Guaranteed” may be accurate only when describing an actual contractual guarantor and its limits.','Past performance never guarantees future results.','Balanced disclosure does not cure an unsuitable recommendation by itself.'],e:'“SEC registered and therefore safe” is misleading because registration is disclosure-based.'}
      ],['Fair and balanced means material risks accompany benefits.','KYC asks essential facts and authority.','Reg BI applies to broker-dealer retail recommendations.','No representative may guarantee against loss.'],{headers:['Concept','Core question','Typical evidence'],rows:[['KYC','Who is the customer and who may act?','Identity, authority, profile'],['Recommendation','Was there a call to action?','Context and language'],['Care obligation','Is this in the retail customer’s best interest?','Risk, cost, alternatives, profile'],['Fair communication','Is the message balanced and accurate?','Benefits plus material risks']]}),
      l25:D('FINRA outline 3.3.1–3.3.2',56,[
        {h:'Manipulation distorts genuine supply and demand',p:'Market manipulation intentionally creates a false or misleading appearance of activity or price. The label depends on the conduct, but the common element is artificial market influence rather than legitimate investment demand.',b:['Pump and dump: promote, inflate and sell.','Marking the close/open: trade to influence an official price.','Matched orders or wash trades: create false activity without genuine beneficial change.','Rumor manipulation: spread false information to move price.'],e:'A promoter secretly sells shares while publishing false claims that demand is exploding: pump and dump.'},
        {h:'Trading-ahead and quotation abuses',p:'Front running trades ahead of a known customer block order. Trading ahead of customer orders or research can misuse confidential information. Backing away means failing to honor a firm quotation under applicable rules. Interpositioning inserts an unnecessary party that harms execution.',b:['Best execution centers on reasonable diligence for favorable terms.','A firm cannot publish prices it does not intend to honor.','Customer order information must be protected.'],e:'A representative buys before entering a customer’s large buy order expecting the customer order to lift the stock: front running.'},
        {h:'Excessive trading, freeriding and customer harm',p:'Churning or excessive trading uses activity inconsistent with the customer’s profile to generate compensation. Freeriding in a cash account involves buying and selling without making required payment. Both can trigger restrictions and disciplinary issues.',b:['Turnover alone is not the full churning test; control, objectives and cost matter.','Profit does not make excessive trading acceptable.','Freeriding is different from short selling.'],e:'A conservative customer’s account turns over monthly solely to generate commissions: churning red flag.'},
        {h:'Material nonpublic information',p:'Information is material if a reasonable investor would consider it important and nonpublic until broadly disseminated and absorbed by the market. Insider-trading liability can involve insiders, misappropriators, tippers and tippees.',b:['Corporate officers are not the only possible insiders.','A tippee can inherit a duty when aware of the improper disclosure.','Trading, tipping and recommending can all create exposure.'],e:'An attorney learns a confidential merger through client work and trades: misappropriation of entrusted information.'},
        {h:'Penalties and the correct response',p:'Insider trading and manipulation can lead to regulatory sanctions, civil penalties, industry bars, disgorgement and criminal consequences. The exam response to possible MNPI is to stop, protect the information and escalate—not to verify it by trading.',b:['No completed merger or customer loss is required for the conduct to be serious.','Firm information barriers help control sensitive information.','Rumor status does not make information safe if the source breached a duty.'],e:'A friend says the tip came from an issuer executive. Do not trade because it is “only a rumor”; escalate the source and content.'}
      ],['Manipulation creates artificial activity or price.','Front running abuses customer order information.','Material and nonpublic are separate tests.','Tipper and informed tippee can both face liability.'],{headers:['Conduct','Core fact','Why prohibited'],rows:[['Pump and dump','False promotion plus selling','Artificial price and deception'],['Marking the close','Trades influence closing price','False benchmark/valuation'],['Front running','Trade before known customer order','Misuse of order information'],['Churning','Excessive activity for compensation','Customer abuse'],['Insider trading','MNPI plus breach/duty','Unfair informational misuse']]}),
      l26:D('FINRA outline 3.3.3',52,[
        {h:'Customer funds and securities',p:'Associated persons may not improperly use customer cash or securities. Guarantees against loss are prohibited. Sharing in customer accounts and borrowing or lending with customers are tightly restricted and generally require permitted relationships and firm procedures.',b:['Customer consent does not make misuse permissible.','Profit-and-loss sharing by an associated person is generally proportionate to financial contribution and requires approval.','Firm and rule exceptions are narrow; disclose before acting.'],e:'A representative reimburses a customer after a loss to preserve the relationship: an improper guarantee, even if well intended.'},
        {h:'IPO restrictions and unregistered activity',p:'FINRA rules restrict new-issue allocations to specified restricted persons to promote fair access. Unregistered persons may perform clerical tasks but may not solicit securities business, recommend securities, accept orders or receive transaction-based compensation.',b:['Job title does not determine registration; activity does.','Referral payments tied to transactions can signal prohibited compensation.','Passing the SIE alone does not permit order taking.'],e:'A receptionist receives a percentage of commissions for each customer order sourced: transaction compensation and registration red flag.'},
        {h:'Senior and vulnerable-adult protection',p:'Firms monitor for financial exploitation of specified adults and can use supervisory escalation and permitted temporary holds under applicable rules. Red flags include sudden beneficiaries, new caregivers, unusual wires and abrupt changes from established behavior.',b:['Do not diagnose or accuse the customer.','Document observations and follow escalation procedures.','Trusted contact information can help but does not create trading authority.'],e:'An older client suddenly liquidates a conservative portfolio to wire money to a new acquaintance: escalate promptly.'},
        {h:'Records, signatures and regulator requests',p:'Records must be truthful and complete. Signatures of convenience, backdating and withholding documents are prohibited. Associated persons must cooperate honestly with authorized regulatory requests and firm supervision.',b:['Customer permission does not authorize a false signature.','Deleting messages to avoid retention is misconduct.','Never alter a complaint or account document to improve appearances.'],e:'A customer says “just initial it for me.” The representative must use a proper correction or new signature process.'},
        {h:'Activities at other financial institutions',p:'Associated persons disclose outside securities accounts and follow notice/duplicate-statement requirements as applicable. The purpose is to let firms supervise outside trading and identify conflicts or prohibited conduct.',b:['Personal trading can create conflicts.','Beneficial interest and control matter.','Firm approval or notification may be required before opening the account.'],e:'A representative opens a brokerage account at another firm and hides it from the employer: supervision and reporting violation.'}
      ],['Consent does not legalize guarantees or false records.','Unregistered persons cannot solicit or take securities orders.','Trusted contacts do not gain account authority.','Escalate suspected exploitation through firm procedures.'],{headers:['Activity','General rule','Exam response'],rows:[['Borrowing from customer','Restricted; narrow exceptions/procedures','Disclose and obtain required approval'],['Sharing in account','Restricted and proportionate if permitted','Written approval and contribution analysis'],['Guaranteeing loss','Prohibited','Never promise reimbursement'],['Customer signature','Must be authentic','Use proper documentation process']]}),
      l27:D('FINRA outline 4.1',48,[
        {h:'Qualification, registration and association',p:'The SIE tests essential knowledge but does not itself create a registration. A person performing a registered function generally needs the appropriate representative-level qualification and association with a member firm.',b:['SIE can be taken without firm sponsorship.','Representative-level exams generally require firm association.','Registration categories correspond to permitted functions.'],e:'An individual passes the SIE but has no firm and no representative qualification: the individual may not solicit and execute securities business as a registered representative.'},
        {h:'Registered versus nonregistered activities',p:'Clerical or ministerial personnel can perform administrative work but cannot make recommendations, solicit customers, accept orders or receive transaction-based compensation. Determine required status from the function, not the title.',b:['Providing factual account status is different from recommending a trade.','Routing a call is different from accepting an order.','Compensation based on completed securities transactions strongly signals registered activity.'],e:'An assistant reads an account balance: clerical. The assistant tells the customer to buy a fund: recommendation requiring proper registration.'},
        {h:'Background checks, fingerprints and statutory disqualification',p:'Member firms investigate registration applicants and obtain required fingerprints. Statutory disqualification can arise from specified securities injunctions, bars, expulsions and certain convictions, potentially preventing or conditioning association.',b:['Not every complaint creates statutory disqualification.','Disclosure and disqualification are related but not identical.','False or omitted application information creates separate problems.'],e:'A reportable financial event may require Form U4 disclosure without automatically constituting statutory disqualification.'},
        {h:'Continuing education',p:'The Regulatory Element is FINRA-delivered continuing education assigned on an ongoing basis. The Firm Element is a member-designed training program based on the firm’s annual needs analysis and covered-person roles.',b:['CE continues after initial qualification.','Firm Element content should reflect products, rules and responsibilities.','Failure to complete required training can make a person inactive.'],e:'A firm trains representatives on a newly offered complex product: Firm Element. A FINRA online assignment: Regulatory Element.'},
        {h:'State registration and BrokerCheck',p:'State blue-sky laws can require registration of securities professionals and products within a state. BrokerCheck provides public registration, employment and disclosure information drawn from regulatory records.',b:['Federal registration does not erase all state requirements.','Public disclosures support investor due diligence.','Records must be updated accurately.'],e:'A person changes states and activities; the firm must consider both SRO and applicable state requirements.'}
      ],['SIE alone is not a license.','Function—not job title—determines registration need.','Disclosure is not the same as statutory disqualification.','Regulatory Element comes from FINRA; Firm Element from the firm.'],{headers:['Activity','Usually registered?','Reason'],rows:[['Recommend securities','Yes','Sales function'],['Accept customer order','Yes','Transaction function'],['Give account balance','No, if purely clerical','Ministerial information'],['Receive transaction-based referral pay','Registration red flag','Compensation tied to securities activity']]}),
      l28:D('FINRA outline 4.2',58,[
        {h:'Form U4 and continuing disclosure',p:'Form U4 is the application for registration and the ongoing disclosure record for an associated person. It includes employment, residential, criminal, regulatory, civil and financial information under specified questions. Amendments are required when reportable facts change.',b:['The individual and firm share responsibility for accuracy.','Material omissions and misleading filings are disciplinary matters.','Customer complaints and financial events can trigger review.'],e:'A registered person files for bankruptcy and tells no one: the firm must assess the event and any U4 amendment duty.'},
        {h:'Form U5 and termination',p:'Form U5 reports the end of an associated person’s registrations and states the reason for termination plus relevant disclosure. Firms file it; the individual can obtain and dispute information through regulatory procedures.',b:['Termination does not erase regulatory jurisdiction for earlier conduct.','Disclosure language must be accurate and complete.','Later developments can require an amended U5.'],e:'A person resigns while under internal review; the termination disclosure must accurately address the circumstances.'},
        {h:'Outside business activities',p:'A registered person generally gives prior written notice before participating in compensated business outside the member. The firm evaluates interference, customer confusion and potential conflicts, then can limit or prohibit the activity.',b:['Nonsecurities work can still be an OBA.','Payment may be cash, services or other value.','Informal supervisor awareness is not a substitute for required written notice.'],e:'Paid weekend tax preparation is an OBA even though it does not involve selling securities.'},
        {h:'Private securities transactions',p:'A private securities transaction is securities activity outside the regular course or scope of employment, often called selling away. Written notice is required; if compensation is involved, prior written approval and firm supervision as firm business may be required.',b:['Compensation includes ownership interests and indirect benefits.','No-compensation transactions can still require notice.','Calling a payment a consulting fee does not change the securities activity.'],e:'A representative raises money for a friend’s startup and receives shares: compensated PST.'},
        {h:'Gifts, entertainment and political contributions',p:'Gifts to employees of other firms are subject to applicable annual value limits, records and purpose standards. Business entertainment is analyzed separately and requires host attendance and legitimate business purpose. Municipal political-contribution rules can restrict business after contributions.',b:['Splitting or disguising gifts does not avoid limits.','Noncash compensation arrangements have product-specific restrictions.','Political rules seek to prevent pay-to-play influence.'],e:'Tickets sent without the host attending are more likely a gift; attending a legitimate client event can be entertainment under policy.'},
        {h:'Complaints and reportable events',p:'Written customer complaints are preserved and can trigger firm and regulatory reporting. Specified criminal charges or convictions, regulatory actions, civil matters, liens, judgments and bankruptcies require prompt review under the disclosure questions.',b:['A complaint need not be proven to create recordkeeping duties.','Financial distress can be reportable because it may create conduct risk.','Associated persons must respond truthfully to firm and regulatory inquiries.'],e:'Deleting a written complaint because the customer later withdraws it is improper; the original record still matters.'}
      ],['U4 begins and updates; U5 terminates.','OBA is outside business; PST is outside securities activity.','Written notice comes before participation.','Gifts and business entertainment are analyzed differently.'],{headers:['Event','Primary filing/notice','Timing concept'],rows:[['Begin/update registration','Form U4','Initial and prompt amendment'],['Terminate registration','Form U5','After termination; amend if needed'],['Paid outside business','OBA notice','Before participation'],['Outside securities deal','PST notice/approval','Before participation']]}),
      l29:D('FINRA outline foundation laws and 4.1–4.2',50,[
        {h:'Securities Act of 1933',p:'The 1933 Act focuses on securities offered and sold to the public. It uses registration and prospectus disclosure so investors receive material information, while exempt securities and transactions can avoid registration under stated conditions.',b:['Registration statement is filed with the SEC.','Prospectus is delivered to investors as required.','Antifraud liability applies even when an exemption is available.'],e:'A corporation’s first registered public stock sale is principally a 1933 Act event.'},
        {h:'Securities Exchange Act of 1934',p:'The 1934 Act created the SEC and regulates secondary markets, exchanges, broker-dealers, securities associations and ongoing issuer reporting. It also supplies major antifraud and market-manipulation authority.',b:['Broker-dealer registration is a 1934 Act framework.','Exchange-listed issuers file periodic reports.','Rule 10b-5 addresses deceptive conduct in securities transactions.'],e:'A manipulation scheme in exchange trading points toward the 1934 Act, not just new-issue law.'},
        {h:'The two 1940 Acts',p:'The Investment Company Act of 1940 regulates the structure and operation of investment companies such as mutual funds. The Investment Advisers Act of 1940 regulates investment advisers at the federal level and their disclosure and conduct framework.',b:['Investment company = pooled product structure.','Investment adviser = compensated securities advice.','A fund and the adviser managing it can be regulated under different 1940 Acts.'],e:'A mutual fund’s governance points to the Investment Company Act; its adviser’s registration points to the Advisers Act.'},
        {h:'SIPA and state blue-sky laws',p:'The Securities Investor Protection Act created SIPC and a liquidation process for customers of failed member broker-dealers. State blue-sky laws regulate securities activity within states and can apply alongside federal law.',b:['SIPA does not insure market performance.','State administrators can register and enforce within their jurisdiction.','Federal law can preempt some state securities registration but not every state authority.'],e:'A customer’s stock falls because the issuer performs badly: not a SIPA claim. Customer securities are missing after broker failure: SIPA/SIPC may be relevant.'},
        {h:'How to map the laws on exam day',p:'Identify the regulatory verb. “Offers a new issue” points to 1933; “trades, broker-dealers or manipulation” to 1934; “pooled company structure” to the Investment Company Act; “advises for compensation” to the Advisers Act.',b:['The laws overlap, so choose the most direct purpose.','SEC effectiveness is not merit approval.','Exempt does not mean free from antifraud rules.'],e:'Use “33 before; 34 market floor; funds and advice in 40” as a memory map, then verify the exact fact pattern.'}
      ],['1933 = new offering disclosure.','1934 = SEC, markets and broker-dealers.','Investment Company Act = fund structure.','Advisers Act = compensated securities advice.','SIPA/SIPC addresses failed broker-dealer custody, not investment loss.'],{headers:['Law','Primary center of gravity','Exam verb'],rows:[['Securities Act of 1933','New offerings','Register/disclose'],['Exchange Act of 1934','Markets and broker-dealers','Trade/report/enforce'],['Investment Company Act of 1940','Pooled products','Structure/operate'],['Advisers Act of 1940','Investment advisers','Advise for compensation'],['SIPA','Failed broker-dealer customer assets','Liquidate/restore custody']]}),

      Q('q50','d3','Capacity','medium','A broker-dealer sells a security from its own inventory to a customer. It acts as',

        ['Agency means acting on behalf of another party, not using firm inventory.','Correct. Dealer inventory means principal capacity.','A transfer agent maintains issuer ownership records.','Advice is not the capacity described by an inventory sale.'],'Inventory = principal; customer order representation = agency.'),
      Q('q51','d3','Orders','hard','A stock is at $30. Which order could help protect a long position if the price declines but does not guarantee the execution price?',
        ['Sell stop at $27','Buy stop at $33','Sell limit at $35','Buy limit at $27'],0,
        ['Correct. A sell stop below market activates during a decline, then becomes a market order.','A buy stop is typically used to enter or protect a short position as price rises.','A sell limit above market seeks a higher sale, not downside activation.','A buy limit would add stock rather than sell the existing long position.'],'Sell stops can trigger downside exits but can gap below the stop price.'),
      Q('q52','d3','Settlement','easy','Under the current regular-way standard in the FINRA SIE outline, most U.S. stock trades settle',
        ['on trade date.','one business day after trade date.','two business days after trade date.','five calendar days after trade date.'],1,
        ['Same-day settlement is cash settlement, not regular way.','Correct. The standard is T+1.','T+2 is obsolete for these transactions and remains a common outdated-study trap.','Settlement is expressed in business days, and this period is too long.'],'Current regular-way settlement is T+1.'),
      Q('q53','d3','Dividends','medium','To receive a declared regular cash dividend, an investor generally must purchase the stock',
        ['on or after the ex-dividend date.','before the ex-dividend date.','after the payable date.','only on the record date after the close.'],1,
        ['A buyer on or after ex-date does not receive that dividend.','Correct. Buy before the stock goes ex-dividend.','The payable date comes after entitlement is determined.','Waiting until the record date is generally too late under regular-way settlement.'],'Buy before ex-date to receive the dividend.'),
      Q('q54','d3','Corporate actions','easy','An investor owns 100 shares at $60 immediately before a 3-for-2 stock split. Immediately after, the position is approximately',
        ['150 shares at $40.','150 shares at $60.','66 shares at $90.','100 shares at $40.'],0,
        ['Correct. Shares multiply by 1.5 and price divides by 1.5; total value initially remains $6,000.','This would manufacture $3,000 of value from the split.','This resembles an inverse adjustment and uses the wrong share count.','Both the share count and price must adjust.'],'Split: shares multiply, price divides, value initially unchanged.'),
      Q('q55','d3','Returns','medium','Which item is included in an investment’s total return?',
        ['Only realized capital gains','Income plus realized and unrealized price change over the measurement period','Only dividends','Only return of capital'],1,
        ['Ignoring income and unrealized change understates total return.','Correct. Total return combines income and change in value.','Dividends are one component, not the whole measure.','Return of capital has separate basis implications and is not by itself total return.'],'Total return combines income and price change.'),
      Q('q56','d3','Accounts','easy','Assets in a UTMA account legally belong to the',
        ['custodian.','minor.','broker-dealer.','donor until the minor turns 18.'],1,
        ['The custodian manages the property but does not own it.','Correct. The transfer is an irrevocable gift to the minor.','The broker-dealer carries the account but is not beneficial owner.','The donor gives up ownership when the gift is completed.'],'UTMA: minor owns; custodian controls.'),
      Q('q57','d3','Accounts','medium','A representative chooses the security and amount to buy for a customer. This generally requires',
        ['only verbal time-and-price discretion.','written discretionary authority and firm acceptance.','no customer authorization if the trade is profitable.','approval from SIPC.'],1,
        ['Time-and-price discretion is narrower and does not include choosing security and amount.','Correct. These choices are substantive discretion.','Profit does not cure unauthorized trading.','SIPC has no role in account trading authorization.'],'Security or amount discretion requires proper written authority.'),
      Q('q58','d3','Margin','medium','Which statement about a margin account is accurate?',
        ['Losses are limited to the initial deposit in every case.','The firm extends credit and may liquidate positions under the margin agreement.','It is insured against market declines.','It cannot hold equity securities.'],1,
        ['Leverage can produce losses exceeding the initial equity.','Correct. Margin is a lending arrangement with liquidation rights.','No market-loss insurance applies.','Equities are commonly held in margin accounts if eligible.'],'Margin magnifies outcomes and permits forced liquidation.'),
      Q('q59','d3','Accounts','medium','Authority for a trustee to trade a trust account is primarily established by the',
        ['trust document.','beneficiary’s casual instruction.','representative’s discretion.','issuer’s prospectus.'],0,
        ['Correct. The governing document defines trustee powers.','A beneficiary may not have authority to direct the trustee.','The representative cannot create legal authority.','An issuer document describes a security, not trust powers.'],'Account authority comes from the governing registration document.'),
      Q('q60','d3','Retirement','medium','Which statement is most accurate about retirement accounts?',
        ['Every withdrawal is tax free.','Account rules can restrict contributions and distributions, and tax treatment depends on account type.','They may never hold securities.','SIPC guarantees retirement returns.'],1,
        ['Traditional account distributions are often taxable; Roth treatment has conditions.','Correct. The registration and tax status determine the rules.','Retirement accounts commonly invest in securities.','SIPC does not guarantee investment return.'],'Identify the retirement account type before applying tax rules.'),
      Q('q61','d3','AML','easy','Breaking a large cash transaction into smaller transactions to evade reporting is called',
        ['layering only.','structuring.','annuitization.','interpositioning.'],1,
        ['Layering obscures the money trail broadly, but the threshold-evasion pattern has a specific name.','Correct. Structuring is itself suspicious and can be illegal.','Annuitization converts an annuity value into income payments.','Interpositioning inserts an unnecessary party into trade execution.'],'Structuring = breaking up transactions to evade reporting.'),
      Q('q62','d3','AML','medium','After a firm files a Suspicious Activity Report about a customer, the representative should',
        ['tell the customer so the customer can respond.','keep the filing confidential and follow firm procedures.','close every related account immediately without review.','post the filing in the account’s public notes.'],1,
        ['Telling the customer can constitute prohibited tipping off.','Correct. SAR confidentiality is essential.','A SAR does not automatically dictate immediate closure; follow legal and firm procedures.','The report must not be exposed to the customer or public.'],'SAR filed? Do not tip off the customer.'),
      Q('q63','d3','AML','medium','Which sequence reflects the classic stages of money laundering?',
        ['Integration, placement, layering','Placement, layering, integration','Layering, integration, placement','Placement, integration, underwriting'],1,
        ['This reverses entry and legitimization.','Correct. Funds enter, the trail is obscured, then wealth appears legitimate.','Placement must occur before the illicit funds can be layered in the system.','Underwriting is not a money-laundering stage.'],'Place → layer → integrate.'),
      Q('q64','d3','Privacy','medium','Regulation S-P primarily addresses',
        ['customer nonpublic personal information and safeguards.','municipal underwriting spreads.','options strike-price adjustments.','Treasury auctions.'],0,
        ['Correct. It governs privacy notices, disclosure and safeguarding of customer information.','Municipal pricing is addressed by other rules.','Options adjustments are an OCC/market-structure matter.','Treasury auctions are unrelated to consumer financial privacy.'],'Reg S-P = privacy and safeguards.'),
      Q('q65','d3','Communications','easy','Which statement in a retail communication is most clearly improper?',
        ['“Past performance does not guarantee future results.”','“This registered investment is SEC approved and cannot lose money.”','“Fees reduce investment returns.”','“Read the prospectus before investing.”'],1,
        ['This is a proper caution.','Correct. Registration is not approval, and loss cannot be ruled out.','This is accurate and balanced.','Directing review of disclosure is appropriate.'],'No SEC approval claim; no guarantee against loss.'),
      Q('q66','d3','Prohibited activities','medium','A representative buys stock before entering a customer’s known large buy order, expecting the order to raise the price. This is',
        ['front running.','a firm commitment.','a right of accumulation.','permitted hedging in every case.'],0,
        ['Correct. The representative improperly trades ahead of customer order flow.','Firm commitment describes underwriting risk.','ROA is a mutual-fund breakpoint feature.','Labeling conduct hedging does not automatically make trading ahead permissible.'],'Front running abuses knowledge of customer order flow.'),
      Q('q67','d3','Insider trading','hard','An employee tips a friend about a confidential acquisition, and the friend trades knowing the source. Which is most accurate?',
        ['Only the employee can face liability.','Only the friend can face liability.','Both tipper and informed tippee can face liability.','Neither can face liability until the acquisition closes.'],2,
        ['The tippee’s informed trading can also create exposure.','The tipper’s improper disclosure can create exposure even without personally trading.','Correct. Liability can extend to both parties.','The information can be material before closing or even announcement.'],'Insider-trading exposure extends beyond traditional insiders.'),
      Q('q68','d3','Customer protection','hard','A customer asks a representative to sign the customer’s name on a form “for convenience.” The representative should',
        ['sign because the customer gave permission.','decline and follow proper documentation procedures.','sign only if no trade is involved.','ask an unregistered assistant to sign instead.'],1,
        ['Permission does not make a false signature acceptable.','Correct. Records must be authentic and procedures followed.','Falsification remains improper even without an immediate trade.','Delegating the falsification makes it no more permissible.'],'Customer consent cannot cure record falsification.'),
    ];

      Q('q73','d4','Outside activities','medium','A representative wants to operate a paid weekend tax-preparation business. The representative should generally',

    const extraBank = [{"id":"n101","domain":"d1","topic":"Regulators","difficulty":"easy","stem":"Which organization writes and enforces conduct rules for broker-dealers and administers the SIE exam?","choices":["The SEC","FINRA","The Federal Reserve","The FDIC"],"correct":1,"reasons":["The SEC is the federal regulator that oversees FINRA; it does not administer the SIE.","Correct. FINRA is the SRO for broker-dealers and administers qualification exams including the SIE.","The Federal Reserve conducts monetary policy; it does not regulate broker-dealer sales practice.","The FDIC insures eligible bank deposits."],"takeaway":"FINRA = broker-dealer SRO and exam administrator, under SEC oversight."},{"id":"n102","domain":"d1","topic":"Regulators","difficulty":"medium","stem":"A registered representative wants to know which body has ultimate federal statutory authority over the securities markets. The answer is the","choices":["MSRB","SEC","SIPC","NYSE"],"correct":1,"reasons":["The MSRB writes municipal rules under SEC oversight.","Correct. The SEC administers the federal securities laws and oversees the SROs.","SIPC protects customer assets in a member failure; it is not a market regulator.","The NYSE is an exchange/SRO subject to SEC oversight."],"takeaway":"The SEC sits at the top of the federal regulatory structure."},{"id":"n103","domain":"d1","topic":"Regulators","difficulty":"medium","stem":"The Federal Reserve Board most directly influences the economy by","choices":["registering new securities offerings","setting fiscal tax policy","conducting monetary policy such as open-market operations","insuring brokerage accounts"],"correct":2,"reasons":["Registration of offerings is an SEC function.","Taxation and spending are fiscal policy set by Congress and the President.","Correct. The FRB conducts monetary policy, including open-market operations, the discount rate and reserve requirements.","SIPC, not the Fed, addresses brokerage-account custody protection."],"takeaway":"Fed = monetary policy; Congress/President = fiscal policy."},{"id":"n104","domain":"d1","topic":"Investor protection","difficulty":"medium","stem":"SIPC protection applies when","choices":["a customer’s stock loses half its value","a SIPC-member broker-dealer fails and customer assets are missing","a mutual fund underperforms its benchmark","a bond issuer defaults on interest"],"correct":1,"reasons":["Market losses are never covered by SIPC.","Correct. SIPC helps return customer cash and securities when a member broker-dealer becomes insolvent.","Underperformance is a market outcome, not a SIPC event.","Issuer default is credit risk borne by the investor."],"takeaway":"SIPC covers missing custody assets in a member failure, not investment loss."},{"id":"n105","domain":"d1","topic":"Investor protection","difficulty":"hard","stem":"SIPC coverage limits are generally","choices":["$250,000 total per customer including a $250,000 cash sublimit","$500,000 per customer including up to $250,000 for cash claims","$100,000 with no cash sublimit","unlimited for all securities"],"correct":1,"reasons":["That understates the total securities protection.","Correct. SIPC covers up to $500,000 per customer, of which up to $250,000 may be for cash.","That figure is outdated and too low.","SIPC protection is capped, not unlimited."],"takeaway":"SIPC: up to $500,000 per customer, $250,000 cash sublimit."},{"id":"n106","domain":"d1","topic":"Participants","difficulty":"easy","stem":"A broker-dealer acting as agent for a customer and charging a commission is functioning as a","choices":["principal","dealer","broker","market maker"],"correct":2,"reasons":["A principal trades from inventory and earns a markup.","Dealer capacity means principal trading.","Correct. Acting for a customer and charging commission is agency (broker) capacity.","A market maker quotes and trades as principal."],"takeaway":"Agent + commission = broker capacity; principal + markup = dealer."},{"id":"n107","domain":"d1","topic":"Participants","difficulty":"medium","stem":"A market maker is best described as a firm that","choices":["maintains issuer ownership records","stands ready to buy and sell a security by publishing firm quotes","audits member firms for FINRA","guarantees listed options contracts"],"correct":1,"reasons":["That describes a transfer agent.","Correct. A market maker publishes two-sided quotes and provides liquidity as principal.","FINRA staff examine members; that is not a market maker.","The OCC guarantees listed options."],"takeaway":"Market maker = quotes both sides and provides liquidity from inventory."},{"id":"n108","domain":"d1","topic":"Participants","difficulty":"medium","stem":"The entity that maintains records of who owns a corporation’s registered securities and processes transfers is the","choices":["clearing corporation","transfer agent","underwriter","custodian bank"],"correct":1,"reasons":["A clearing corporation compares and settles trades.","Correct. The transfer agent maintains ownership records and cancels/issues certificates on transfer.","An underwriter distributes new issues.","A custodian holds assets but is not the issuer’s recordkeeper of ownership."],"takeaway":"Transfer agent = issuer’s ownership recordkeeper and transfer processor."},{"id":"n109","domain":"d1","topic":"Participants","difficulty":"hard","stem":"An introducing broker-dealer that operates on a fully disclosed basis","choices":["carries customer accounts and settles its own trades","forwards customer accounts to a clearing firm that carries them and settles trades","acts only as a market maker","writes rules for the exchanges"],"correct":1,"reasons":["A carrying/clearing firm performs those functions, not a fully disclosed introducing firm.","Correct. On a fully disclosed basis, the introducing firm sends accounts to a clearing firm that carries and settles them.","Introducing firms are defined by the clearing relationship, not solely market making.","Rulewriting is an SRO/SEC function."],"takeaway":"Introducing firm faces the customer; clearing firm carries assets and settles."},{"id":"n110","domain":"d1","topic":"Markets","difficulty":"easy","stem":"The market in which an issuer sells new securities and receives the proceeds is the","choices":["secondary market","primary market","third market","fourth market"],"correct":1,"reasons":["The secondary market trades outstanding securities.","Correct. Primary-market proceeds go to the issuer.","The third market is OTC trading of listed securities.","The fourth market is direct institution-to-institution trading."],"takeaway":"Proceeds to the issuer = primary market."},{"id":"n111","domain":"d1","topic":"Markets","difficulty":"medium","stem":"Trading of exchange-listed securities that occurs over the counter through dealers is called the","choices":["first market","second market","third market","fourth market"],"correct":2,"reasons":["The first market is exchange trading of listed securities.","“Second market” refers to OTC trading of unlisted securities.","Correct. The third market is OTC trading of exchange-listed securities.","The fourth market is direct institution-to-institution trading."],"takeaway":"Third market = listed securities traded OTC."},{"id":"n112","domain":"d1","topic":"Economics","difficulty":"medium","stem":"Which sequence correctly orders the business cycle phases?","choices":["Expansion, peak, contraction, trough","Peak, trough, expansion, contraction","Contraction, expansion, peak, trough","Trough, contraction, peak, expansion"],"correct":0,"reasons":["Correct. The cycle runs expansion, peak, contraction, trough and repeats.","This order is scrambled.","This order is scrambled.","This order is scrambled."],"takeaway":"Expansion, peak, contraction, trough."},{"id":"n113","domain":"d1","topic":"Economics","difficulty":"medium","stem":"A recession is commonly defined as","choices":["one quarter of falling stock prices","two or more consecutive quarters of declining real GDP","any month of rising unemployment","a single Fed rate increase"],"correct":1,"reasons":["Stock prices are not the technical definition of recession.","Correct. A common definition is two consecutive quarters of declining real GDP.","Unemployment is an indicator, not the definition.","A single rate move does not define a recession."],"takeaway":"Recession = two consecutive quarters of declining real GDP (common rule)."},{"id":"n114","domain":"d1","topic":"Economics","difficulty":"hard","stem":"If the Federal Reserve wants to tighten credit and slow inflation, it would most likely","choices":["buy Treasury securities in the open market","lower the discount rate","raise reserve requirements","reduce margin requirements"],"correct":2,"reasons":["Buying securities adds reserves and eases credit.","Lowering the discount rate encourages borrowing (easing).","Correct. Raising reserve requirements reduces lending capacity, tightening credit.","Lowering margin requirements encourages more securities credit."],"takeaway":"To tighten: sell securities, raise discount rate, raise reserve requirements."},{"id":"n115","domain":"d1","topic":"Economics","difficulty":"medium","stem":"Which indicator is generally considered a leading economic indicator?","choices":["Average duration of unemployment","Building permits for new housing","Corporate profits after tax","The prime rate charged by banks"],"correct":1,"reasons":["Duration of unemployment is a lagging indicator.","Correct. New building permits tend to lead the cycle.","Corporate profits are a coincident/lagging measure.","The prime rate is a lagging indicator."],"takeaway":"Building permits and new orders lead; unemployment duration and prime rate lag."},{"id":"n116","domain":"d1","topic":"Offerings","difficulty":"easy","stem":"The Securities Act of 1933 primarily governs","choices":["the trading markets and exchanges","the registration and disclosure of new securities offerings","investment adviser conduct","municipal bond arbitrage"],"correct":1,"reasons":["The 1934 Act governs the trading markets.","Correct. The 1933 Act (the paper act) covers registration and prospectus disclosure for new issues.","The Advisers Act of 1940 governs advisers.","No act specifically governs municipal arbitrage this way."],"takeaway":"1933 Act = new issues, registration and disclosure."},{"id":"n117","domain":"d1","topic":"Offerings","difficulty":"medium","stem":"A prospectus must generally be delivered to purchasers of","choices":["securities in a registered public offering","exempt municipal general obligation bonds","U.S. Treasury bills at auction","securities sold only to the issuer’s employees for no value"],"correct":0,"reasons":["Correct. Registered public offerings require prospectus delivery.","Municipal securities are generally exempt from 1933 Act registration and use an official statement.","U.S. government securities are exempt.","A no-value internal transfer is not a public offering."],"takeaway":"Registered public offering = prospectus delivery required."},{"id":"n118","domain":"d1","topic":"Offerings","difficulty":"hard","stem":"Regulation D private placements are most associated with sales to","choices":["the general public through advertising","accredited investors under an exemption from registration","only foreign investors","municipal issuers"],"correct":1,"reasons":["Reg D is a private, non-public exemption.","Correct. Reg D permits private placements primarily to accredited investors without full registration.","Reg S addresses offshore sales; Reg D is domestic.","Reg D governs issuers of securities generally, not only municipalities."],"takeaway":"Reg D = private placement exemption, accredited investors central."},{"id":"n119","domain":"d1","topic":"Offerings","difficulty":"medium","stem":"A tombstone advertisement for a new issue","choices":["constitutes an offer to sell the securities","is a limited announcement that identifies the issue and where to obtain a prospectus","guarantees the offering price","replaces the prospectus"],"correct":1,"reasons":["A tombstone is expressly not an offer.","Correct. A tombstone is a permitted announcement that points investors to the prospectus.","No price guarantee is implied.","It does not replace prospectus delivery."],"takeaway":"Tombstone = announcement, not an offer; points to the prospectus."},{"id":"n120","domain":"d1","topic":"Offerings","difficulty":"hard","stem":"Rule 144 most directly governs the","choices":["registration of a new IPO","sale of restricted and control (affiliate) securities","taxation of capital gains","margin on new issues"],"correct":1,"reasons":["Rule 144 addresses resales, not the IPO registration itself.","Correct. Rule 144 sets conditions (holding period, volume limits, current information) for reselling restricted and control securities.","Taxation is outside Rule 144.","Margin is governed by Reg T, not Rule 144."],"takeaway":"Rule 144 = reselling restricted/control stock under conditions."},{"id":"n121","domain":"d1","topic":"Offerings","difficulty":"medium","stem":"In a firm-commitment underwriting, the underwriter","choices":["acts only as agent and bears no inventory risk","purchases the entire issue from the issuer and assumes resale risk","guarantees the securities will rise in price","is exempt from all disclosure"],"correct":1,"reasons":["That describes best efforts, not firm commitment.","Correct. In firm commitment the underwriter buys the issue and takes the risk of reselling it.","No price appreciation is guaranteed.","Disclosure obligations still apply."],"takeaway":"Firm commitment = underwriter owns the issue and bears resale risk."},{"id":"n122","domain":"d1","topic":"Financial statements","difficulty":"medium","stem":"The accounting identity shown on a balance sheet is","choices":["revenue minus expenses equals net income","assets equal liabilities plus shareholders’ equity","cash inflows minus outflows equals net change","price divided by earnings equals the multiple"],"correct":1,"reasons":["That is the income statement relationship.","Correct. Assets = liabilities + shareholders’ equity is the balance-sheet identity.","That describes the cash-flow statement.","That is a valuation ratio, not a statement identity."],"takeaway":"Balance sheet: Assets = Liabilities + Equity (a snapshot in time)."},{"id":"n201","domain":"d2","topic":"Equity","difficulty":"easy","stem":"A common stockholder’s claim on assets in a corporate liquidation is","choices":["first, ahead of all creditors","ahead of preferred stockholders","last, after creditors and preferred stockholders","equal to secured bondholders"],"correct":2,"reasons":["Creditors are paid before owners.","Preferred has priority over common.","Correct. Common stock has the residual claim, paid last.","Bondholders are creditors and rank ahead of stockholders."],"takeaway":"Liquidation order: secured creditors, unsecured creditors, preferred, then common last."},{"id":"n202","domain":"d2","topic":"Equity","difficulty":"medium","stem":"Which right is normally associated with common stock but not with most preferred stock?","choices":["A fixed dividend rate","Voting for the board of directors","Priority in liquidation over common","A stated par value only"],"correct":1,"reasons":["A fixed dividend is a preferred feature.","Correct. Common shareholders generally vote; most preferred is non-voting.","Priority over common is a preferred feature.","Par value exists for both."],"takeaway":"Common votes; preferred typically gives up the vote for a fixed dividend and priority."},{"id":"n203","domain":"d2","topic":"Equity","difficulty":"medium","stem":"Cumulative preferred stock differs from straight preferred because","choices":["it never pays dividends","missed dividends accumulate and must be paid before common dividends resume","it always converts to common","it carries extra votes"],"correct":1,"reasons":["Cumulative preferred does pay dividends when declared
