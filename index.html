g preferred","May receive extra distributions beyond the stated dividend alongside common."],["d2","Callable preferred","The issuer may redeem the preferred at a set price after a set date."],["d2","Convertible security","Bond or preferred exchangeable for a fixed number of common shares."],["d2","Statutory voting","One vote per share per director; favors large/controlling holders."],["d2","Cumulative voting","Votes may be concentrated on fewer candidates; helps minority shareholders."],["d2","Preemptive right","Short-term privilege for existing holders to buy new shares and avoid dilution."],["d2","Warrant","Long-term instrument to buy stock at a set price; often a sweetener attached to other securities."],["d2","ADR","U.S.-traded receipt representing foreign company shares; carries currency risk."],["d2","REIT","Pooled real-estate vehicle that must distribute most taxable income; listed REITs are liquid."],["d2","BDC","Business development company; a pooled vehicle investing in small/mid-size private companies."],["d2","Ex-dividend date","On/after this date a buyer is not entitled to the declared dividend; price adjusts down."],["d2","Record date","Determines the shareholders of record entitled to a distribution."],["d2","Stock split","Forward split increases shares and lowers price proportionally; total value unchanged."],["d2","T-bill","Short-term (≤1 yr) Treasury security sold at a discount; no periodic coupon."],["d2","T-note","Intermediate-term (2–10 yr) Treasury security paying semiannual interest."],["d2","T-bond","Long-term (>10 yr) Treasury security paying semiannual interest."],["d2","TIPS","Treasury security whose principal adjusts with the CPI to protect purchasing power."],["d2","STRIPS","Zero-coupon Treasury created by separating a bond’s principal and interest."],["d2","GNMA (Ginnie Mae)","Government-backed mortgage pass-through; adds prepayment risk."],["d2","GO bond","Municipal bond backed by the issuer’s full faith, credit and taxing power."],["d2","Revenue bond","Municipal bond repaid from a specific project or facility’s revenues."],["d2","Debenture","Unsecured corporate bond backed only by the issuer’s general credit."],["d2","Mortgage bond","Corporate bond secured by a lien on real property."],["d2","Equipment trust certificate","Debt secured by specific equipment such as rail cars or aircraft."],["d2","Commercial paper","Short-term (≤270 days) unsecured corporate debt sold at a discount."],["d2","Banker’s acceptance","Short-term time draft used to finance international trade."],["d2","Negotiable CD","Large short-term bank deposit that trades in the money market."],["d2","Nominal yield","The fixed coupon rate stated on a bond as a percent of par."],["d2","Current yield","Annual coupon interest divided by the current market price."],["d2","Yield to maturity","Total return if a bond is held to maturity; for a discount bond, YTM > current yield > coupon."],["d2","Callable bond","Issuer can redeem early, usually when rates fall; creates call and reinvestment risk."],["d2","Zero-coupon bond","Bought at a discount, pays no periodic interest, matures at face value."],["d2","Investment grade","Ratings from AAA down to BBB (Baa); below that is high-yield (junk)."],["d2","Accrued interest","Interest earned since the last coupon that the buyer pays the seller at settlement."],["d2","Call option","Right to buy the underlying at the strike price (bullish)."],["d2","Put option","Right to sell the underlying at the strike price (bearish/protective)."],["d2","Premium","Option price = intrinsic value + time value; the buyer’s maximum loss."],["d2","Intrinsic value","The in-the-money amount of an option."],["d2","Long call breakeven","Strike price + premium paid."],["d2","Long put breakeven","Strike price − premium paid."],["d2","Covered call","Own stock and sell a call; income with capped upside and continuing downside."],["d2","Protective put","Own stock and buy a put; sets a floor under losses (insurance)."],["d2","Naked call","Sell a call without owning the stock; theoretically unlimited risk."],["d2","NAV","Net asset value per share = (assets − liabilities) ÷ shares outstanding."],["d2","POP","Public offering price = NAV + sales charge (front-end load funds)."],["d2","Forward pricing","Open-end fund orders execute at the next calculated NAV."],["d2","Class A shares","Front-end sales charge with breakpoint discounts; lower ongoing fees."],["d2","Class B shares","Back-end (contingent deferred) sales charge that declines over time; higher 12b-1."],["d2","Class C shares","Level load with higher ongoing 12b-1 fees; little/no front-end charge."],["d2","Breakpoint","Reduced sales charge for larger mutual fund purchases."],["d2","Letter of Intent (LOI)","Commitment to invest enough to reach a breakpoint, usually within 13 months."],["d2","Rights of accumulation (ROA)","Counts existing holdings’ value toward a breakpoint."],["d2","12b-1 fee","Annual asset-based fee for distribution and marketing."],["d2","Closed-end fund","Fixed share count that trades on an exchange, possibly above or below NAV."],["d2","ETF","Fund that trades intraday on an exchange; creation/redemption keeps price near NAV."],["d2","UIT","Fixed, unmanaged portfolio with a set termination date."],["d2","ETN","Unsecured bank debt linked to an index; carries issuer credit risk."],["d2","DPP","Direct participation program; pass-through tax treatment, limited liability, low liquidity."],["d2","Hedge fund","Private, lightly regulated pooled fund for accredited/qualified investors; often illiquid."],["d2","Non-traded REIT","REIT that does not trade on an exchange; illiquid with valuation/fee concerns."],["d2","Fixed annuity","Insurer guarantees a minimum rate and bears the investment risk (insurance product)."],["d2","Variable annuity","Tax-deferred contract with separate-account investment risk borne by the owner (a security)."],["d2","Accumulation unit","Measures the owner’s interest in a variable annuity separate account before payout."],["d2","Annuity unit","Used to calculate variable annuity payments during the payout phase."],["d2","Surrender charge","Declining fee for early withdrawal from a deferred annuity."],["d2","1035 exchange","Tax-free transfer between like insurance/annuity contracts."],["d2","529 plan","Municipal fund security for education; owner controls, beneficiary gets qualified benefits."],["d2","Systematic risk","Broad market risk that diversification cannot eliminate."],["d2","Nonsystematic risk","Issuer/industry-specific risk that diversification can reduce."],["d2","Interest-rate risk","Risk that rising rates lower existing bond prices (greatest for long maturities)."],["d2","Reinvestment risk","Risk of reinvesting cash flows at lower rates, worst when rates fall."],["d2","Credit (default) risk","Risk the issuer fails to pay interest/principal; gauged by ratings."],["d2","Liquidity risk","Risk of not selling quickly at a fair price; worst in thinly traded assets."],["d2","Inflation (purchasing-power) risk","Risk that rising prices erode fixed cash flows; hits long fixed-rate bonds hardest."],["d2","Call risk","Risk that an issuer redeems a bond early, forcing lower-yield reinvestment."],["d2","Prepayment risk","Mortgage principal returns earlier than expected, often at lower reinvestment rates."],["d2","Currency risk","Risk that exchange-rate moves reduce returns on foreign holdings."],["d2","Legislative risk","Risk that a change in law or regulation reduces an investment’s value."],["d3","Market order","Executes immediately at the best available price (speed over price)."],["d3","Buy limit","Buy at the limit price or lower; controls price, not execution."],["d3","Sell limit","Sell at the limit price or higher."],["d3","Sell stop","Set below the market; becomes a market order when triggered (protects longs)."],["d3","Buy stop","Set above the market; protects short positions or buys on breakouts."],["d3","Stop-limit","Becomes a limit order when triggered; may not fill if price runs past the limit."],["d3","Day order","Expires at the close of the trading day if unexecuted."],["d3","GTC order","Good-til-canceled; stays open until filled or canceled (subject to firm limits)."],["d3","FOK","Fill-or-kill; execute the entire order immediately or cancel it."],["d3","IOC","Immediate-or-cancel; take an immediate partial fill and cancel the rest."],["d3","AON","All-or-none; fill the entire order but not necessarily immediately."],["d3","Bid / ask","Dealer buys at the bid and sells at the ask; customers do the reverse."],["d3","Spread","Difference between the best bid and best ask; a cost of immediacy."],["d3","Short sale","Borrow and sell shares hoping to buy back lower; theoretically unlimited risk."],["d3","T+1 settlement","Regular-way settlement one business day after the trade (effective May 28, 2024)."],["d3","Ex-date","Buy on/after it and you miss the upcoming dividend; price adjusts down."],["d3","Tender offer","Public bid to buy shares, usually at a premium, by a deadline."],["d3","Spin-off","A subsidiary becomes a separate company; shares are distributed to existing holders."],["d3","Rights offering","Existing holders get first chance to buy new shares, often at a discount."],["d3","DK","“Don’t Know” — a firm disputes a trade because the details do not match."],["d3","Cash account","Customer pays in full for purchases; no borrowing."],["d3","Margin account","Customer borrows part of the purchase price under a margin agreement."],["d3","Regulation T","Fed rule governing the initial credit (margin) broker-dealers extend to customers."],["d3","JTWROS","Joint account where a decedent’s interest passes to the surviving tenant(s)."],["d3","Tenants in common","Joint account where a decedent’s share passes to their estate; ownership can be unequal."],["d3","UGMA/UTMA","Irrevocable gift owned by one minor and managed by one custodian."],["d3","Traditional IRA","Possibly deductible contributions; tax-deferred growth; taxable withdrawals."],["d3","Roth IRA","After-tax contributions; qualified withdrawals of contributions and earnings are tax-free."],["d3","TOD","Transfer-on-death registration that passes assets to beneficiaries, avoiding probate."],["d3","Discretionary account","Rep may choose action, amount or asset without prior approval (written authorization required)."],["d3","CIP","Customer Identification Program: verify name, DOB, address and TIN at account opening."],["d3","KYC","Know-your-customer: essential facts and the authority of anyone acting on the account."],["d3","Reg BI","Regulation Best Interest: act in a retail customer’s best interest (cost, risk, reward, alternatives)."],["d3","Reg S-P","Privacy rule requiring safeguards and privacy notices for customer information."],["d3","ODD","Options Disclosure Document delivered at or before options-account approval."],["d3","Insider trading","Trading on material nonpublic information in breach of a duty; prohibited."],["d3","MNPI","Material nonpublic information a reasonable investor would consider important."],["d3","Front running","Trading ahead of a known customer order to profit from its expected impact."],["d3","Churning","Excessive trading in an account mainly to generate commissions."],["d3","Marking the close","Trading near the close to set an artificial closing price; manipulation."],["d3","Selling away","Private securities transactions outside the firm without required notice/approval."],["d3","Commingling","Improperly mixing customer securities with firm assets; prohibited."],["d3","AML","Anti-money-laundering program required of firms under the Bank Secrecy Act."],["d3","SAR","Suspicious Activity Report; its filing must not be disclosed to the customer."],["d3","CTR","Currency Transaction Report for cash transactions over $10,000 in a day."],["d3","Structuring","Breaking up cash to evade reporting thresholds; illegal."],["d3","OFAC","Office of Foreign Assets Control; firms screen against its sanctions lists."],["d4","Form U4","Application that starts and updates an associated person’s registration and disclosures."],["d4","Form U5","Termination filing that reports why a registered person left."],["d4","CRD","Central Registration Depository storing U4/U5 data; much appears in BrokerCheck."],["d4","BrokerCheck","FINRA’s public tool showing registration and disclosure information."],["d4","Form BD","Application a firm files to register as a broker-dealer."],["d4","SIE exam","Foundational corequisite; combine with a top-off exam and firm association to transact business."],["d4","Statutory disqualification","Barred status from specified felonies or serious securities-related misconduct."],["d4","Regulatory Element","FINRA-administered continuing education required on a set cycle."],["d4","Firm Element","Firm-designed annual continuing education based on a needs analysis."],["d4","Outside business activity","Requires prior written notice to the employing firm."],["d4","Private securities transaction","Requires written notice; if compensated, firm approval and supervision."],["d4","Gift limit","Generally $100 per person per year for business-related gifts."],["d4","Retail communication","Distributed to more than 25 retail investors in any 30 days."],["d4","Correspondence","Written/electronic communication to 25 or fewer retail investors in 30 days."],["d4","Institutional communication","Communication distributed only to institutional investors."],["d4","Customer complaint","A written/electronic grievance about the account or a transaction that must be recorded."],["d4","Misrepresentation","A material misstatement or omission when recommending a security; prohibited."],["d4","Fingerprinting","Required for associated persons as part of registration/background checks."],["d4","Continuing commission","Compensation arrangement generally allowed only under specific conditions."],["d4","Code of conduct","Standards of ethical, fair dealing expected of associated persons."]];
    const flashcards = glossaryData.map((x,i)=>({id:'f'+(i+1),domain:x[0],front:x[1],back:x[2]}));

    const guideSections = [
      {id:'guide-markets',number:'01',title:'Markets, participants and the economy',summary:'Start with where a transaction occurs, who acts, and how money and securities move. These relationships make later rules easier to reason through.',points:[
        ['Primary market','An issuer sells new securities and receives capital. Example: a corporation sells newly issued bonds through an underwriting syndicate.'],
        ['Secondary market','Investors trade outstanding securities; the issuer receives no proceeds. Example: one shareholder sells listed stock to another investor.'],
        ['Policy signal','The Fed influences money and credit; Congress and the executive branch set taxes and spending. A Fed securities purchase generally adds reserves and eases credit.']
      ],table:{headers:['Concept','Plain-language rule','Useful contrast'],rows:[
        ['Broker vs. dealer','A broker acts for another party; a dealer trades from firm inventory.','Agency compensation is a commission; principal compensation can be a markup or markdown.'],
        ['Third vs. fourth market','Third: exchange-listed securities trade OTC. Fourth: institutions trade directly.','Neither term means a new issue.'],
        ['SEC vs. FINRA','The SEC is the federal regulator; FINRA is the broker-dealer SRO.','The SEC oversees FINRA and other SROs.']
      ]},example:'A firm sells a bond from its inventory to a customer. The trade is secondary-market and principal capacity: the issuer gets no proceeds, and the firm is acting as dealer.',questions:[
        {id:'G1Q1',type:'Multiple choice',prompt:'A city sells newly issued revenue bonds through an underwriter. Which market is involved?',choices:['A. Primary','B. Secondary','C. Third','D. Fourth'],answer:'A. Primary. The bonds are new and sale proceeds reach the municipal issuer.'},
        {id:'G1Q2',type:'Short answer',prompt:'Why does a Federal Reserve open-market sale usually put upward pressure on interest rates?',answer:'The buyers pay the Fed, which removes reserves from the banking system. Less available credit tends to put upward pressure on rates.'},
        {id:'G1Q3',type:'Scenario',prompt:'An institution sells exchange-listed shares directly to another institution without a broker-dealer. Name the market and explain why.',answer:'The fourth market. The defining fact is direct institution-to-institution trading without a broker-dealer intermediary.'}
      ]},
      {id:'guide-core-products',number:'02',title:'Equity and debt securities',summary:'Equity represents ownership; debt represents an issuer obligation. Most product questions ask about rights, payment priority, income certainty or the risk created by a feature.',points:[
        ['Common stock','Residual ownership with voting rights, limited liability and variable dividends. In liquidation, common shareholders are generally last.'],
        ['Preferred stock','Equity with dividend and liquidation priority over common. A cumulative feature carries missed dividends forward.'],
        ['Debt security','A contractual promise to pay interest and return principal. Credit quality, maturity and embedded calls shape the investor’s risk.']
      ],table:{headers:['Security','Investor position','High-yield risk or feature'],rows:[
        ['Common stock','Owner with residual claim','Market risk and uncertain dividends; greatest upside participation.'],
        ['Preferred stock','Owner with priority over common','Rate sensitivity and dividend omission; usually limited voting.'],
        ['Corporate bond','Creditor of a company','Credit and interest-rate risk; secured debt has identified collateral.'],
        ['Municipal bond','Creditor of a public issuer','GO uses taxing power; revenue debt uses project or facility receipts.']
      ]},example:'A 6% bond with $1,000 par pays $60 annually. If it trades at $1,200, current yield is $60 ÷ $1,200 = 5%; the coupon remains 6%.',questions:[
        {id:'G2Q1',type:'Multiple choice',prompt:'Which investor normally has the highest liquidation priority?',choices:['A. Common shareholder','B. Preferred shareholder','C. Secured bondholder','D. Warrant holder'],answer:'C. Secured bondholder. Creditors rank ahead of owners, and secured creditors have a claim on identified collateral.'},
        {id:'G2Q2',type:'Short answer',prompt:'Why does an existing fixed-rate bond usually fall in price when market rates rise?',answer:'New bonds offer more competitive coupons. The older bond’s price falls so its yield can adjust upward relative to current rates.'},
        {id:'G2Q3',type:'Scenario',prompt:'A toll-road bond is repaid from toll collections. Is it a GO or revenue bond, and what supports repayment?',answer:'It is a revenue bond. The specified toll-road revenues—not the issuer’s broad taxing power—support debt service.'}
      ]},
      {id:'guide-packaged',number:'03',title:'Options, funds and alternative products',summary:'These products package a contract, a portfolio or a specialized strategy. Begin with legal structure and pricing before comparing benefits.',points:[
        ['Option contract','A call buyer has the right to buy; a put buyer has the right to sell. Buyers risk their premium, while an uncovered call writer can face extreme loss.'],
        ['Pooled product','Mutual funds, closed-end funds, UITs and ETFs pool holdings but use different issuance, redemption and pricing mechanisms.'],
        ['Alternative product','DPPs, non-listed REITs and hedge funds may add income or diversification, but often sacrifice liquidity and simple valuation.']
      ],table:{headers:['Product','How it trades or prices','Distinctive exam cue'],rows:[
        ['Open-end mutual fund','Bought or redeemed with the fund at the next NAV, plus any sales charge.','Forward pricing; breakpoints can reduce Class A sales charges.'],
        ['Closed-end fund','Trades intraday on an exchange at a market price.','Can trade above or below NAV.'],
        ['ETF','Trades intraday; creation/redemption helps price track NAV.','Exchange liquidity with portfolio exposure.'],
        ['ETN','Unsecured issuer debt linked to a benchmark.','Issuer credit risk, despite the exchange-traded name.']
      ]},example:'An investor owns 100 shares and buys one put. The put can set a floor under the stock’s value while preserving upside; the premium is the cost of that protection.',questions:[
        {id:'G3Q1',type:'Multiple choice',prompt:'Which position can create theoretically unlimited loss?',choices:['A. Long call','B. Long put','C. Covered call','D. Uncovered short call'],answer:'D. Uncovered short call. The stock can rise without a fixed ceiling while the writer remains obligated to deliver.'},
        {id:'G3Q2',type:'Short answer',prompt:'Why can an ETN carry more issuer-specific credit risk than an ETF holding a portfolio?',answer:'An ETN is an unsecured promise of its issuer. Its value therefore depends partly on that issuer’s ability to pay, while an ETF owns portfolio assets.'},
        {id:'G3Q3',type:'Scenario',prompt:'A fund trades intraday at a 6% discount to its per-share NAV. Which structure best fits, and why?',answer:'A closed-end fund. Exchange supply and demand can move its market price away from NAV; open-end shares transact with the fund at NAV.'}
      ]},
      {id:'guide-risk-tax',number:'04',title:'Risk, return and taxation essentials',summary:'Name the risk before choosing the product answer. For taxes, focus on whether money goes in before or after tax, how earnings grow, and how distributions are treated.',points:[
        ['Systematic vs. specific','Broad-market risk remains after diversification; issuer and industry risk can be reduced by spreading exposure.'],
        ['Income taxation','Corporate bond interest is generally federally taxable. Municipal interest is generally federally exempt, but gains and state treatment require separate analysis.'],
        ['Tax deferral','Deferral postpones tax; it does not erase it. Variable-annuity earnings grow tax deferred and are generally taxed as ordinary income when withdrawn.']
      ],table:{headers:['Item','Typical federal treatment','Common trap'],rows:[
        ['Qualified stock dividend','Generally taxable income when paid.','A dividend is not tax free merely because it is reinvested.'],
        ['Municipal bond interest','Generally exempt from federal income tax.','Capital gains can still be taxable; state treatment varies.'],
        ['Traditional retirement contribution/distribution','Contribution may receive tax advantages; taxable distributions are generally ordinary income.','Account and eligibility rules matter.'],
        ['529 qualified distribution','Generally federally tax free for qualified education use.','The owner controls the account; nonqualified use can create tax and penalty consequences.']
      ]},example:'A retiree living on fixed payments is especially exposed to inflation risk because rising prices reduce what each dollar can buy, even when the stated payment does not change.',questions:[
        {id:'G4Q1',type:'Multiple choice',prompt:'Diversifying across many issuers most directly reduces which risk?',choices:['A. Systematic risk','B. Nonsystematic risk','C. Inflation risk','D. Interest-rate risk'],answer:'B. Nonsystematic risk. Issuer- and industry-specific risk can be spread; a broad market decline remains.'},
        {id:'G4Q2',type:'Short answer',prompt:'Why is “tax deferred” different from “tax free”?',answer:'Tax-deferred earnings are generally taxed later when distributed. Tax-free treatment means qualifying income or distributions are not subject to the specified tax.'},
        {id:'G4Q3',type:'Scenario',prompt:'Mortgage rates fall and homeowners refinance. What two connected risks does an MBS investor face?',answer:'Prepayment risk returns principal earlier than expected, and reinvestment risk makes it difficult to reinvest that cash at the former yield.'}
      ]},
      {id:'guide-trading',number:'05',title:'Trading, settlement and customer accounts',summary:'Translate the customer’s objective into order mechanics, then identify who owns the account, who may act, and whether credit or discretion is involved.',points:[
        ['Order priority','A market order favors execution; a limit order controls price; a stop becomes a market order after its trigger is reached.'],
        ['Settlement','Most U.S. equity and corporate bond trades settle regular way on T+1 under the current outline.'],
        ['Account authority','Ownership and authority are separate. A UTMA minor owns the assets; the custodian manages them. A trustee’s authority comes from the trust document.']
      ],table:{headers:['Instruction or account','What it does','What it does not guarantee'],rows:[
        ['Buy limit','Sets the highest acceptable purchase price.','Execution.'],
        ['Sell stop','Activates below the market, then becomes a market order.','The stop price as execution price.'],
        ['Discretionary account','Lets an approved representative choose specified trade terms.','Unlimited action outside written authority.'],
        ['Margin account','Uses broker-dealer credit and magnifies exposure.','A floor on losses or protection from forced liquidation.']
      ]},example:'With a quote of 24.10 bid—24.18 ask, a customer generally buys at 24.18 and sells at 24.10. The dealer buys at the bid and sells at the ask.',questions:[
        {id:'G5Q1',type:'Multiple choice',prompt:'A customer wants to buy only at $42 or lower. Which order best expresses that instruction?',choices:['A. Market order','B. Buy stop at $42','C. Buy limit at $42','D. Sell limit at $42'],answer:'C. Buy limit at $42. It controls the maximum purchase price but cannot guarantee execution.'},
        {id:'G5Q2',type:'Short answer',prompt:'Why can a sell stop execute below its stop price during a fast decline?',answer:'The stop price only activates the order. After activation it becomes a market order and fills at the next available price.'},
        {id:'G5Q3',type:'Scenario',prompt:'A representative chooses both the security and amount for a customer. What type of authority is involved?',answer:'Substantive discretion. It generally requires written customer authorization and firm acceptance; ordinary time-and-price discretion is narrower.'}
      ]},
      {id:'guide-protection',number:'06',title:'Customer protection and prohibited conduct',summary:'When a scenario involves suspicious funds, customer assets, confidential information or a vulnerable adult, the exam usually rewards stopping, documenting and escalating.',points:[
        ['AML reflex','Placement introduces funds, layering obscures the trail, and integration makes wealth appear legitimate. Structuring is breaking transactions up to evade reporting.'],
        ['MNPI reflex','Material plus nonpublic plus a duty or improper tip means do not trade or share; escalate through firm procedures.'],
        ['Asset-protection reflex','Never guarantee a customer against loss, falsify a signature, misuse funds or pay transaction compensation to an unregistered person.']
      ],table:{headers:['Red flag','Why it matters','Proper exam response'],rows:[
        ['Repeated cash deposits just below a reporting level','Possible structuring and money laundering.','Document and escalate; never help redesign the pattern.'],
        ['Trade before a known customer block order','Possible front running.','Do not trade ahead; protect customer-order information.'],
        ['Sudden wire requested by a new caregiver','Possible senior exploitation.','Follow supervisory escalation and permitted-hold procedures.'],
        ['Customer asks representative to sign a form','False record even with consent.','Decline and use proper documentation procedures.']
      ]},example:'A firm files a SAR after suspicious transfers. The representative must not tell the customer; SAR confidentiality prevents tipping off the subject.',questions:[
        {id:'G6Q1',type:'Multiple choice',prompt:'A representative trades before a known customer block order to benefit from its expected price impact. This is',choices:['A. Hedging','B. Front running','C. Best execution','D. Dollar-cost averaging'],answer:'B. Front running. The representative is abusing confidential customer-order information.'},
        {id:'G6Q2',type:'Short answer',prompt:'Why may a representative not tell a customer that the firm filed a SAR?',answer:'SAR filings are confidential. Telling the customer could tip off the subject and interfere with monitoring or investigation.'},
        {id:'G6Q3',type:'Scenario',prompt:'An employee learns confidentially that an acquisition will be announced tomorrow and tips a friend who trades. Who can face exposure?',answer:'Both the tipper and the informed tippee can face insider-trading liability; the information is likely material and nonpublic.'}
      ]},
      {id:'guide-regulation',number:'07',title:'Regulatory framework and professional conduct',summary:'Map each organization, law and form to its purpose. Then ask whether the activity requires registration, disclosure, approval or supervision.',points:[
        ['Federal acts','The 1933 Act centers on new offerings; the 1934 Act centers on markets, broker-dealers and anti-fraud regulation. The two 1940 Acts cover investment companies and advisers.'],
        ['Registration record','Form U4 begins and updates an individual record; Form U5 reports termination. Passing the SIE alone does not authorize securities business.'],
        ['Outside conduct','Outside business activity generally requires prior written notice. Outside securities transactions can require notice, approval and firm supervision.']
      ],table:{headers:['Rule or organization','Primary purpose','Exam distinction'],rows:[
        ['Securities Act of 1933','Registration and disclosure for new offerings.','Disclosure does not mean SEC approval.'],
        ['Exchange Act of 1934','SEC, secondary markets, exchanges and broker-dealers.','Broad anti-fraud and market framework.'],
        ['MSRB','Writes municipal securities and adviser rules.','It does not directly enforce every rule.'],
        ['SIPC','Customer-asset process after a member broker-dealer fails.','Not insurance against market loss.']
      ]},example:'A representative receives shares for privately raising money for a startup. Calling the payment a consulting fee does not change the substance: this is an outside securities transaction requiring firm handling.',questions:[
        {id:'G7Q1',type:'Multiple choice',prompt:'Which law is most directly associated with registration of a corporate IPO?',choices:['A. Securities Act of 1933','B. Exchange Act of 1934','C. Advisers Act of 1940','D. SIPA'],answer:'A. Securities Act of 1933. It focuses on new-issue registration and offering disclosure.'},
        {id:'G7Q2',type:'Short answer',prompt:'Why does passing the SIE not by itself permit someone to act as a registered representative?',answer:'The SIE demonstrates essential knowledge but is not a registration. The person also needs the appropriate representative qualification and association with a member firm.'},
        {id:'G7Q3',type:'Scenario',prompt:'A representative plans to run a paid weekend bookkeeping business. What should happen before the work begins?',answer:'The representative should provide prior written notice to the member firm under its outside-business-activity procedures.'}
      ]}
    ];

    const mixedReview = [
      {id:'M1',type:'Multiple choice',prompt:'A registered corporate bond is sold from one investor to another. Which market is involved?',choices:['A. Primary','B. Secondary','C. Fourth only','D. Money market'],answer:'B. Secondary. The security is already outstanding and the issuer receives no proceeds.'},
      {id:'M2',type:'Scenario',prompt:'Rates rise sharply. Compare the likely price effect on a newly issued floating-rate instrument and a long fixed-rate bond.',answer:'The long fixed-rate bond should face greater price pressure because its coupon does not adjust. A floating rate can reset, reducing—but not eliminating—rate sensitivity.'},
      {id:'M3',type:'Multiple choice',prompt:'Which product is unsecured debt linked to an index?',choices:['A. ETF','B. ETN','C. Closed-end fund','D. UIT'],answer:'B. ETN. “Note” signals an issuer debt obligation and its accompanying credit risk.'},
      {id:'M4',type:'Short answer',prompt:'Explain why a covered call is covered but not risk free.',answer:'Owned shares can satisfy assignment, so delivery is covered. The shares can still fall substantially, and upside above the strike is surrendered.'},
      {id:'M5',type:'Scenario',prompt:'A customer holds $48,000 in a fund family and wants to invest $5,000 more. Which sales-charge feature should be checked?',answer:'Rights of accumulation. Existing eligible holdings may put the new purchase above a breakpoint threshold.'},
      {id:'M6',type:'Multiple choice',prompt:'Which risk is most directly associated with an issuer failing to make promised bond payments?',choices:['A. Credit risk','B. Currency risk','C. Prepayment risk','D. Political risk only'],answer:'A. Credit risk. The question describes inability or unwillingness to pay contractual obligations.'},
      {id:'M7',type:'Scenario',prompt:'A customer wants immediate execution and accepts price uncertainty. Which order fits?',answer:'A market order. It prioritizes execution but does not guarantee the execution price.'},
      {id:'M8',type:'Multiple choice',prompt:'Who owns assets transferred into a UTMA account?',choices:['A. Custodian','B. Minor','C. Broker-dealer','D. Donor'],answer:'B. Minor. The custodian controls the assets for the minor but the completed gift is irrevocable.'},
      {id:'M9',type:'Short answer',prompt:'Give one reason a raw 72% practice score does not guarantee passing the actual SIE.',answer:'FINRA reports a scaled score and uses equating across exam forms. Practice questions also cannot reproduce the exact difficulty or selection of the actual exam.'},
      {id:'M10',type:'Scenario',prompt:'A customer repeatedly deposits cash below a reporting threshold and wires it abroad. What should a representative do?',answer:'Follow firm AML procedures and escalate the suspicious pattern. Do not confront or help the customer alter the transactions, and never disclose any SAR filing.'},
      {id:'M11',type:'Multiple choice',prompt:'Which entity writes rules for municipal securities firms and municipal advisers?',choices:['A. SIPC','B. FDIC','C. MSRB','D. Federal Reserve'],answer:'C. MSRB. Enforcement is performed by other regulators, including FINRA, the SEC and bank regulators.'},
      {id:'M12',type:'Short answer',prompt:'Contrast the tax treatment of typical municipal-bond interest with a capital gain from selling that bond.',answer:'Municipal interest is generally exempt from federal income tax. A realized capital gain is generally taxable, and state treatment of either item can vary.'}
    ];

    const allLessons = modules.flatMap(m=>m.lessons.map(l=>({...l,moduleId:m.id,moduleTitle:m.title,domain:m.domain})));

    const D=(outline,minutes,sections,facts,table=null)=>({outline,minutes,sections,facts,table});
    const lessonDepth = {
      l1:D('FINRA outline 1.1.1–1.1.3',42,[
        {h:'The regulatory hierarchy',p:'Congress passes federal securities laws. The SEC administers and enforces those laws, writes regulations and oversees self-regulatory organizations. SROs regulate their members and markets under SEC oversight; they are not federal agencies.',b:['FINRA regulates broker-dealers and their associated persons.','National securities exchanges regulate exchange members and trading on their markets.','The MSRB writes rules for municipal securities dealers, banks and municipal advisers; FINRA, the SEC and bank regulators enforce those rules.'],e:'If a question asks who oversees FINRA, choose the SEC. If it asks who examines a broker-dealer for FINRA-rule compliance, FINRA is the likely answer.'},
        {h:'Other agencies and what they protect',p:'The Federal Reserve manages monetary policy and supervises parts of the banking system. Treasury and the IRS handle federal finance and tax administration. State securities administrators enforce blue-sky laws; NASAA coordinates state regulators but is not itself a federal regulator.',b:['FDIC insurance applies to eligible deposits at insured banks—not securities.','SIPC helps return customer cash and securities when a SIPC-member broker-dealer fails and assets are missing.','Neither FDIC nor SIPC protects an investor from ordinary market loss.'],e:'A bank CD may be FDIC-insured within applicable limits. A bond mutual fund held at the same bank is a security and can lose market value.'},
        {h:'Jurisdiction questions: read the verb',p:'The organization named in the answer depends on the action. “Writes municipal rules,” “insures deposits,” “administers federal securities law” and “protects customer custody assets” point to different bodies.',b:['SEC: federal law, disclosure, markets and SRO oversight.','FINRA: member broker-dealers, associated persons, sales practice and qualification exams.','MSRB: municipal rulemaking.','State administrator: securities activity within a state.'],e:'Do not choose an organization merely because its name is familiar. Match its mission to the verb in the question.'}
      ],['SIPC coverage is not a guarantee of investment value.','MSRB writes rules but does not conduct all enforcement.','Passing the SIE does not register or license a person.','Match the action in the question to the organization with that jurisdiction.'],{headers:['Organization','Core role','Not its role'],rows:[['SEC','Federal regulator and SRO overseer','Insuring bank deposits'],['FINRA','Broker-dealer SRO','Regulating investment advisers as a class'],['MSRB','Municipal rulemaking','Guaranteeing municipal bonds'],['FDIC','Eligible bank-deposit insurance','Protecting securities prices'],['SIPC','Broker-dealer customer-asset process','Covering market decline']]}),
      l2:D('FINRA outline 1.1.4',46,[
        {h:'Capital formation and distribution',p:'Issuers create securities to raise capital. Investment bankers advise on the financing and underwriters buy or distribute the issue. Investors supply capital and receive ownership, creditor or contract rights.',b:['Retail investors are individuals; institutional investors include entities such as funds, banks and pension plans.','Accredited investor status is a regulatory classification used in certain private offerings.','Municipal advisers advise municipal entities or obligated persons on municipal financial products or issuance.'],e:'When a corporation sells new bonds, it is the issuer. The investment bank managing the distribution is the underwriter.'},
        {h:'Broker-dealer roles and trade capacity',p:'A broker acts as agent for another party and commonly earns a commission. A dealer acts as principal, buying or selling from its own inventory and commonly earning a markup or markdown. A single broker-dealer can act in either capacity on different trades.',b:['An introducing broker opens and services accounts but relies on a clearing firm to carry assets and settle trades.','A clearing broker performs comparison, clearance, settlement and custody functions for itself or introducing firms.','A prime broker coordinates custody, financing and trading services for active institutional clients.'],e:'A firm sells a bond from inventory to a customer. The firm is a dealer acting as principal, even if the employee is casually called a broker.'},
        {h:'Market plumbing after the order',p:'Market makers publish quotations and stand ready to trade. Transfer agents maintain issuer ownership records and process transfers. Custodians safeguard assets; trustees act under a legal instrument for beneficiaries. Depositories and clearing corporations reduce the need for physical delivery.',b:['DTCC is the parent of major U.S. depository and clearing services.','DTC holds securities in book-entry form; NSCC supports clearing and settlement for many securities trades.','OCC issues, clears and guarantees standardized listed options.'],e:'An investor changes a certificate registration after a sale: the transfer agent updates issuer records. The broker’s clearing firm handles settlement and custody.'},
        {h:'Broker-dealer versus investment adviser',p:'A broker-dealer primarily effects securities transactions and may make recommendations in that relationship. An investment adviser provides securities advice for compensation and generally owes fiduciary duties in the advisory relationship.',b:['Transaction compensation points toward brokerage activity.','Ongoing asset-based fees often point toward an advisory relationship.','The same financial firm may have affiliated brokerage and advisory businesses, so identify the capacity involved.'],e:'A customer pays a commission for a stock trade: brokerage. A client pays 1% annually for ongoing portfolio management: advisory.'}
      ],['Issuer creates; underwriter distributes.','Broker = agent; dealer = principal.','Introducing firms service; clearing firms carry and settle.','OCC is the listed-options clearing corporation.'],{headers:['Participant','Main function','Exam cue'],rows:[['Issuer','Raises capital by issuing securities','Receives primary-market proceeds'],['Underwriter','Structures and distributes new issues','Firm commitment or best efforts'],['Market maker','Quotes bid and ask; provides liquidity','Dealer inventory'],['Transfer agent','Maintains issuer holder records','Ownership transfer'],['Custodian','Safeguards client assets','Possession and control'],['Trustee','Acts for beneficiaries under an agreement','Fiduciary administration']]}),
      l3:D('FINRA outline 1.2.1',38,[
        {h:'Primary and secondary markets',p:'The primary market is where issuers sell new securities and receive the proceeds. The secondary market is where investors trade securities that already exist; sale proceeds go to the selling holder.',b:['An IPO is primary when shares are issued by the company.','A follow-on offering can also be primary when the issuer sells additional shares.','Exchange and OTC trades in outstanding securities are secondary.'],e:'A customer buys IPO shares from the underwriting group: primary. The customer sells those shares on Nasdaq a month later: secondary.'},
        {h:'Exchange and OTC trading',p:'An exchange is an organized market with listing and trading rules. OTC trading occurs through a network of broker-dealers rather than a single physical exchange floor. Electronic trading can occur in either environment.',b:['Listed securities meet an exchange’s listing standards.','OTC securities can include unlisted securities and exchange-listed securities traded away from the exchange.','Market makers help create liquidity by quoting prices.'],e:'“Electronic” does not automatically mean OTC; modern exchange orders are also electronic.'},
        {h:'Third and fourth markets',p:'The third market is OTC trading in exchange-listed securities, commonly through dealers. The fourth market is direct institution-to-institution trading without a broker-dealer intermediary.',b:['Both involve outstanding securities, so both are secondary-market activity.','The differentiator is the venue and participants, not whether the security is new to the buyer.'],e:'Two pension funds cross a block directly through an institutional network: fourth market. A dealer trades NYSE-listed shares OTC: third market.'}
      ],['Follow the proceeds to identify primary versus secondary.','A security can be exchange-listed and still trade OTC.','Third = listed OTC; fourth = institutions direct.','Electronic execution can occur on an exchange or in an OTC venue.'],{headers:['Market','Security status','Who receives proceeds'],rows:[['Primary','New issue','Issuer'],['Secondary','Outstanding','Selling investor or dealer'],['Third','Exchange-listed, traded OTC','Seller'],['Fourth','Outstanding, direct institutional','Selling institution']]}),
      l4:D('FINRA outline 1.4',48,[
        {h:'Offering types and participants',p:'An IPO is an issuer’s first public stock offering. A follow-on offering raises additional issuer capital after the IPO. A secondary offering can describe existing holders selling shares, in which case the issuer does not receive those sale proceeds.',b:['An underwriting syndicate shares financial responsibility for an issue.','A selling group helps distribute without assuming the syndicate’s underwriting liability.','Municipal advisers represent municipal clients; underwriters purchase and distribute the securities.'],e:'A founder sells personal shares in a registered offering: the founder receives proceeds. The company sells newly created shares: the issuer receives proceeds.'},
        {h:'Firm commitment and best efforts',p:'In a firm commitment, the underwriter purchases the issue from the issuer and bears the risk of unsold inventory. In a best-efforts offering, the underwriter acts as agent and sells as much as possible under the agreement.',b:['All-or-none is a best-efforts structure requiring the entire amount to be sold for the offering to close.','Mini-max specifies a minimum that must be sold and a maximum that may be sold.','A standby commitment can support a rights offering by purchasing shares not taken by existing holders.'],e:'An issuer wants certainty about proceeds and transfers distribution risk to the bank: firm commitment.'},
        {h:'Registration, exemptions and disclosure',p:'A registered corporate offering uses a registration statement and prospectus. Securities Act registration is disclosure-based; the SEC does not approve the investment’s merits. Regulation D provides exemptions for certain private offerings, while Rule 144 addresses resales of restricted and control securities.',b:['A preliminary prospectus is often called a red herring and omits final offering terms such as price.','A final prospectus contains final terms and required disclosure.','Municipal issuers generally use an official statement rather than a Securities Act prospectus.','State blue-sky requirements can still apply.'],e:'“SEC registered” means required materials were filed and the offering can proceed when effective—not that the SEC recommends the security.'},
        {h:'Shelf registration and offering documents',p:'Shelf registration lets an eligible issuer register securities for later sale over time, giving flexibility to access markets when conditions are favorable. Delivery duties depend on the product and offering.',b:['Corporate registered issue: prospectus.','Municipal issue: official statement.','529 plan: program disclosure document.'],e:'A seasoned issuer registers debt today but sells portions during the next several periods as financing needs arise: shelf offering.'}
      ],['Registration is never SEC approval.','Firm commitment transfers unsold risk to the underwriter.','Municipal official statement and 529 program disclosure are distinct documents.','Private offerings can be exempt from registration but not from antifraud law.'],{headers:['Offering term','Who sells','Who gets proceeds'],rows:[['IPO','Issuer','Issuer'],['Follow-on primary','Issuer','Issuer'],['Secondary offering by holder','Existing holder','Selling holder'],['Private placement','Issuer under exemption','Issuer']]}),
      l5:D('FINRA outline 1.3.1',44,[
        {h:'Monetary policy versus fiscal policy',p:'Monetary policy is administered by the Federal Reserve and changes money and credit conditions. Fiscal policy is set through federal taxation and spending decisions by Congress and the executive branch.',b:['Easing policy generally seeks lower rates and more credit.','Tightening policy generally seeks higher rates or slower credit growth.','Fiscal deficits can stimulate demand but may also increase government borrowing.'],e:'The Fed buys Treasuries: monetary easing. Congress increases infrastructure spending: fiscal stimulus.'},
        {h:'Open-market operations',p:'When the Fed buys government securities, it pays dealers and adds reserves to the banking system. When it sells, buyers’ payments drain reserves. Changes in reserves influence lending capacity and short-term rates.',b:['Fed purchase → reserves up → credit generally easier → rates face downward pressure.','Fed sale → reserves down → credit generally tighter → rates face upward pressure.'],e:'The exam usually asks direction, not an exact forecast. State the immediate reserve effect first.'},
        {h:'Rates you must distinguish',p:'The federal funds rate is the rate depository institutions charge one another for overnight reserve loans. The discount rate is the rate a Federal Reserve Bank charges eligible institutions at the discount window. The prime rate is a commercial bank lending benchmark for strong customers.',b:['The Fed targets conditions around the federal funds rate.','The discount rate is set by Reserve Banks subject to Board review.','The prime rate is not directly set by Congress or the SEC.'],e:'A bank borrows overnight reserves from another bank: federal funds. It borrows directly from a Reserve Bank: discount rate.'},
        {h:'Policy transmission to securities',p:'Higher market rates generally reduce existing fixed-rate bond prices and can raise corporate borrowing costs. Lower rates generally support bond prices and can encourage borrowing and investment, though security prices also reflect growth and risk expectations.',b:['Long maturities and low coupons usually mean greater interest-rate sensitivity.','Growth stocks can be sensitive to higher discount rates on future earnings.','Bank profitability may react differently depending on the rate environment and yield curve.'],e:'Avoid absolute claims such as “all stocks rise when rates fall.” The bond price relationship is more direct than the equity response.'}
      ],['Fed buy adds reserves; Fed sale drains reserves.','Discount rate is Fed-to-bank; federal funds is bank-to-bank.','Fiscal policy means taxes and spending.','Rates and fixed-rate bond prices generally move inversely.'],{headers:['Action','Reserve effect','General policy direction'],rows:[['Fed buys securities','Adds reserves','Easing'],['Fed sells securities','Drains reserves','Tightening'],['Government cuts taxes','Leaves more disposable income','Fiscal stimulus'],['Government cuts spending','Reduces aggregate demand','Fiscal restraint']]}),
      l6:D('FINRA outline 1.3.2–1.3.3',48,[
        {h:'Financial statements and business health',p:'A balance sheet shows assets, liabilities and owners’ equity at a point in time. An income statement shows revenue, expenses and profit over a period. A cash-flow statement explains operating, investing and financing cash movements.',b:['Assets = liabilities + equity.','Revenue minus expenses produces net income.','Profit and cash flow are related but not identical.'],e:'A company can report profit while cash falls because customers have not yet paid receivables or the company spent heavily on equipment.'},
        {h:'The business cycle and security types',p:'Expansion features rising activity and moves toward a peak. Contraction follows the peak and moves toward a trough; recovery begins as the next expansion. Cyclical companies are sensitive to the economy, while defensive businesses sell necessities with steadier demand.',b:['Growth companies reinvest for above-average expansion and may pay little dividend.','Value stocks appear inexpensive relative to fundamentals.','Defensive sectors may hold up better in contraction but are not loss-proof.'],e:'Luxury travel is more cyclical than basic utilities or staple foods.'},
        {h:'Indicators, inflation and schools of thought',p:'Leading indicators tend to change before the economy, coincident indicators move with it and lagging indicators confirm an established trend. Inflation reduces purchasing power. Keynesian theory emphasizes fiscal demand management; Monetarist theory emphasizes money-supply control.',b:['Leading describes timing, not importance.','Unexpected inflation harms fixed purchasing power and can pressure bond prices through higher rates.','Deflation is a broad decline in price levels and can accompany weak demand.'],e:'New building permits can lead activity; payroll employment often moves with activity; unemployment duration can lag.'},
        {h:'GDP, GNP, trade and exchange rates',p:'GDP measures production within a country’s borders. GNP focuses on production attributable to a nation’s residents or nationals. The balance of payments records a country’s international economic transactions.',b:['A stronger dollar generally makes imports cheaper for U.S. buyers and U.S. exports more expensive abroad.','A weaker dollar generally makes U.S. exports more competitive but raises the dollar cost of imports.','Foreign investments expose U.S. investors to currency and political risk.'],e:'A U.S. investor earns 8% in local currency, but that currency falls 10% against the dollar; the translated dollar return can be negative.'}
      ],['Balance sheet = point in time; income statement = period.','Peak precedes contraction; trough precedes expansion.','GDP is domestic geography; GNP follows national ownership/residency.','Currency movement can help or hurt a foreign investment return.'],{headers:['Indicator type','Timing','Use'],rows:[['Leading','Before broad activity','Signals possible direction'],['Coincident','With broad activity','Describes current conditions'],['Lagging','After activity changes','Confirms an established trend']]}),
      l7:D('FINRA outline 2.1.1',46,[
        {h:'Common stock ownership',p:'Common stock represents residual ownership in a corporation. Shareholders generally vote for directors, receive declared dividends and have limited liability, meaning they can lose their investment but normally not more because of corporate debts.',b:['Dividends are declared by the board and are not contractual.','Common shares have no maturity date.','Shareholders may vote directly or by proxy.'],e:'Owning 2% of a company does not make the investor personally responsible for 2% of the company’s debts.'},
        {h:'Preferred stock tradeoffs',p:'Preferred stock is equity with dividend and liquidation priority over common stock. It usually has limited voting rights and less upside participation. A stated dividend is expected but not guaranteed.',b:['Cumulative preferred carries missed dividends forward.','Convertible preferred can be exchanged for common stock.','Callable preferred can be redeemed by the issuer.','Participating preferred may share additional earnings under its terms.'],e:'If cumulative preferred dividends are in arrears, those claims must be addressed before common dividends resume.'},
        {h:'Voting, preemptive rights and liquidation',p:'Common shareholders commonly elect directors and vote on major corporate matters. Statutory or charter rights may let holders maintain proportionate ownership when new shares are issued. Liquidation follows a priority: secured and unsecured creditors, preferred shareholders, then common shareholders.',b:['One share commonly equals one vote, subject to share class.','Cumulative voting can help minority holders concentrate votes.','Limited liability does not protect against loss of the stock investment.'],e:'In a bankruptcy with insufficient assets, common shareholders can receive nothing even though they are owners.'}
      ],['Common stock is perpetual ownership, not issuer debt.','Preferred priority does not turn it into a bond.','Dividends can be omitted.','Creditors rank ahead of both preferred and common.'],{headers:['Feature','Common','Preferred'],rows:[['Voting','Usually yes','Usually limited'],['Dividend','Variable; last priority','Stated; priority over common'],['Liquidation','Last','Ahead of common, behind debt'],['Upside','Greater participation','Usually limited']]}),
      l8:D('FINRA outline 2.1.1',42,[
        {h:'Rights and preemptive participation',p:'A right is a short-lived issuer security commonly distributed to existing shareholders, letting them purchase new shares—often below current market—before the public. It helps preserve proportionate ownership.',b:['Rights usually have a short life.','They can be exercised, sold if transferable or allowed to expire.','Exercising requires paying the subscription price.'],e:'A holder receives one right per share and needs ten rights plus $20 to buy a new share. The rights themselves are not the new shares.'},
        {h:'Warrants and issuer financing',p:'A warrant is a longer-lived issuer-created security that permits purchase of common stock at a stated price. Warrants are often attached to bonds or preferred stock to make an offering more attractive.',b:['Warrants can trade separately.','Exercise brings new capital to the issuer and can dilute existing holders.','Warrants usually have longer lives than rights.'],e:'A bond with detachable warrants may offer a lower coupon because the warrant adds potential equity upside.'},
        {h:'ADRs and foreign exposure',p:'An American Depositary Receipt is a U.S.-traded receipt representing foreign shares held by a depositary. ADRs simplify trading and dollar settlement but do not remove company, country, political or currency risk.',b:['Sponsored ADRs involve cooperation with the foreign issuer.','Dividends are converted into dollars and can be reduced by fees or taxes.','Foreign accounting, disclosure and market practices can differ.'],e:'If the foreign currency weakens, an ADR can decline in dollar terms even when the local share price is unchanged.'},
        {h:'Restricted and control securities',p:'Restricted securities are typically acquired in unregistered private transactions. Control securities are held by an issuer affiliate. Rule 144 provides conditions for public resale and helps distinguish ordinary resale from an underwriting distribution.',b:['Restricted and control are different categories but can overlap.','The rule can involve holding periods, volume limits, manner of sale and notice depending on the facts.','The SIE focuses on recognizing restrictions, not advanced calculations.'],e:'A founder selling a large block of company shares may face affiliate resale conditions even if the shares were originally registered.'}
      ],['Rights: short term, current holders.','Warrants: longer term, often an offering sweetener.','ADRs still carry currency and political risk.','Rule 144 concerns restricted and control-security resale.'],{headers:['Instrument','Typical recipient','Typical life'],rows:[['Right','Existing common shareholders','Short'],['Warrant','Investors in an offering or market buyers','Longer'],['ADR','U.S. investors seeking foreign exposure','No fixed category-wide term']]}),
      l9:D('FINRA outline 2.1.2 and 3.1.2',52,[
        {h:'Bond contract vocabulary',p:'Par is the principal amount due at maturity, commonly $1,000 for a corporate bond. The coupon rate multiplied by par determines annual interest. Maturity is when principal is due; the indenture contains the bond’s contractual terms.',b:['A 5% $1,000 bond pays $50 annually.','A bond trading at 95 is priced at 95% of par, or $950.','Accrued interest compensates the seller for interest earned since the last payment.'],e:'Price changes do not change a fixed coupon payment. A 6% bond still pays $60 whether it trades at $900 or $1,100.'},
        {h:'Yield measures',p:'Nominal yield is the coupon rate. Current yield is annual interest divided by market price. Yield to maturity includes coupons plus the gain or loss as price approaches par. Yield to call assumes redemption at the call date and price.',b:['Discount bond: current yield generally exceeds coupon.','Premium bond: current yield generally falls below coupon.','For a callable premium bond, YTC can be the lower and more conservative yield.'],e:'A 6% bond at $1,200 pays $60, so current yield is 5%.'},
        {h:'Price and rate relationships',p:'Existing fixed-rate bond prices generally move opposite market interest rates. Longer maturities and lower coupons usually produce greater price sensitivity because more value arrives farther in the future.',b:['Rates rise → fixed bond prices fall.','Rates fall → fixed bond prices rise.','As maturity approaches, a solvent bond’s price tends to move toward par.'],e:'A 4% bond becomes less attractive when new bonds offer 6%; its price must fall for its yield to become competitive.'},
        {h:'Credit, ratings and embedded features',p:'Credit risk is the chance the issuer cannot pay. Ratings summarize agency opinions of credit quality but are not guarantees. Secured bonds have collateral; debentures rely on general credit. Calls favor issuers when rates fall, while conversion gives investors possible equity participation.',b:['Investment-grade and speculative-grade categories signal relative credit quality.','A sinking fund retires portions of debt over time.','A put feature can let the investor sell the bond back under stated terms.'],e:'A callable bond may be redeemed just when the investor wants to keep its high coupon, creating call and reinvestment risk.'}
      ],['Coupon uses par; current yield uses market price.','Price and yield move inversely.','Long, low-coupon bonds have more rate sensitivity.','Ratings are opinions, not guarantees.'],{headers:['Bond price','Coupon vs. current yield','Pull toward par'],rows:[['Discount','Current yield above coupon','Price tends upward if no default'],['Par','Current yield equals coupon','Already at par'],['Premium','Current yield below coupon','Price tends downward if no default']]}),
      l10:D('FINRA outline 2.1.2',50,[
        {h:'Treasury securities',p:'Treasury bills mature in one year or less and are issued at a discount. Notes have intermediate maturities and bonds have long maturities, with stated interest. Treasury interest is federally taxable but exempt from state and local income tax.',b:['Treasuries have minimal credit risk but still have interest-rate and inflation risk.','STRIPS separate interest and principal cash flows into zero-coupon securities.','Treasury securities are sold through auctions.'],e:'A T-bill investor pays less than face value and receives face value at maturity; the difference is the return.'},
        {h:'Agency and mortgage-backed securities',p:'Agency securities finance policy areas such as housing. Some have explicit government backing and others do not. Mortgage-backed securities pass through principal and interest from pools of mortgages.',b:['Falling rates can accelerate refinancing and prepayments.','Rising rates can slow prepayments and extend the expected life.','Prepayment causes reinvestment risk when rates are low.'],e:'Homeowners refinance after rates fall, returning MBS principal early when the investor can earn less on new investments.'},
        {h:'Corporate debt structures',p:'Corporate bonds vary by security, seniority, coupon and features. Mortgage bonds are secured by real property; equipment trust certificates by equipment; debentures by general credit. Subordinated debt ranks below senior debt.',b:['Convertible bonds exchange for stock under stated terms and often pay lower coupons.','Income bonds pay interest only if earnings permit under the contract.','Zero-coupon bonds compound a discount and pay no periodic interest.'],e:'A railroad finances locomotives with certificates secured by the equipment: equipment trust debt.'},
        {h:'Asset-backed securities and receipts',p:'Asset-backed securities are supported by pools such as auto loans or receivables. Cash-flow timing, borrower performance and structure affect risk. Receipts or stripped securities can isolate principal or interest payments.',b:['Credit enhancement can reduce but not eliminate risk.','Tranche priority can change cash-flow and loss exposure.','Zero-coupon structures create substantial price volatility and possible annual imputed tax.'],e:'Two securities backed by the same pool can behave differently because one tranche receives principal before another.'}
      ],['T-bill = one year or less and discount-issued.','Not every agency obligation has full U.S. government backing.','MBS investors face prepayment and extension risk.','Corporate collateral determines secured status.'],{headers:['Debt type','Backing','Distinctive risk'],rows:[['Treasury','U.S. government','Rate and inflation'],['Agency/MBS','Agency or mortgage pool','Prepayment/extension'],['Corporate secured','Specific collateral','Credit plus collateral value'],['Debenture','Issuer general credit','Unsecured credit risk']]}),
      l11:D('FINRA outline 2.1.2',50,[
        {h:'General obligation and revenue bonds',p:'A general obligation bond relies on the municipal issuer’s taxing power and general credit. A revenue bond relies on specified project or enterprise revenues. Always identify the source of debt service before judging credit.',b:['GO analysis considers the tax base, debt burden and economic health.','Revenue analysis considers demand, rates, operating results and debt-service coverage.','A moral-obligation pledge is weaker than an enforceable unlimited-tax pledge.'],e:'A city water-system bond paid from customer water charges is a revenue bond even though a city authority issued it.'},
        {h:'Municipal structures and short-term obligations',p:'Municipal issuers use different structures for schools, utilities, housing, transportation and cash-flow needs. Tax anticipation notes, revenue anticipation notes and bond anticipation notes are short-term obligations repaid from the named future source.',b:['TAN: expected tax receipts.','RAN: expected revenue receipts.','BAN: proceeds from a future long-term bond issue.','Taxable municipals do not receive the usual federal interest exemption.'],e:'A city borrows for construction until a permanent bond issue closes: a BAN.'},
        {h:'Tax treatment and yield comparison',p:'Interest on many municipal bonds is exempt from federal income tax; state treatment varies. Capital gains are generally taxable. Tax-equivalent yield compares tax-exempt income with a taxable alternative: tax-exempt yield ÷ (1 − marginal tax rate).',b:['A 3% muni at a 25% tax rate has a 4% taxable-equivalent yield.','Tax benefit matters more to investors in higher brackets.','Private-activity bond interest can have alternative minimum tax implications.'],e:'Do not call municipals “tax free.” Separate interest, capital gain and state tax treatment.'},
        {h:'Money-market instruments',p:'Money-market instruments are high-liquidity short-term debt, but short maturity does not mean no risk. Commercial paper is unsecured corporate debt; negotiable CDs are bank obligations; bankers’ acceptances are bank-guaranteed trade drafts; Treasury bills are federal debt.',b:['Commercial paper commonly finances working capital.','Bankers’ acceptances often support international trade.','Repurchase agreements are collateralized short-term financing transactions.'],e:'An importer promises payment and a bank accepts the draft, making it marketable: bankers’ acceptance.'},
        {h:'Municipal offering methods',p:'Municipal issues may be sold through competitive bidding or negotiated underwriting. GO bonds have traditionally been associated with competitive sales, while complex revenue issues are often negotiated, but the issuer’s method controls.',b:['Competitive: underwriting groups submit bids.','Negotiated: issuer selects and works with an underwriter.','The official statement is the principal offering document.'],e:'A municipality selects a bank early to help structure a complex financing: negotiated sale.'}
      ],['GO = taxes; revenue = enterprise receipts.','Short-term municipal note name reveals repayment source.','Municipal capital gains can be taxable.','Commercial paper is unsecured corporate short-term debt.'],{headers:['Instrument','Issuer/backing','Usual maturity profile'],rows:[['T-bill','U.S. Treasury','One year or less'],['Commercial paper','Corporate general credit','Short term'],['Negotiable CD','Bank','Short term'],['Bankers’ acceptance','Bank-guaranteed trade draft','Short term'],['Municipal note','Expected named municipal source','Short term']]}),
      l12:D('FINRA outline 2.1.3',48,[
        {h:'The four basic positions',p:'A call gives its buyer the right to buy the underlying at the strike price. A put gives its buyer the right to sell. The writer receives the premium and accepts the corresponding obligation if assigned.',b:['Long call: bullish right to buy.','Short call: obligation to sell.','Long put: bearish or protective right to sell.','Short put: obligation to buy.'],e:'Before calculating anything, say the position aloud: “long put means right to sell.”'},
        {h:'Contract terms and settlement',p:'The strike price is the contract price, the premium is the option’s market price and expiration ends the contract. Standard equity option contracts typically cover 100 shares. Equity options generally settle through stock delivery; index options generally settle in cash.',b:['American-style options may be exercised before expiration.','European-style options may be exercised only at expiration.','Exercise is the holder’s action; assignment is the writer’s obligation.'],e:'One listed equity call quoted at 3 costs $300 because the premium is quoted per share for 100 shares.'},
        {h:'Moneyness, intrinsic value and time value',p:'A call is in the money when market price exceeds strike. A put is in the money when market price is below strike. Intrinsic value is the favorable exercise amount; time value is premium minus intrinsic value.',b:['At the money: market price equals strike.','Out of the money: exercise would not be economically favorable.','Moneyness ignores premium; profit includes premium.'],e:'A 50 call with stock at 56 has $6 intrinsic value. If premium was $8, it is ITM but the buyer is still $2 below breakeven at expiration.'},
        {h:'Breakeven and buyer risk',p:'At expiration, long-call breakeven is strike plus premium; long-put breakeven is strike minus premium. The maximum loss for an option buyer is normally the premium paid.',b:['Long call upside is theoretically unlimited.','Long put gain is substantial but limited because stock cannot fall below zero.','Options expire, so time works against buyers when other factors are unchanged.'],e:'Buy a 40 put for 3: expiration breakeven is 37. Below 37 the position has net profit.'}
      ],['Buyer has a right; writer has an obligation.','Call ITM above strike; put ITM below.','Moneyness and profitability are different.','One standard equity contract generally represents 100 shares.'],{headers:['Position','Market view','Right or obligation'],rows:[['Long call','Bullish','Right to buy'],['Short call','Neutral/bearish','Obligation to sell'],['Long put','Bearish/protective','Right to sell'],['Short put','Neutral/bullish','Obligation to buy']]}),
      l13:D('FINRA outline 2.1.3',46,[
        {h:'Covered and uncovered writing',p:'A covered call writer owns the deliverable shares, so assignment can be met without buying stock at a potentially extreme price. An uncovered call lacks that protection and can create theoretically unlimited loss.',b:['Covered call: premium income, limited upside, substantial stock downside remains.','Uncovered call: premium income with unlimited rising-price exposure.','Cash-secured put: funds are set aside for possible assignment, but stock downside remains.'],e:'Coverage addresses the obligation, not every economic loss.'},
        {h:'Protective and income uses',p:'A protective put combines long stock with a long put, creating a downside floor while preserving upside. A covered call combines long stock with a short call, receiving income while capping gains above the strike.',b:['Protective put resembles insurance.','Covered call is most appropriate when the investor is willing to sell at the strike.','Both strategies include stock risk and option premium effects.'],e:'Own stock at 50 and buy a 45 put: below 45 the right to sell limits further stock loss, less the premium cost.'},
        {h:'Hedging versus speculation',p:'A hedge offsets an existing risk; speculation creates exposure in pursuit of profit. The same contract can serve either purpose depending on the investor’s other holdings.',b:['Long put with owned stock: hedge.','Long put without stock: bearish speculation.','Index puts can hedge broad portfolio exposure but may not match it perfectly.'],e:'A portfolio manager buys index puts against a diversified equity portfolio: hedging, even though the puts may rise when stocks fall.'},
        {h:'OCC, ODD and account approval',p:'The Options Clearing Corporation is the issuer and clearing guarantor of listed options. The Options Disclosure Document explains standardized options risks. Broker-dealers require options-account approval based on customer information and proposed activity.',b:['The ODD is disclosure, not a recommendation or guarantee.','Assignment can occur before expiration for American-style options.','Position and exercise limits support market integrity.'],e:'Receiving the ODD does not mean every options strategy is appropriate for every customer.'}
      ],['Uncovered call loss can be unlimited.','Protective put creates a floor; covered call caps upside.','Purpose depends on the total position.','OCC clears listed options; the ODD discloses risk.'],{headers:['Strategy','Primary purpose','Main tradeoff'],rows:[['Covered call','Income','Caps stock upside'],['Protective put','Downside protection','Premium cost'],['Uncovered call','Speculation/income','Unlimited loss potential'],['Index put hedge','Portfolio protection','Basis/matching risk']]}),
      l14:D('FINRA outline 2.1.4 and 2.1.9',52,[
        {h:'Three investment-company structures',p:'An open-end management company continuously issues redeemable shares; this is the usual mutual fund. A closed-end fund has a fixed pool of shares trading on an exchange. A UIT holds a generally fixed portfolio and terminates under its trust terms.',b:['Open-end: transact with the fund at next NAV.','Closed-end: trade intraday at market price above or below NAV.','UIT: supervised fixed portfolio, not active management.'],e:'A product with a fixed share count and a persistent 8% discount to NAV is a closed-end fund.'},
        {h:'NAV, POP and forward pricing',p:'NAV per share equals assets minus liabilities divided by shares outstanding. Open-end purchases and redemptions use the next calculated NAV after the order is received in good order. The public offering price can include a front-end sales charge.',b:['NAV is accounting value per share.','POP = NAV plus applicable sales charge for a load fund.','Fund share orders do not receive a negotiated intraday price.'],e:'An order placed before the pricing cutoff receives that day’s next computed NAV—not the previous day’s value.'},
        {h:'ETF structure and trading',p:'ETFs pool assets and trade on exchanges throughout the day. Large authorized participants create or redeem blocks of shares, helping market price remain close to NAV, though temporary premiums or discounts can occur.',b:['Retail ETF investors trade at market prices and can use market or limit orders.','Passive ETFs track indexes; active ETFs follow manager decisions.','Narrow ETFs may provide little diversification despite holding multiple securities.'],e:'An ETF and mutual fund can own the same portfolio, but only the ETF trades intraday between investors.'},
        {h:'ETNs and other exchange-traded products',p:'An ETN is unsecured issuer debt whose return is linked to a benchmark. It does not own the benchmark assets and therefore adds issuer credit risk. Other ETPs can use commodities or derivatives and may not be registered investment companies.',b:['ETF = ownership interest in a pooled portfolio.','ETN = issuer promise tied to an index.','Leveraged or inverse products can reset daily and create path-dependent results.'],e:'If an ETN issuer becomes insolvent, strong benchmark performance may not prevent investor loss.'},
        {h:'Fund economics and disclosure',p:'Portfolio income, realized gains and changes in NAV affect investor return. Operating expenses reduce results and are described in the prospectus. Turnover can increase trading costs and taxable distributions.',b:['Expense ratio is deducted from fund assets.','Shareholder reports describe holdings and performance.','Past performance does not guarantee future results.'],e:'Two funds earn the same gross return; the higher-cost fund generally leaves less net return for investors.'}
      ],['Open-end uses next NAV; closed-end and ETF trade at market prices.','UIT portfolios are generally fixed.','ETN is unsecured debt, not a fund portfolio.','Expenses reduce returns even when not billed separately.'],{headers:['Product','Share supply','Investor transaction'],rows:[['Open-end fund','Continuous issue/redemption','With fund at next NAV'],['Closed-end fund','Generally fixed after offering','Exchange market price'],['UIT','Fixed units from offering; redeemable','Approximate NAV or secondary market'],['ETF','Creation/redemption blocks','Exchange market price'],['ETN','Issuer debt outstanding','Exchange market price']]}),
      l15:D('FINRA outline 2.1.4',48,[
        {h:'Sales loads and ongoing expenses',p:'A front-end load reduces the amount initially invested. A contingent deferred sales charge applies to certain redemptions and often declines over time. A 12b-1 fee is an ongoing distribution or service expense paid from fund assets.',b:['No-load does not mean no expenses.','Management, administrative and other operating fees reduce returns.','A net transaction does not automatically mean cost free.'],e:'A customer invests $10,000 with a 5% front-end load: $500 is sales charge and $9,500 is invested.'},
        {h:'Share classes',p:'Class A shares commonly use a front-end load and lower ongoing distribution fees. Class C shares commonly have level ongoing charges and a short CDSC period. Class B shares historically used deferred loads and conversion features but are less commonly offered.',b:['Long time horizon can make lower ongoing expenses important.','Short horizon can make an upfront load less attractive.','Class labels are patterns, not substitutes for reading the prospectus.'],e:'Do not recommend a class from one fee alone; compare the total expected cost over the customer’s horizon.'},
        {h:'Breakpoints and linked purchases',p:'Class A breakpoints reduce the sales-charge percentage at stated investment levels. Rights of accumulation use eligible existing holdings. A letter of intent uses intended purchases during a period commonly 13 months and may allow retroactive charge adjustment if the commitment is not met.',b:['ROA looks backward/current.','LOI looks forward.','Eligible family accounts or fund-family holdings may aggregate under prospectus rules.'],e:'A customer with $48,000 already invested adds $5,000; ROA can push the new purchase above a $50,000 breakpoint.'},
