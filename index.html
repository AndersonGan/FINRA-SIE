.","Correct. Omitted (in arrears) dividends accumulate and are paid before any common dividend.","Convertibility is a separate feature.","Cumulative refers to dividends, not voting."],"takeaway":"Cumulative = dividends in arrears must be cleared before common is paid."},{"id":"n204","domain":"d2","topic":"Equity","difficulty":"hard","stem":"An investor holding participating preferred stock may receive","choices":["only the stated dividend","the stated dividend plus a share of additional distributions with common","interest payments","guaranteed principal at par each year"],"correct":1,"reasons":["That describes straight preferred.","Correct. Participating preferred can share in additional payouts beyond the stated rate.","Preferred pays dividends, not interest.","Preferred does not return par annually."],"takeaway":"Participating preferred can earn more than its stated rate alongside common."},{"id":"n205","domain":"d2","topic":"Equity","difficulty":"medium","stem":"A stock right (preemptive right) generally allows an existing shareholder to","choices":["buy newly issued shares to maintain proportional ownership, usually short-term","sell shares back to the issuer at par","receive guaranteed dividends","vote twice per share"],"correct":0,"reasons":["Correct. Rights let current holders buy new shares to avoid dilution; they are short-lived.","Rights are not a put back to the issuer.","Rights do not guarantee dividends.","Rights are not extra votes."],"takeaway":"Rights = short-term privilege for existing holders to buy new shares and avoid dilution."},{"id":"n206","domain":"d2","topic":"Equity","difficulty":"medium","stem":"Compared with rights, warrants are typically","choices":["shorter-term and issued to current holders","longer-term instruments often attached to other securities as a sweetener","a form of senior debt","always exercised immediately"],"correct":1,"reasons":["That describes rights.","Correct. Warrants are long-term and frequently attached to bonds or preferred as sweeteners.","Warrants are equity-linked, not debt.","Warrants are usually out of the money at issuance and held for the longer term."],"takeaway":"Rights are short-term for existing holders; warrants are long-term sweeteners."},{"id":"n207","domain":"d2","topic":"Equity","difficulty":"medium","stem":"An American Depositary Receipt (ADR) is used primarily to","choices":["give U.S. investors a way to hold foreign company shares that trade in U.S. markets","guarantee currency gains","avoid all foreign taxes","provide FDIC insurance"],"correct":0,"reasons":["Correct. ADRs facilitate U.S. trading of foreign issuers’ shares.","ADR holders still face currency risk.","Foreign tax withholding can still apply.","ADRs are securities, not insured deposits."],"takeaway":"ADR = U.S.-traded receipt for foreign shares; currency risk remains."},{"id":"n208","domain":"d2","topic":"Equity","difficulty":"medium","stem":"A REIT that trades on an exchange offers investors","choices":["direct ownership of specific buildings","a liquid, pooled way to invest in real estate that must distribute most taxable income","FDIC-insured returns","guaranteed appreciation"],"correct":1,"reasons":["REIT holders own the REIT, not individual buildings.","Correct. Listed REITs are liquid pooled vehicles that must pay out most taxable income to avoid entity tax.","REITs are not insured.","No appreciation is guaranteed."],"takeaway":"REIT = pooled real-estate vehicle; must distribute ~90% of taxable income."},{"id":"n209","domain":"d2","topic":"Equity","difficulty":"hard","stem":"A corporation declares a 2-for-1 stock split. After the split, an investor who held 100 shares at $60 will hold","choices":["50 shares at $120","200 shares at $30","100 shares at $30","200 shares at $60"],"correct":1,"reasons":["A 2-for-1 split increases shares and lowers price.","Correct. Shares double to 200 and price halves to $30; total value is unchanged at $6,000.","Share count increases in a forward split.","Price must fall proportionally."],"takeaway":"Forward split: more shares, proportionally lower price, same total value."},{"id":"n210","domain":"d2","topic":"Equity","difficulty":"medium","stem":"Under cumulative voting, a shareholder","choices":["must cast an equal number of votes for each director","may concentrate all votes on one or a few candidates","loses the right to vote","receives one extra vote per share automatically"],"correct":1,"reasons":["That describes statutory voting.","Correct. Cumulative voting lets holders pool votes on fewer candidates, aiding minority shareholders.","Cumulative voting is a voting method, not a loss of the vote.","Votes equal shares times directors, allocated as the holder chooses."],"takeaway":"Cumulative voting favors small shareholders by allowing vote concentration."},{"id":"n211","domain":"d2","topic":"Equity","difficulty":"medium","stem":"On the ex-dividend date, a stock’s price is expected to","choices":["rise by the dividend amount","open reduced by approximately the dividend amount","be unaffected","double"],"correct":1,"reasons":["Price does not rise by the dividend on the ex-date.","Correct. On the ex-date the buyer is not entitled to the dividend, so the price typically opens lower by about the dividend.","The ex-date adjustment reflects the forgone dividend.","No such effect occurs."],"takeaway":"Ex-date: buyers do not get the dividend, so the price adjusts down by roughly the payout."},{"id":"n212","domain":"d2","topic":"Equity","difficulty":"hard","stem":"To receive a declared cash dividend under a T+1 regular-way settlement cycle, an investor must buy the stock","choices":["on the ex-dividend date","before the ex-dividend date","on the payable date","on the record date only"],"correct":1,"reasons":["Buying on the ex-date means missing the dividend.","Correct. Purchasing before the ex-date allows settlement by the record date so the buyer is an owner of record.","The payable date is when the dividend is paid, too late to establish entitlement.","Being on the books by the record date requires buying before the ex-date."],"takeaway":"Buy before the ex-date to be owner of record and receive the dividend."},{"id":"n213","domain":"d2","topic":"Debt","difficulty":"easy","stem":"The inverse relationship between bond prices and interest rates means that when market rates rise,","choices":["existing bond prices rise","existing bond prices fall","coupon payments increase","maturities shorten"],"correct":1,"reasons":["Prices move opposite to rates.","Correct. Rising market rates push existing fixed-rate bond prices down.","The fixed coupon does not change.","Maturity is fixed at issuance."],"takeaway":"Rates up → existing bond prices down (and vice versa)."},{"id":"n214","domain":"d2","topic":"Debt","difficulty":"medium","stem":"A U.S. Treasury bill is best described as a","choices":["long-term coupon bond","short-term security issued at a discount and maturing at face value","municipal revenue bond","convertible corporate security"],"correct":1,"reasons":["T-bonds are long-term; T-bills are short-term.","Correct. T-bills are short-term (one year or less), issued at a discount, with no periodic coupon.","T-bills are federal, not municipal.","T-bills are not convertible."],"takeaway":"T-bill = short-term, discount, no coupon; matures at face value."},{"id":"n215","domain":"d2","topic":"Debt","difficulty":"medium","stem":"Treasury Inflation-Protected Securities (TIPS) protect investors by","choices":["paying a higher fixed coupon than any other bond","adjusting principal with changes in the Consumer Price Index","guaranteeing stock-like returns","eliminating all interest-rate risk"],"correct":1,"reasons":["TIPS coupons are not simply the highest available.","Correct. TIPS principal is adjusted for inflation using the CPI, and interest is paid on the adjusted principal.","TIPS are debt, not equity-linked.","Interest-rate risk still exists."],"takeaway":"TIPS = principal indexed to CPI; guards purchasing power."},{"id":"n216","domain":"d2","topic":"Debt","difficulty":"hard","stem":"A Treasury STRIPS is a","choices":["zero-coupon security created by separating a bond’s principal and interest payments","floating-rate note","municipal bond","money market fund"],"correct":0,"reasons":["Correct. STRIPS are zero-coupon instruments created from separated Treasury cash flows.","STRIPS carry no periodic coupon at all.","STRIPS are federal, not municipal.","STRIPS are securities, not a fund."],"takeaway":"STRIPS = zero-coupon Treasury from stripped coupons/principal."},{"id":"n217","domain":"d2","topic":"Debt","difficulty":"medium","stem":"A general obligation (GO) municipal bond is backed by","choices":["revenue from a specific project","the full faith, credit and taxing power of the issuer","corporate earnings","the federal government"],"correct":1,"reasons":["That describes a revenue bond.","Correct. GO bonds are backed by the issuer’s taxing power.","Municipal issuers are governments, not corporations.","GOs are not federally backed."],"takeaway":"GO = backed by taxing power; revenue bond = backed by project revenue."},{"id":"n218","domain":"d2","topic":"Debt","difficulty":"medium","stem":"A municipal revenue bond is repaid from","choices":["the issuer’s ad valorem taxes","income generated by a specific facility or project","U.S. Treasury guarantees","corporate dividends"],"correct":1,"reasons":["Ad valorem (property) taxes back GO bonds.","Correct. Revenue bonds rely on the receipts of the financed facility (e.g., tolls, utility fees).","No Treasury guarantee applies.","Municipal bonds do not pay dividends."],"takeaway":"Revenue bond = paid from project/facility revenue, not taxes."},{"id":"n219","domain":"d2","topic":"Debt","difficulty":"hard","stem":"Interest from most municipal bonds is generally","choices":["exempt from federal income tax","subject to a special federal surtax","taxable at double the ordinary rate","never taxed by any authority"],"correct":0,"reasons":["Correct. Municipal bond interest is generally federally tax-exempt (and may be state-exempt for in-state residents).","No special federal surtax defines munis.","Municipal interest is not taxed at a doubled rate.","State tax may apply for out-of-state bonds."],"takeaway":"Muni interest is generally federally tax-exempt; that lowers the pre-tax yield needed."},{"id":"n220","domain":"d2","topic":"Debt","difficulty":"medium","stem":"A corporate debenture is","choices":["a bond secured by real property","an unsecured bond backed only by the issuer’s general credit","a share of preferred stock","a government-guaranteed note"],"correct":1,"reasons":["A mortgage bond is secured by real property.","Correct. A debenture is unsecured, relying on the issuer’s promise to pay.","A debenture is debt, not preferred stock.","Debentures are corporate, not government-guaranteed."],"takeaway":"Debenture = unsecured corporate bond; backed by general credit only."},{"id":"n221","domain":"d2","topic":"Debt","difficulty":"hard","stem":"An equipment trust certificate is typically secured by","choices":["the issuer’s taxing power","specific equipment such as rail cars or aircraft","common stock of the issuer","federal insurance"],"correct":1,"reasons":["Taxing power backs GO munis.","Correct. Equipment trust certificates are secured by identified equipment, common for transportation firms.","They are secured by equipment, not stock.","No federal insurance applies."],"takeaway":"Equipment trust certificate = secured by titled equipment (rolling stock, planes)."},{"id":"n222","domain":"d2","topic":"Debt","difficulty":"medium","stem":"Commercial paper is best described as","choices":["long-term secured corporate debt","short-term unsecured corporate debt issued at a discount","a municipal revenue bond","a federal agency mortgage security"],"correct":1,"reasons":["Commercial paper is short-term, not long-term.","Correct. Commercial paper is short-term (270 days or less) unsecured corporate debt sold at a discount.","It is corporate, not municipal.","It is not a mortgage security."],"takeaway":"Commercial paper = short-term unsecured corporate money-market debt."},{"id":"n223","domain":"d2","topic":"Debt","difficulty":"medium","stem":"Which security is a money market instrument?","choices":["A 30-year Treasury bond","A negotiable bank certificate of deposit maturing in 3 months","Common stock","A 20-year revenue bond"],"correct":1,"reasons":["A 30-year bond is a capital-market instrument.","Correct. Short-term negotiable CDs are money-market instruments.","Stock is not a money-market instrument.","A 20-year bond is long-term."],"takeaway":"Money market = short-term debt (T-bills, commercial paper, BAs, short CDs, repos)."},{"id":"n224","domain":"d2","topic":"Debt","difficulty":"hard","stem":"A bond’s current yield is calculated as","choices":["annual coupon interest divided by current market price","yield to maturity minus the coupon","par value divided by price","coupon rate times years to maturity"],"correct":0,"reasons":["Correct. Current yield = annual interest ÷ current market price.","That is not how current yield is defined.","That inverts the relationship.","That is not a yield formula."],"takeaway":"Current yield = annual coupon ÷ current price."},{"id":"n225","domain":"d2","topic":"Debt","difficulty":"hard","stem":"A bond purchased at a discount to par will have a yield to maturity that is","choices":["lower than its current yield and coupon","higher than its current yield and coupon","equal to its coupon","zero"],"correct":1,"reasons":["At a discount, YTM is the highest of the three.","Correct. For a discount bond: coupon < current yield < YTM.","YTM equals coupon only at par.","YTM is positive for a discount bond."],"takeaway":"Discount bond: coupon < current yield < YTM (yields rise as price falls)."},{"id":"n226","domain":"d2","topic":"Debt","difficulty":"medium","stem":"Which bond rating is the lowest tier still considered investment grade?","choices":["BBB / Baa","BB / Ba","C","AAA / Aaa"],"correct":0,"reasons":["Correct. BBB/Baa is the lowest investment-grade rating.","BB/Ba is the top of speculative (junk) grade.","C is deep speculative grade.","AAA is the highest grade, not the lowest investment grade."],"takeaway":"Investment grade runs AAA down to BBB (Baa); below BBB is high-yield/junk."},{"id":"n227","domain":"d2","topic":"Debt","difficulty":"medium","stem":"A callable bond exposes the investor primarily to","choices":["the risk that the issuer redeems it early, often when rates have fallen","a guarantee of higher yield","elimination of credit risk","loss of principal at maturity"],"correct":0,"reasons":["Correct. Issuers call bonds when rates drop, forcing reinvestment at lower yields.","A call feature benefits the issuer, not the investor’s yield.","Credit risk is not eliminated by a call feature.","Callable bonds still repay principal, just possibly early."],"takeaway":"Call risk: bond taken away early when rates fall; reinvestment at lower yields."},{"id":"n228","domain":"d2","topic":"Debt","difficulty":"hard","stem":"A convertible bond gives the holder the ability to","choices":["exchange the bond for a fixed number of the issuer’s common shares","demand double the par value at maturity","vote for the board while holding debt","avoid all interest-rate risk"],"correct":0,"reasons":["Correct. Conversion lets the bondholder swap the bond for a set number of common shares.","No doubling of par occurs.","Bondholders do not vote unless converted to stock.","Interest-rate risk still applies."],"takeaway":"Convertible = bond exchangeable for common stock at a set ratio."},{"id":"n229","domain":"d2","topic":"Debt","difficulty":"medium","stem":"A zero-coupon bond","choices":["pays semiannual interest","is bought at a discount and pays no periodic interest, maturing at face value","always trades above par","pays a floating rate"],"correct":1,"reasons":["Zeros pay no periodic interest.","Correct. Zero-coupon bonds are bought at a discount; the return is the difference at maturity.","Zeros trade at a discount until maturity.","Zeros are fixed, not floating."],"takeaway":"Zero-coupon = no coupons; discount purchase, face value at maturity."},{"id":"n230","domain":"d2","topic":"Debt","difficulty":"hard","stem":"GNMA (Ginnie Mae) pass-through securities carry which additional risk relative to a straight Treasury bond?","choices":["Prepayment risk from mortgage refinancing","No credit backing at all","Currency risk","Voting dilution"],"correct":0,"reasons":["Correct. When homeowners prepay, investors receive principal early, often at lower reinvestment rates.","GNMA carries the full faith and credit of the U.S. government.","GNMAs are dollar-denominated; currency risk is not the added factor.","Debt securities do not have voting dilution."],"takeaway":"Mortgage-backed pass-throughs add prepayment risk to interest-rate risk."},{"id":"n231","domain":"d2","topic":"Options","difficulty":"easy","stem":"The buyer of a call option has the right to","choices":["sell the underlying stock at the strike price","buy the underlying stock at the strike price","collect interest from the issuer","vote the underlying shares"],"correct":1,"reasons":["Selling at the strike is a put buyer’s right.","Correct. A call buyer may buy the stock at the strike price.","Options do not pay interest.","Option holders do not vote the underlying."],"takeaway":"Call buyer = right to BUY at the strike (bullish)."},{"id":"n232","domain":"d2","topic":"Options","difficulty":"easy","stem":"The buyer of a put option is generally","choices":["bullish and expects the stock to rise","bearish or seeking downside protection","indifferent to price","entitled to dividends"],"correct":1,"reasons":["Bullish expectations favor calls.","Correct. Put buyers profit if the stock falls or use puts to hedge.","A put has a directional purpose.","Puts do not confer dividends."],"takeaway":"Put buyer = right to SELL at the strike (bearish/protective)."},{"id":"n233","domain":"d2","topic":"Options","difficulty":"medium","stem":"The maximum loss for the buyer of an option is","choices":["unlimited","the premium paid","the strike price","the value of the underlying stock"],"correct":1,"reasons":["Unlimited loss applies to an uncovered call writer, not a buyer.","Correct. A long option holder can lose at most the premium.","The strike is not the maximum loss for a buyer.","A buyer does not owe the underlying’s full value."],"takeaway":"Long option: maximum loss = premium paid."},{"id":"n234","domain":"d2","topic":"Options","difficulty":"hard","stem":"An investor buys 1 XYZ 50 call for a premium of 4. The breakeven point at expiration is","choices":["46","50","54","58"],"correct":2,"reasons":["That would be strike minus premium (a put breakeven idea).","The strike alone ignores the premium.","Correct. Call breakeven = strike + premium = 50 + 4 = 54.","That overstates the premium."],"takeaway":"Long call breakeven = strike + premium."},{"id":"n235","domain":"d2","topic":"Options","difficulty":"hard","stem":"An investor buys 1 XYZ 50 put for a premium of 3. The maximum gain occurs if the stock falls to zero and equals","choices":["$300","$4,700","$5,000","unlimited"],"correct":1,"reasons":["That is only the premium, not the maximum gain.","Correct. Max gain = (strike − premium) × 100 = (50 − 3) × 100 = $4,700.","That ignores the premium paid.","A long put’s gain is capped because the stock cannot fall below zero."],"takeaway":"Long put max gain = (strike − premium) × 100 (stock to zero)."},{"id":"n236","domain":"d2","topic":"Options","difficulty":"medium","stem":"A call option is in the money when","choices":["the market price is above the strike price","the market price is below the strike price","the premium equals zero","the option has expired"],"correct":0,"reasons":["Correct. A call is in the money when the stock trades above the strike.","That describes an in-the-money put.","Intrinsic value, not zero premium, defines being in the money.","Expiration is unrelated to moneyness."],"takeaway":"Call in the money: stock above strike. Put in the money: stock below strike."},{"id":"n237","domain":"d2","topic":"Options","difficulty":"medium","stem":"An option’s premium is composed of","choices":["intrinsic value plus time value","strike price plus dividends","par value minus interest","commissions only"],"correct":0,"reasons":["Correct. Premium = intrinsic value + time value.","Strike and dividends do not define premium.","Options have no par value.","Commissions are separate from premium."],"takeaway":"Premium = intrinsic value + time value."},{"id":"n238","domain":"d2","topic":"Options","difficulty":"hard","stem":"Writing a covered call means the investor","choices":["sells a call while owning the underlying stock","buys a call with no stock","sells a call without owning the stock","buys a put for protection"],"correct":0,"reasons":["Correct. A covered call writer owns the shares that could be called away, generating income with capped upside.","That is simply a long call.","That describes an uncovered (naked) call.","That describes a protective put."],"takeaway":"Covered call = own stock + sell a call; income, capped upside, downside remains."},{"id":"n239","domain":"d2","topic":"Options","difficulty":"hard","stem":"The position with theoretically unlimited maximum loss is the","choices":["long call","long put","uncovered (naked) call writer","covered call writer"],"correct":2,"reasons":["A long call’s loss is limited to the premium.","A long put’s loss is limited to the premium.","Correct. A naked call writer must deliver stock that can rise without limit.","A covered call writer owns the stock, limiting the risk."],"takeaway":"Naked call writer = unlimited risk (stock can rise without bound)."},{"id":"n240","domain":"d2","topic":"Options","difficulty":"medium","stem":"A protective put is used to","choices":["generate income on a stock position","hedge a long stock position against a price decline","speculate on rising rates","eliminate all option premium cost"],"correct":1,"reasons":["A covered call generates income.","Correct. Buying a put on stock you own sets a floor under losses.","Puts on stock are not a rate speculation here.","The put costs a premium."],"takeaway":"Protective put = insurance on long stock; sets a downside floor."},{"id":"n241","domain":"d2","topic":"Options","difficulty":"medium","stem":"When a listed option is exercised, the Options Clearing Corporation assigns the obligation","choices":["to a specific writer chosen by the exerciser","randomly or by another approved method among short positions","to the exchange floor broker","to the transfer agent"],"correct":1,"reasons":["The exerciser does not choose the counterparty.","Correct. The OCC assigns exercise notices to short positions randomly or by an approved method.","Floor brokers do not receive assignment.","Transfer agents are not part of option assignment."],"takeaway":"OCC assigns exercises to writers randomly (or by an approved method)."},{"id":"n242","domain":"d2","topic":"Funds","difficulty":"easy","stem":"Shares of an open-end mutual fund are","choices":["traded intraday on an exchange at market price","purchased from and redeemed with the fund at the next calculated NAV","sold only to accredited investors","always sold at a discount to NAV"],"correct":1,"reasons":["That describes a closed-end fund or ETF.","Correct. Open-end funds use forward pricing at the next computed NAV.","Mutual funds are broadly available, not accredited-only.","Open-end shares are not sold at a discount to NAV."],"takeaway":"Open-end fund = continuous issuance/redemption at next NAV (forward pricing)."},{"id":"n243","domain":"d2","topic":"Funds","difficulty":"medium","stem":"The public offering price (POP) of a front-end load mutual fund equals","choices":["NAV minus the sales charge","NAV plus the sales charge","NAV only","the redemption fee"],"correct":1,"reasons":["Subtracting the charge would understate the price paid.","Correct. POP = NAV + sales charge for an A-share purchase.","NAV alone omits the sales charge.","A redemption fee is charged on the way out, not the POP."],"takeaway":"POP = NAV + sales charge (front-end load funds)."},{"id":"n244","domain":"d2","topic":"Funds","difficulty":"medium","stem":"Class A mutual fund shares typically feature","choices":["a front-end sales charge with breakpoint discounts for larger purchases","a high 12b-1 fee and back-end charge that never declines","no sales charges of any kind","mandatory conversion to bonds"],"correct":0,"reasons":["Correct. A shares charge an up-front load and offer breakpoints at higher investment levels.","That better describes B or C shares’ ongoing costs.","A shares do carry a front-end load.","Shares do not convert to bonds."],"takeaway":"A shares: front-end load, lower ongoing 12b-1, breakpoints reward larger buys."},{"id":"n245","domain":"d2","topic":"Funds","difficulty":"hard","stem":"A breakpoint sale violation occurs when a representative","choices":["discloses breakpoints to the customer","structures a purchase just below a breakpoint to earn a higher sales charge","recommends a low-cost index fund","processes a redemption at NAV"],"correct":1,"reasons":["Disclosing breakpoints is proper.","Correct. Selling just under a breakpoint to increase the commission is a prohibited breakpoint sale.","Recommending a low-cost fund is not a violation.","A redemption at NAV is routine."],"takeaway":"Breakpoint sale = keeping a buy just under the discount level to boost the load — prohibited."},{"id":"n246","domain":"d2","topic":"Funds","difficulty":"medium","stem":"A Letter of Intent (LOI) allows a mutual fund investor to","choices":["lock in a guaranteed return","qualify for a breakpoint discount by committing to invest a set amount, usually within 13 months","avoid all taxes on distributions","redeem shares before purchase"],"correct":1,"reasons":["LOIs address sales charges, not returns.","Correct. An LOI lets the investor obtain a breakpoint by pledging future purchases (commonly within 13 months).","LOIs do not affect taxation.","Redemption before purchase is not the LOI purpose."],"takeaway":"LOI = commit to reach a breakpoint (typically 13 months) for the reduced load."},{"id":"n247","domain":"d2","topic":"Funds","difficulty":"medium","stem":"Rights of accumulation (ROA) let a fund investor reach a breakpoint by","choices":["counting the current value of existing holdings toward the discount level","borrowing on margin","converting to a closed-end fund","waiving the prospectus"],"correct":0,"reasons":["Correct. ROA counts existing holdings’ value toward larger-purchase breakpoints.","ROA does not involve margin.","No fund-type conversion is required.","ROA does not waive disclosure."],"takeaway":"ROA counts existing holdings; LOI counts intended future purchases."},{"id":"n248","domain":"d2","topic":"Funds","difficulty":"medium","stem":"A closed-end fund differs from an open-end fund because a closed-end fund","choices":["continuously issues new shares at NAV","has a fixed number of shares that trade on an exchange at a market price","can only be redeemed with the sponsor","never uses a portfolio manager"],"correct":1,"reasons":["Continuous issuance describes open-end funds.","Correct. Closed-end funds issue a fixed share count that trades in the market, possibly above or below NAV.","Closed-end shares trade in the market, not redeemed with the sponsor.","Closed-end funds are actively or passively managed."],"takeaway":"Closed-end = fixed shares, exchange-traded, price can differ from NAV."},{"id":"n249","domain":"d2","topic":"Funds","difficulty":"hard","stem":"A Unit Investment Trust (UIT)","choices":["is actively managed with frequent trading","holds a generally fixed portfolio and has a set termination date","trades like a hedge fund","guarantees principal"],"correct":1,"reasons":["UITs are not actively managed.","Correct. A UIT holds a largely fixed portfolio and typically terminates on a set date.","UITs are registered investment companies, not hedge funds.","UITs do not guarantee principal."],"takeaway":"UIT = fixed, unmanaged portfolio with a defined end date."},{"id":"n250","domain":"d2","topic":"Funds","difficulty":"medium","stem":"An exchange-traded fund (ETF) generally","choices":["can be bought and sold intraday at market prices","prices only once per day like an open-end fund","is sold exclusively to institutions","carries FDIC insurance"],"correct":0,"reasons":["Correct. ETFs trade throughout the day on an exchange.","Intraday trading distinguishes ETFs from open-end funds.","ETFs are available to retail investors.","ETFs are securities, not insured deposits."],"takeaway":"ETF = intraday exchange trading with fund-like diversification."},{"id":"n251","domain":"d2","topic":"Funds","difficulty":"hard","stem":"A 12b-1 fee is best described as","choices":["a one-time front-end sales charge","an annual fee deducted from fund assets to cover distribution and marketing costs","a redemption tax","a custodial insurance premium"],"correct":1,"reasons":["12b-1 fees are ongoing, not one-time front loads.","Correct. 12b-1 fees are annual asset-based charges for distribution/marketing.","It is a fund expense, not a tax.","It is not insurance."],"takeaway":"12b-1 = ongoing annual distribution/marketing fee from fund assets."},{"id":"n252","domain":"d2","topic":"Alternatives","difficulty":"medium","stem":"A direct participation program (DPP) limited partnership is characterized by","choices":["daily liquidity at NAV","flow-through of income and losses to investors and generally limited liquidity","FDIC insurance","a fixed coupon"],"correct":1,"reasons":["DPPs are typically illiquid.","Correct. DPPs pass income, gains, losses and deductions through to limited partners and are illiquid.","DPPs are not insured.","DPPs are equity partnerships, not fixed-income."],"takeaway":"DPP = pass-through tax treatment, limited liability, low liquidity."},{"id":"n253","domain":"d2","topic":"Alternatives","difficulty":"hard","stem":"To invest in most private hedge funds, an investor usually must be","choices":["a minor with a custodian","an accredited investor meeting income or net-worth standards","a government employee","a registered representative"],"correct":1,"reasons":["Minors are not the qualifying standard.","Correct. Hedge funds generally require accredited (or qualified) investor status.","Government employment is irrelevant.","Being a rep is not the qualification."],"takeaway":"Hedge funds/private placements generally require accredited investor status."},{"id":"n254","domain":"d2","topic":"Alternatives","difficulty":"medium","stem":"Compared with a listed REIT, a non-traded REIT typically has","choices":["greater liquidity","less liquidity and potentially higher fees","FDIC insurance","a guaranteed dividend"],"correct":1,"reasons":["Non-traded REITs are less liquid than listed REITs.","Correct. Non-traded REITs can be illiquid with higher upfront costs and limited redemption.","REITs are not insured.","Dividends are not guaranteed."],"takeaway":"Non-traded REIT = illiquid, valuation and fee concerns vs. listed REITs."},{"id":"n255","domain":"d2","topic":"Alternatives","difficulty":"hard","stem":"A key suitability concern common to hedge funds, DPPs and non-traded REITs is","choices":["excessive daily liquidity","limited liquidity and complexity that may not fit investors needing access to cash","FDIC coverage limits","mandatory conversion to Treasuries"],"correct":1,"reasons":["These products are not overly liquid.","Correct. Restricted liquidity and complexity are central suitability concerns for alternatives.","Insurance limits are not the concern.","No conversion to Treasuries occurs."],"takeaway":"Alternatives share illiquidity and complexity — weigh the investor’s need for cash."},{"id":"n256","domain":"d2","topic":"Alternatives","difficulty":"medium","stem":"An exchange-traded note (ETN) exposes the investor to","choices":["no credit risk at all","the credit risk of the issuing bank because it is unsecured debt","FDIC insurance","guaranteed index returns"],"correct":1,"reasons":["ETNs carry issuer credit risk.","Correct. An ETN is unsecured debt; its value depends partly on the issuer’s creditworthiness.","ETNs are not insured deposits.","Returns track an index but are not guaranteed if the issuer fails."],"takeaway":"ETN = unsecured bank debt linked to an index; issuer credit risk applies."},{"id":"n257","domain":"d2","topic":"Insurance","difficulty":"medium","stem":"A fixed annuity differs from a variable annuity because a fixed annuity","choices":["places investment risk on the contract owner","provides a guaranteed minimum interest rate with the insurer bearing investment risk","invests in a separate account of securities","requires a securities license only"],"correct":1,"reasons":["The variable annuity places market risk on the owner.","Correct. A fixed annuity guarantees a minimum rate; the insurer bears the investment risk.","Separate-account investing describes variable annuities.","Fixed annuities are insurance products; variable annuities require a securities registration."],"takeaway":"Fixed annuity = insurer guarantees; variable annuity = owner bears separate-account risk."},{"id":"n258","domain":"d2","topic":"Insurance","difficulty":"hard","stem":"During the accumulation phase of a variable annuity, contributions purchase","choices":["annuity units","accumulation units in the separate account","mutual fund breakpoints","fixed coupons"],"correct":1,"reasons":["Annuity units are used during the payout phase.","Correct. Accumulation units measure the owner’s interest in the separate account before annuitization.","Breakpoints relate to mutual fund sales charges.","Variable annuities are not coupon bonds."],"takeaway":"Accumulation units before annuitization; annuity units during payout."},{"id":"n259","domain":"d2","topic":"Insurance","difficulty":"hard","stem":"A Section 1035 exchange allows a contract owner to","choices":["withdraw all earnings tax-free","transfer the value of one annuity or life policy to another without immediate taxation","double the death benefit automatically","avoid all surrender charges"],"correct":1,"reasons":["A 1035 exchange defers, not eliminates, tax on earnings.","Correct. A 1035 exchange permits a tax-free transfer between qualifying insurance/annuity contracts.","No automatic death-benefit doubling occurs.","Surrender charges may still apply from the old contract."],"takeaway":"1035 exchange = tax-deferred swap between like insurance/annuity contracts."},{"id":"n260","domain":"d2","topic":"Insurance","difficulty":"medium","stem":"A surrender charge on a deferred annuity is","choices":["a fee for early withdrawal that typically declines over time","a guaranteed bonus","a federal tax","a mutual fund front-end load"],"correct":0,"reasons":["Correct. Surrender charges apply to early withdrawals and usually decline each year.","It is a cost, not a bonus.","It is an insurer charge, not a federal tax.","It is not a mutual fund load."],"takeaway":"Surrender charge = declining early-withdrawal penalty on annuities."},{"id":"n261","domain":"d2","topic":"Insurance","difficulty":"hard","stem":"Variable annuities are considered securities because","choices":["they guarantee a fixed return","the owner bears investment risk through a separate account of securities","they are FDIC insured","they never involve an insurance company"],"correct":1,"reasons":["A guaranteed return would make it a fixed product.","Correct. The investment risk falls on the owner via the securities separate account, so a securities registration is required to sell them.","They are not insured deposits.","An insurance company issues them, but the securities element triggers registration."],"takeaway":"Variable products = securities (separate-account risk) plus insurance wrapper."},{"id":"n262","domain":"d2","topic":"Risk","difficulty":"easy","stem":"Systematic risk is best described as","choices":["risk unique to one company","broad market risk that diversification cannot eliminate","the risk of a single bond default","currency risk only"],"correct":1,"reasons":["Company-specific risk is nonsystematic.","Correct. Systematic (market) risk affects the whole market and cannot be diversified away.","Single-issuer default is nonsystematic.","Currency risk is one narrow type, not the definition."],"takeaway":"Systematic = undiversifiable market risk; nonsystematic = diversifiable, issuer-specific."},{"id":"n263","domain":"d2","topic":"Risk","difficulty":"medium","stem":"Diversification is most effective at reducing","choices":["systematic risk","nonsystematic (unsystematic) risk","interest-rate risk on all bonds","inflation risk for cash"],"correct":1,"reasons":["Diversification does not remove market-wide risk.","Correct. Spreading holdings reduces issuer- and industry-specific (nonsystematic) risk.","Interest-rate risk is largely systematic for bonds.","Inflation risk is not solved by diversification alone."],"takeaway":"Diversification reduces nonsystematic risk, not market-wide systematic risk."},{"id":"n264","domain":"d2","topic":"Risk","difficulty":"medium","stem":"An investor most exposed to purchasing-power (inflation) risk holds","choices":["a fixed-rate long-term bond","a diversified stock portfolio","TIPS","a commodity fund"],"correct":0,"reasons":["Correct. Fixed payments lose real value as inflation rises, hurting long-term fixed-rate bonds most.","Equities historically offer some inflation participation.","TIPS are designed to offset inflation.","Commodities often move with inflation."],"takeaway":"Inflation risk hits fixed-rate long bonds hardest; TIPS and equities offer some defense."},{"id":"n265","domain":"d2","topic":"Risk","difficulty":"medium","stem":"Reinvestment risk is the danger that","choices":["a bond issuer defaults","coupon or principal payments must be reinvested at lower prevailing rates","the market becomes illiquid","the currency weakens"],"correct":1,"reasons":["Default is credit risk.","Correct. Reinvestment risk arises when cash flows are reinvested at lower rates, common when rates fall.","Illiquidity is liquidity risk.","A weakening currency is currency risk."],"takeaway":"Reinvestment risk = reinvesting cash flows at lower rates (worst when rates fall)."},{"id":"n266","domain":"d2","topic":"Risk","difficulty":"medium","stem":"Liquidity (marketability) risk is greatest for","choices":["a large-cap listed stock","a thinly traded limited partnership interest","a U.S. Treasury bill","an S&P 500 ETF"],"correct":1,"reasons":["Large-cap listed stocks are highly liquid.","Correct. Thinly traded, non-listed interests can be hard to sell at a fair price quickly.","T-bills are among the most liquid securities.","Broad ETFs are liquid."],"takeaway":"Liquidity risk is highest in thinly traded, non-listed instruments."},{"id":"n267","domain":"d2","topic":"Risk","difficulty":"hard","stem":"Legislative (regulatory) risk refers to the possibility that","choices":["a company’s CEO resigns","a change in law or regulation adversely affects an investment’s value","interest rates rise","a stock split occurs"],"correct":1,"reasons":["A management change is business risk.","Correct. New laws or rules (e.g., tax changes) can reduce an investment’s value.","Rising rates are interest-rate risk.","A split does not change total value."],"takeaway":"Legislative risk = adverse law/regulation changes (e.g., tax law shifts)."},{"id":"n268","domain":"d2","topic":"Risk","difficulty":"hard","stem":"Credit (default) risk is most directly measured by","choices":["a bond’s maturity length","the issuer’s credit rating and ability to pay interest and principal","the size of the coupon","the number of shares outstanding"],"correct":1,"reasons":["Maturity relates more to interest-rate risk.","Correct. Ratings and issuer financial strength gauge default risk.","A larger coupon does not by itself lower default risk.","Shares outstanding relate to equity, not bond credit risk."],"takeaway":"Credit risk = chance the issuer fails to pay; ratings gauge it."},{"id":"n301","domain":"d3","topic":"Orders","difficulty":"easy","stem":"A market order is","choices":["executed only at a specified price or better","executed immediately at the best available current price","held until a trigger price is reached","valid only at the close"],"correct":1,"reasons":["That describes a limit order.","Correct. A market order seeks immediate execution at the prevailing price; execution is prioritized over price.","That describes a stop order.","A market order is not restricted to the close."],"takeaway":"Market order = speed over price (immediate execution)."},{"id":"n302","domain":"d3","topic":"Orders","difficulty":"medium","stem":"A buy limit order instructs the broker to buy","choices":["at the limit price or lower","at the limit price or higher","only at the market open","without any price restriction"],"correct":0,"reasons":["Correct. A buy limit sets a maximum price; it fills at the limit or lower.","A buy limit does not pay more than the limit.","Limit orders are not restricted to the open.","Limit orders always carry a price restriction."],"takeaway":"Buy limit = buy at limit or lower; controls price, not execution certainty."},{"id":"n303","domain":"d3","topic":"Orders","difficulty":"medium","stem":"A sell stop order is placed","choices":["above the current market price","below the current market price and becomes a market order when triggered","only during after-hours","at par value"],"correct":1,"reasons":["Sell stops sit below the market.","Correct. A sell stop is set below the market and activates (becomes a market order) if the stock trades down to the stop.","Stops are not limited to after-hours.","Par value is a bond concept."],"takeaway":"Sell stop = below market; triggers a market sell to limit loss/protect gains."},{"id":"n304","domain":"d3","topic":"Orders","difficulty":"hard","stem":"The main difference between a stop order and a stop-limit order is that once triggered, a stop-limit order","choices":["becomes a market order","becomes a limit order that may not fill if the price moves past the limit","is automatically canceled","converts to a dividend"],"correct":1,"reasons":["A plain stop becomes a market order.","Correct. A stop-limit becomes a limit order after triggering, risking non-execution if price runs past the limit.","It is not auto-canceled.","Orders do not convert to dividends."],"takeaway":"Stop → market on trigger; stop-limit → limit on trigger (may not fill)."},{"id":"n305","domain":"d3","topic":"Orders","difficulty":"medium","stem":"A Good-Til-Canceled (GTC) order","choices":["expires at the end of the trading day","remains active until executed or canceled, subject to firm limits","can never be canceled","is only for mutual funds"],"correct":1,"reasons":["That describes a day order.","Correct. A GTC order stays working until filled or canceled (firms may periodically require renewal).","GTC orders can be canceled.","GTC applies to exchange-traded securities, not mutual funds."],"takeaway":"GTC = open order until filled or canceled; day order dies at the close."},{"id":"n306","domain":"d3","topic":"Orders","difficulty":"medium","stem":"In a dealer quote, the bid and ask represent","choices":["the price the customer pays and receives, respectively","the price at which the dealer will buy (bid) and sell (ask)","the coupon and yield","the open and close"],"correct":1,"reasons":["The customer generally does the reverse of the dealer.","Correct. The dealer buys at the bid and sells at the ask; the spread is the difference.","Bid/ask are prices, not yields.","They are not the daily open/close."],"takeaway":"Dealer buys at bid, sells at ask; customers do the reverse."},{"id":"n307","domain":"d3","topic":"Orders","difficulty":"hard","stem":"The bid-ask spread is best described as","choices":["the dealer’s markup disclosed on the confirmation","the difference between the highest bid and lowest ask","the commission on an agency trade","the settlement period"],"correct":1,"reasons":["Spread is not the same as a disclosed markup on a specific trade.","Correct. The spread is the gap between the best bid and best offer.","Commission applies to agency trades, separate from spread.","Settlement is a timing concept."],"takeaway":"Spread = best ask − best bid; a cost of immediacy."},{"id":"n308","domain":"d3","topic":"Orders","difficulty":"medium","stem":"A Fill-or-Kill (FOK) order requires","choices":["partial fills over several days","immediate execution of the entire order or it is canceled","execution only at the close","a minimum 30-day duration"],"correct":1,"reasons":["FOK does not allow multi-day partials.","Correct. FOK must be filled completely and immediately or canceled.","FOK is not a closing-only order.","FOK is immediate, not multi-day."],"takeaway":"FOK = all, immediately, or cancel."},{"id":"n309","domain":"d3","topic":"Orders","difficulty":"hard","stem":"An Immediate-or-Cancel (IOC) order differs from FOK because IOC","choices":["allows a partial immediate fill with the remainder canceled","must be filled in full","lasts until canceled","trades only bonds"],"correct":0,"reasons":["Correct. IOC permits a partial immediate fill; the unfilled portion is canceled.","Requiring a full fill describes FOK.","IOC is immediate, not open-ended.","IOC is not limited to bonds."],"takeaway":"IOC = take what fills now, cancel the rest; FOK = all-or-none immediately."},{"id":"n310","domain":"d3","topic":"Orders","difficulty":"medium","stem":"An investor who sells stock short is best described as","choices":["bullish and buying to open","bearish, borrowing shares to sell now and hoping to buy back lower","a bondholder","protected against unlimited loss"],"correct":1,"reasons":["Short selling is a bearish strategy.","Correct. A short seller borrows and sells, aiming to repurchase at a lower price; losses are theoretically unlimited.","Short selling involves equity, not bond ownership.","Short sellers face theoretically unlimited loss."],"takeaway":"Short sale = bearish; borrow, sell high, buy back low; unlimited risk if price rises."},{"id":"n311","domain":"d3","topic":"Orders","difficulty":"medium","stem":"A day order that is not executed during the trading session will","choices":["carry over to the next day","be canceled at the close of that day","convert to a GTC order","settle anyway"],"correct":1,"reasons":["Day orders do not carry over.","Correct. An unexecuted day order expires at the end of the session.","It does not automatically become GTC.","An unexecuted order does not settle."],"takeaway":"Day order expires at the market close if unfilled."},{"id":"n312","domain":"d3","topic":"Orders","difficulty":"hard","stem":"A buy stop order is most commonly used to","choices":["limit a loss on a long position","protect a short position or trigger a purchase once the price rises to a level","guarantee the lowest price","collect a dividend"],"correct":1,"reasons":["A sell stop limits a long-position loss.","Correct. A buy stop is set above the market to protect a short sale or to buy on upside momentum.","Stops do not guarantee the best price.","Stops are unrelated to dividends."],"takeaway":"Buy stop sits above market; protects shorts or buys on breakout."},{"id":"n313","domain":"d3","topic":"Settlement","difficulty":"easy","stem":"Regular-way settlement for most U.S. equities and corporate bonds is currently","choices":["T+3","T+2","T+1","same day"],"correct":2,"reasons":["T+3 was replaced years ago.","T+2 applied before the May 2024 change.","Correct. Since May 28, 2024, regular-way settlement is T+1.","Same-day settlement is not the standard cycle."],"takeaway":"Regular-way settlement = T+1 (effective May 28, 2024)."},{"id":"n314","domain":"d3","topic":"Settlement","difficulty":"medium","stem":"Under T+1 settlement, a regular-way trade executed on a Monday (no holidays) settles on","choices":["that same Monday","Tuesday","Wednesday","Thursday"],"correct":1,"reasons":["Settlement is one business day after the trade.","Correct. T+1 means Monday trade settles Tuesday.","Wednesday would be T+2.","Thursday would be T+3."],"takeaway":"T+1: settlement one business day after trade date."},{"id":"n315","domain":"d3","topic":"Corporate actions","difficulty":"medium","stem":"The ex-dividend date is the date on which","choices":["the dividend is paid","a buyer is no longer entitled to the upcoming dividend","the board declares the dividend","the record is finalized months later"],"correct":1,"reasons":["That is the payable date.","Correct. On and after the ex-date, new buyers do not receive the declared dividend.","Declaration is a separate, earlier date.","The record date is set close to the ex-date, not months later."],"takeaway":"Ex-date: buy on/after it and you miss the dividend."},{"id":"n316","domain":"d3","topic":"Corporate actions","difficulty":"hard","stem":"In a tender offer, an investor is","choices":["forced to sell all shares at par","invited to sell shares to an acquirer, usually at a premium, by a deadline","guaranteed a dividend increase","converting bonds to stock"],"correct":1,"reasons":["Tenders are generally voluntary, not forced at par.","Correct. A tender offer solicits shareholders to sell, typically at a premium, within a set period.","A tender is not a dividend action.","That describes conversion, not a tender."],"takeaway":"Tender offer = bid to buy shares (often at a premium) by a deadline."},{"id":"n317","domain":"d3","topic":"Corporate actions","difficulty":"medium","stem":"A spin-off occurs when a company","choices":["splits its stock two-for-one","distributes shares of a subsidiary to existing shareholders as a separate company","pays a special cash dividend","files for bankruptcy"],"correct":1,"reasons":["A split changes share count, not corporate structure.","Correct. A spin-off separates a business unit into an independent company whose shares go to existing holders.","A cash dividend is not a spin-off.","Bankruptcy is unrelated."],"takeaway":"Spin-off = subsidiary becomes a separate public company, shares distributed to holders."},{"id":"n318","domain":"d3","topic":"Corporate actions","difficulty":"medium","stem":"In a rights offering, existing shareholders receive","choices":["the right to buy additional new shares, often at a discount, before the public","a guaranteed cash payment","a new bond","voting control of the board"],"correct":0,"reasons":["Correct. A rights offering lets current holders buy new shares (often below market) to preserve ownership.","No guaranteed cash is paid.","Rights concern equity, not new bonds.","Rights do not grant board control."],"takeaway":"Rights offering = current holders get first chance to buy new shares, often at a discount."},{"id":"n319","domain":"d3","topic":"Settlement","difficulty":"hard","stem":"A firm that “DKs” a trade is","choices":["confirming the trade details match","disputing the trade because details do not match (Do not Know)","settling early","waiving commissions"],"correct":1,"reasons":["A match would not be a DK.","Correct. DK means a contra party does not recognize the trade as reported, signaling a discrepancy.","DK is a dispute, not early settlement.","DK is unrelated to commissions."],"takeaway":"DK = “Don’t Know” a trade — the confirmation details do not match."},{"id":"n320","domain":"d3","topic":"Corporate actions","difficulty":"medium","stem":"The record date determines","choices":["which shareholders of record are entitled to a distribution","the day the trade is executed","the maturity of a bond","the option expiration"],"correct":0,"reasons":["Correct. Owners of record on the record date receive the dividend or distribution.","Execution is the trade date.","Bond maturity is unrelated.","Option expiration is unrelated."],"takeaway":"Record date = who is on the books to receive the distribution."},{"id":"n321","domain":"d3","topic":"Accounts","difficulty":"easy","stem":"In a cash account, the customer must","choices":["pay in full for securities purchased","borrow at least half the purchase price","trade only options","maintain a short position"],"correct":0,"reasons":["Correct. Cash accounts require full payment; no borrowing to buy.","Borrowing to buy describes a margin account.","Cash accounts are not options-only.","Short selling requires a margin account."],"takeaway":"Cash account = pay in full; margin account = borrow part of the cost."},{"id":"n322","domain":"d3","topic":"Accounts","difficulty":"medium","stem":"Regulation T is administered by the Federal Reserve Board and governs","choices":["the maximum sales charge on mutual funds","the extension of credit (margin) by broker-dealers to customers","municipal bond taxation","options expiration"],"correct":1,"reasons":["Sales charges are a FINRA/1940-Act matter.","Correct. Reg T sets the initial credit (margin) broker-dealers may extend to customers.","Taxation is not Reg T’s subject.","Options expiration is set by the OCC/exchanges."],"takeaway":"Reg T = Fed rule on customer margin (initial credit) at broker-dealers."},{"id":"n323","domain":"d3","topic":"Accounts","difficulty":"hard","stem":"In a joint tenants with right of survivorship (JTWROS) account, when one owner dies,","choices":["the deceased owner’s share passes to their estate","the entire account passes to the surviving tenant(s)","the account is frozen permanently","the assets go to the broker-dealer"],"correct":1,"reasons":["That describes tenants in common.","Correct. Under JTWROS, the survivor(s) automatically receive the decedent’s interest.","The account is not permanently frozen.","Assets never pass to the firm."],"takeaway":"JTWROS: survivor takes all. TIC: decedent’s share goes to the estate."},{"id":"n324","domain":"d3","topic":"Accounts","difficulty":"medium","stem":"A tenants-in-common (TIC) account differs from JTWROS because in TIC,","choices":["ownership must always be equal","a deceased owner’s portion passes to their estate, not automatically to the co-owner","only one person can trade","it must be a retirement account"],"correct":1,"reasons":["TIC allows unequal ownership percentages.","Correct. In TIC, a decedent’s share goes to their estate/heirs, not the surviving owner.","Both owners can typically act per the agreement.","TIC is not a retirement-account type."],"takeaway":"TIC = decedent’s share to the estate; ownership can be unequal."},{"id":"n325","domain":"d3","topic":"Accounts","difficulty":"medium","stem":"An UGMA/UTMA custodial account is","choices":["owned by the custodian personally","an irrevocable gift owned by the minor and managed by a custodian","a joint account of two adults","a corporate account"],"correct":1,"reasons":["The custodian manages but does not own the assets.","Correct. Gifts to a minor under UGMA/UTMA are irrevocable and belong to the minor, with a custodian managing them.","It is not an adult joint account.","It is an individual minor’s account, not corporate."],"takeaway":"UGMA/UTMA = irrevocable gift; minor owns, custodian manages."},{"id":"n326","domain":"d3","topic":"Accounts","difficulty":"hard","stem":"In a custodial UGMA/UTMA account, there may be","choices":["multiple minors and multiple custodians per account","only one minor and one custodian per account","no minor at all","only corporate owners"],"correct":1,"reasons":["Only one minor and one custodian are permitted per account.","Correct. Each UGMA/UTMA account has exactly one minor and one custodian.","A minor is required.","Custodial accounts are for a minor, not corporations."],"takeaway":"One minor, one custodian per UGMA/UTMA account."},{"id":"n327","domain":"d3","topic":"Accounts","difficulty":"medium","stem":"A traditional IRA generally offers","choices":["tax-free withdrawals of all contributions and earnings","potentially tax-deductible contributions with tax-deferred growth and taxable withdrawals","no contribution limit","FDIC insurance on stocks held inside"],"correct":1,"reasons":["Tax-free qualified withdrawals describe a Roth IRA.","Correct. Traditional IRA contributions may be deductible; growth is tax-deferred and withdrawals are taxed.","IRAs have annual contribution limits.","Securities in an IRA are not FDIC insured."],"takeaway":"Traditional IRA = possible deduction now, tax-deferred growth, taxed later."},{"id":"n328","domain":"d3","topic":"Accounts","difficulty":"hard","stem":"A Roth IRA differs from a traditional IRA because the Roth offers","choices":["tax-deductible contributions","tax-free qualified withdrawals of contributions and earnings","no growth potential","mandatory withdrawals starting at age 30"],"correct":1,"reasons":["Roth contributions are made with after-tax dollars (not deductible).","Correct. Qualified Roth withdrawals, including earnings, are tax-free.","Roth assets can grow like any IRA.","Roth accounts are not subject to lifetime required distributions for the original owner."],"takeaway":"Roth = after-tax in, tax-free qualified withdrawals out."},{"id":"n329","domain":"d3","topic":"Accounts","difficulty":"medium","stem":"A Transfer on Death (TOD) registration allows account assets to","choices":["avoid probate by passing to named beneficiaries at the owner’s death","be gifted irrevocably to a minor","be traded on margin automatically","skip all taxation"],"correct":0,"reasons":["Correct. TOD passes assets directly to beneficiaries, avoiding probate.","That describes UGMA/UTMA.","TOD does not create margin.","TOD does not eliminate taxes."],"takeaway":"TOD = beneficiary designation that avoids probate at death."},{"id":"n330","domain":"d3","topic":"Accounts","difficulty":"hard","stem":"A discretionary account is one in which","choices":["the customer must approve every order in advance","the representative may choose the security, amount or action without prior approval for each trade","only the clearing firm can trade","no trading is allowed"],"correct":1,"reasons":["That describes a non-discretionary account.","Correct. Written authorization lets the rep exercise discretion over the three A’s (action, amount, asset).","Clearing firms do not exercise trading discretion.","Discretionary accounts do allow trading."],"takeaway":"Discretion requires written authorization; covers action, amount, and asset."},{"id":"n331","domain":"d3","topic":"Accounts","difficulty":"medium","stem":"Opening a margin account requires the customer to sign","choices":["nothing beyond a new account form","a margin agreement including a credit and (typically) a hypothecation agreement","a municipal disclosure only","an options approval only"],"correct":1,"reasons":["Margin requires additional agreements.","Correct. The margin agreement (credit, hypothecation, and often a loan-consent component) is required.","Municipal disclosure is unrelated to margin.","Options approval is a separate process."],"takeaway":"Margin account = margin/credit agreement plus hypothecation."},{"id":"n332","domain":"d3","topic":"Accounts","difficulty":"hard","stem":"For an options account, the firm must generally deliver the Options Disclosure Document (ODD)","choices":["after the first options trade settles","at or before the time the account is approved for options trading","only upon customer request","once per year regardless of activity"],"correct":1,"reasons":["The ODD must be provided by account approval, not after trading.","Correct. The ODD must be furnished at or before approval for options trading.","It is required proactively, not only on request.","Delivery is tied to approval, not an annual cycle."],"takeaway":"ODD delivered at or before options-account approval."},{"id":"n333","domain":"d3","topic":"Compliance","difficulty":"medium","stem":"A Customer Identification Program (CIP) requires a firm to collect and verify","choices":["a customer’s favorite investments","name, date of birth, address and taxpayer identification number","only an email address","the customer’s credit score"],"correct":1,"reasons":["Preferences are not CIP data.","Correct. CIP requires name, DOB, physical address and TIN to verify identity.","An email alone is insufficient.","A credit score is not a CIP element."],"takeaway":"CIP = name, DOB, address, TIN — verify identity at account opening."},{"id":"n334","domain":"d3","topic":"Compliance","difficulty":"hard","stem":"Regulation Best Interest (Reg BI) requires a broker-dealer recommending a securities transaction to a retail customer to","choices":["recommend only the cheapest product available","act in the customer’s best interest, considering costs, risks, rewards and reasonably available alternatives","guarantee the customer against loss","avoid disclosing any conflicts"],"correct":1,"reasons":["Reg BI is not a cheapest-only rule.","Correct. Reg BI’s obligations (disclosure, care, conflict, compliance) center on acting in the retail customer’s best interest.","No guarantee against loss is permitted.","Conflicts must be disclosed, not hidden."],"takeaway":"Reg BI = best interest, weighing cost, risk, reward and alternatives; disclose conflicts."},{"id":"n335","domain":"d3","topic":"Compliance","difficulty":"medium","stem":"Under the know-your-customer rule, a firm must use reasonable diligence to know the","choices":["essential facts about the customer and the authority of anyone acting on the account","customer’s political opinions","representative’s personal net worth","issuer’s marketing budget"],"correct":0,"reasons":["Correct. KYC covers essential customer facts and the authority of persons acting for the account.","Political opinions are not KYC facts.","The rep’s net worth is irrelevant to KYC.","Issuer marketing is unrelated."],"takeaway":"KYC = essential facts + authority of anyone acting for the customer."},{"id":"n336","domain":"d3","topic":"Compliance","difficulty":"hard","stem":"Regulation S-P primarily requires firms to","choices":["guarantee investment performance","protect the privacy of customer nonpublic personal information and provide privacy notices","register every security","set margin levels"],"correct":1,"reasons":["S-P is a privacy rule, not a performance guarantee.","Correct. Reg S-P governs safeguarding customer privacy and providing privacy notices with opt-out rights.","Registration is a separate framework.","Margin is Reg T."],"takeaway":"Reg S-P = customer privacy safeguards and notices."},{"id":"n337","domain":"d3","topic":"Compliance","difficulty":"medium","stem":"When a firm learns a customer has died, it should","choices":["continue trading as before","cancel open orders, freeze the account and await proper documentation","immediately liquidate everything","transfer assets to the representative"],"correct":1,"reasons":["Trading should not simply continue.","Correct. The firm cancels open orders, marks the account deceased, and awaits legal documents before acting.","Automatic liquidation is not appropriate.","Assets never go to the representative."],"takeaway":"On death: cancel open orders, freeze, await documentation."},{"id":"n338","domain":"d3","topic":"Compliance","difficulty":"hard","stem":"A Currency Transaction Report (CTR) is generally required for cash transactions exceeding","choices":["$1,000 in a day","$5,000 in a month","$10,000 in a day","$100,000 in a year"],"correct":2,"reasons":["That threshold is too low.","CTRs are triggered by daily cash amounts, not monthly totals.","Correct. Cash transactions over $10,000 in a day trigger a CTR.","The CTR trigger is a single-day $10,000 threshold."],"takeaway":"CTR = cash over $10,000 in a day; a Bank Secrecy Act requirement."},{"id":"n339","domain":"d3","topic":"Prohibited","difficulty":"medium","stem":"Trading on material nonpublic information in breach of a duty is","choices":["permitted if the trade is small","insider trading, which is prohibited","required disclosure under Reg BI","a normal market-making activity"],"correct":1,"reasons":["Size does not legalize insider trading.","Correct. Using MNPI in breach of a duty is illegal insider trading.","Reg BI does not authorize insider trading.","Market makers may not trade on MNPI either."],"takeaway":"MNPI + breach of duty = illegal insider trading, regardless of size."},{"id":"n340","domain":"d3","topic":"Prohibited","difficulty":"hard","stem":"Churning is best defined as","choices":["recommending a buy-and-hold strategy","excessive trading in a customer account primarily to generate commissions","executing a customer’s unsolicited order","rebalancing once per year"],"correct":1,"reasons":["Buy-and-hold is the opposite of churning.","Correct. Churning is excessive trading driven by commission generation rather than customer benefit.","An unsolicited order is customer-directed, not churning.","Annual rebalancing is not excessive."],"takeaway":"Churning = excessive trading to generate commissions, not to help the customer."},{"id":"n341","domain":"d3","topic":"Prohibited","difficulty":"medium","stem":"Front running is","choices":["trading ahead of a known large customer order to profit from its expected impact","executing a customer order promptly","disclosing a conflict of interest","buying an IPO"],"correct":0,"reasons":["Correct. Front running exploits advance knowledge of a pending customer order.","Prompt execution is proper.","Disclosure is required, not prohibited.","Buying an IPO is not front running."],"takeaway":"Front running = trading ahead of a known customer order — prohibited."},{"id":"n342","domain":"d3","topic":"Prohibited","difficulty":"hard","stem":"Entering trades near the close to set an artificial closing price is called","choices":["marking the close","dollar-cost averaging","a rights offering","a wash of the account"],"correct":0,"reasons":["Correct. Marking the close manipulates the official closing benchmark.","Dollar-cost averaging is a legitimate strategy.","A rights offering is a corporate action.","That is not the recognized term."],"takeaway":"Marking the close = manipulating the closing price — prohibited."},{"id":"n343","domain":"d3","topic":"Prohibited","difficulty":"medium","stem":"Selling away occurs when a representative","choices":["sells securities from firm inventory","engages in private securities transactions outside the firm without required notice/approval","recommends a mutual fund breakpoint","executes a customer’s limit order"],"correct":1,"reasons":["Selling from inventory is ordinary principal trading.","Correct. Selling away is participating in securities transactions outside the firm without the required written notice and approval.","A breakpoint recommendation is proper.","Executing a limit order is routine."],"takeaway":"Selling away = outside private securities transactions without firm notice/approval."},{"id":"n344","domain":"d3","topic":"Prohibited","difficulty":"hard","stem":"Commingling customer securities with firm assets in a way that is not permitted is prohibited because it","choices":["improves customer returns","can jeopardize the safety and identification of customer property","is required by SIPC","reduces the bid-ask spread"],"correct":1,"reasons":["Improper commingling does not help customers.","Correct. Customer assets must be segregated to protect and identify them; improper commingling endangers them.","SIPC does not require commingling.","Commingling is unrelated to spreads."],"takeaway":"Segregate customer assets; improper commingling with firm property is prohibited."},{"id":"n345","domain":"d3","topic":"Prohibited","difficulty":"medium","stem":"A representative may not guarantee a customer against loss because","choices":["it would violate FINRA conduct rules prohibiting guarantees","the customer would owe extra tax","it always causes a margin call","SIPC forbids all recommendations"],"correct":0,"reasons":["Correct. Guaranteeing a customer against loss is prohibited under conduct rules.","Tax is not the reason.","A guarantee does not cause a margin call.","SIPC does not forbid recommendations."],"takeaway":"No guarantees against loss — prohibited under FINRA rules."},{"id":"n346","domain":"d3","topic":"Prohibited","difficulty":"hard","stem":"A registered representative may share in a customer’s account only if","choices":["the customer verbally agrees","the firm and customer approve in writing and sharing is proportional to the rep’s contribution (limited exceptions)","the rep discloses it after a year","profits exceed 10%"],"correct":1,"reasons":["Verbal agreement is insufficient.","Correct. Sharing requires written firm and customer approval and generally must be proportional to the rep’s own investment (with narrow exceptions).","After-the-fact disclosure does not satisfy the rule.","A profit threshold is not the standard."],"takeaway":"Sharing in accounts needs written approval and proportional contribution."},{"id":"n347","domain":"d3","topic":"Prohibited","difficulty":"medium","stem":"A Suspicious Activity Report (SAR) must be kept confidential, meaning the firm","choices":["must tell the customer a SAR was filed","must not disclose to the customer that a SAR was filed","files it publicly","posts it on its website"],"correct":1,"reasons":["Tipping off the customer is prohibited.","Correct. The existence of a SAR must not be disclosed to the customer (no tipping off).","SARs are confidential filings, not public.","SARs are never posted publicly."],"takeaway":"Never tip off a customer that a SAR was filed."},{"id":"n348","domain":"d3","topic":"Prohibited","difficulty":"hard","stem":"Structuring cash transactions in amounts just under $10,000 to avoid reporting is","choices":["a legitimate way to reduce paperwork","illegal structuring under anti-money-laundering rules","required by Regulation T","a normal dividend reinvestment"],"correct":1,"reasons":["It is not a legitimate practice.","Correct. Deliberately breaking up cash to evade CTR reporting is illegal structuring.","Reg T concerns margin, not cash reporting.","It is unrelated to dividend reinvestment."],"takeaway":"Structuring to dodge the $10,000 CTR trigger is illegal."},{"id":"n401","domain":"d4","topic":"Registration","difficulty":"easy","stem":"Form U4 is used to","choices":["terminate a representative’s registration","apply for and maintain an associated person’s registration and disclosures","report a firm’s net capital","register a new securities offering"],"correct":1,"reasons":["Termination is reported on Form U5.","Correct. The U4 initiates and updates registration, including disclosure information.","Net capital is reported elsewhere.","Securities offerings are registered under the 1933 Act."],"takeaway":"U4 opens/updates a person’s registration; U5 terminates it."},{"id":"n402","domain":"d4","topic":"Registration","difficulty":"medium","stem":"Form U5 must be filed when","choices":["a representative changes their address","an associated person’s registration is terminated","a customer opens an account","a bond matures"],"correct":1,"reasons":["Address changes are U4 amendments.","Correct. The U5 is filed upon termination and reports termination-related information.","Account opening is unrelated to the U5.","Bond maturity is unrelated."],"takeaway":"U5 = termination filing; must report why the person left."},{"id":"n403","domain":"d4","topic":"Registration","difficulty":"hard","stem":"Information reported on Forms U4 and U5 is maintained in","choices":["the Central Registration Depository (CRD) and reflected in BrokerCheck","the customer’s tax file","the Federal Reserve’s reserve ledger","the OCC options database"],"correct":0,"reasons":["Correct. CRD stores registration/disclosure data, much of which appears in BrokerCheck.","Tax files are separate.","The Fed does not store registration data.","The OCC handles options clearing, not registration records."],"takeaway":"CRD holds U4/U5 data; the public sees much of it via BrokerCheck."},{"id":"n404","domain":"d4","topic":"Registration","difficulty":"medium","stem":"Passing the SIE alone","choices":["fully qualifies a person to transact securities business","must be combined with a specialized representative-level exam and firm association to transact business","registers the person as an investment adviser","licenses a person to sell insurance"],"correct":1,"reasons":["The SIE is a corequisite, not a full qualification by itself.","Correct. The SIE plus a qualifying top-off exam (e.g., Series 7) and firm sponsorship are needed to transact business.","The SIE does not create adviser registration.","Insurance licensing is separate."],"takeaway":"SIE = foundational corequisite; a top-off exam plus firm association complete registration."},{"id":"n405","domain":"d4","topic":"Registration","difficulty":"hard","stem":"A person may be subject to statutory disqualification for","choices":["passing an exam on the second attempt","certain felony convictions or serious securities-related misconduct within specified periods","changing firms","holding a joint account"],"correct":1,"reasons":["Retaking an exam is not disqualifying.","Correct. Specified felonies, certain misdemeanors and serious regulatory findings can be statutorily disqualifying.","Changing firms is routine.","Holding a joint account is not disqualifying."],"takeaway":"Statutory disqualification stems from specified crimes or serious regulatory misconduct."},{"id":"n406","domain":"d4","topic":"Continuing education","difficulty":"medium","stem":"The Regulatory Element of continuing education is","choices":["designed and delivered by each member firm","a FINRA-administered program that registered persons must complete on a set cycle","optional after the first year","only for principals"],"correct":1,"reasons":["The Firm Element is firm-designed; the Regulatory Element is FINRA-administered.","Correct. The Regulatory Element is FINRA-based and required for covered registered persons.","It is not optional.","It applies broadly to registered persons, not only principals."],"takeaway":"Regulatory Element = FINRA-administered CE; Firm Element = firm-designed."},{"id":"n407","domain":"d4","topic":"Continuing education","difficulty":"hard","stem":"The Firm Element of continuing education is","choices":["created by FINRA for all firms uniformly","developed by the member firm based on a written needs analysis and training plan","a one-time orientation","the same as the SIE exam"],"correct":1,"reasons":["FINRA does not uniformly write the Firm Element.","Correct. Firms build the Firm Element from an annual needs analysis addressing their business and personnel.","It is ongoing, not one-time.","It is separate from the SIE."],"takeaway":"Firm Element = firm-tailored annual CE from a needs analysis."},{"id":"n408","domain":"d4","topic":"Outside activities","difficulty":"medium","stem":"Before engaging in an outside business activity, a registered representative must","choices":["obtain a customer’s permission","provide prior written notice to the employing firm","file with the SEC directly","do nothing, as OBAs are unrestricted"],"correct":1,"reasons":["Customer permission is not the requirement.","Correct. Prior written notice to the firm is required so it can evaluate the activity.","The rep notifies the firm, not the SEC directly.","OBAs are regulated, not unrestricted."],"takeaway":"OBA = give the firm prior written notice."},{"id":"n409","domain":"d4","topic":"Private transactions","difficulty":"hard","stem":"A private securities transaction (selling away) generally requires the representative to","choices":["keep it secret from the firm","provide written notice to the firm and, if compensated, obtain firm approval and supervision","only tell the customer","report it to the IRS only"],"correct":1,"reasons":["Secrecy is exactly what the rule forbids.","Correct. Written notice is required; if the rep is to be compensated, the firm must approve and supervise the activity.","Telling only the customer is insufficient.","IRS reporting does not satisfy the rule."],"takeaway":"Private securities transactions: written notice; if paid, firm approval and supervision."},{"id":"n410","domain":"d4","topic":"Gifts","difficulty":"medium","stem":"The FINRA gift limit for gifts given in relation to the business of the recipient’s employer is generally","choices":["$50 per person per year","$100 per person per year","$250 per person per year","unlimited"],"correct":1,"reasons":["$50 is too low.","Correct. The influencing-business gift limit is generally $100 per person per year.","$250 exceeds the limit.","Gifts are capped, not unlimited."],"takeaway":"Gift limit = $100 per person per year (business-related gifts)."},{"id":"n411","domain":"d4","topic":"Communications","difficulty":"hard","stem":"A communication distributed or made available to more than 25 retail investors within any 30 calendar-day period is classified as","choices":["correspondence","a retail communication","an institutional communication","a private placement memorandum"],"correct":1,"reasons":["Correspondence goes to 25 or fewer retail investors in 30 days.","Correct. More than 25 retail investors in 30 days makes it a retail communication.","Institutional communications go to institutional investors.","A PPM is an offering document, not a communication category here."],"takeaway":"Retail communication = to >25 retail investors in 30 days; correspondence = 25 or fewer."},{"id":"n412","domain":"d4","topic":"Communications","difficulty":"medium","stem":"Institutional communications and correspondence differ from retail communications mainly in their","choices":["prohibition of any charts","principal approval and supervision requirements","requirement to guarantee returns","exemption from all recordkeeping"],"correct":1,"reasons":["Charts are not categorically prohibited.","Correct. The categories carry different principal pre-approval and supervisory review requirements.","No communication may guarantee returns.","All categories are subject to recordkeeping."],"takeaway":"Communication category drives the approval/supervision standard; records always required."},{"id":"n413","domain":"d4","topic":"Complaints","difficulty":"medium","stem":"Under FINRA rules, a customer complaint that must be handled and recorded is generally one that is","choices":["made verbally in passing","a written (including electronic) grievance involving the solicitation or execution of a transaction","only about market performance","any question about a statement"],"correct":1,"reasons":["A passing verbal remark is not the defined written complaint.","Correct. A written or electronic grievance concerning the firm’s or associated person’s conduct in a securities matter is a reportable complaint.","General market performance gripes are not the definition.","A routine question is not a complaint."],"takeaway":"A written/electronic grievance about the account or a transaction = a complaint to log."},{"id":"n414","domain":"d4","topic":"Ethics","difficulty":"hard","stem":"Making an untrue statement of a material fact, or omitting a material fact, when recommending a security is","choices":["acceptable if the customer does not ask","a prohibited misrepresentation or omission","required under Reg BI","only a concern for institutional accounts"],"correct":1,"reasons":["Silence by the customer does not excuse it.","Correct. Material misrepresentations and omissions are prohibited under antifraud and conduct rules.","Reg BI requires the opposite — accurate, full disclosure.","It applies to all customers, not only institutions."],"takeaway":"No material misstatements or omissions — a core antifraud principle."}];
